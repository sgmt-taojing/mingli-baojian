server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html divination-hub.html;

    # 主应用
    location / {
        try_files $uri $uri/ /app/divination-hub.html;
    }

    # 静态资源
    location /app/ {
        alias /usr/share/nginx/html/app/;
        add_header Cache-Control "public, max-age=3600";
    }

    location /knowledge/ {
        alias /usr/share/nginx/html/knowledge/;
        add_header Cache-Control "public, max-age=3600";
        # KB JS文件允许跨域
        add_header Access-Control-Allow-Origin *;
    }

    # API代理 — 转发到api-proxy容器
    location /v1/ {
        proxy_pass http://api-proxy:8900;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # 排盘API
    location /api/paipan/ {
        proxy_pass http://paipan:8911/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 排盘API (旧路径兼容)
    location /api/bazi {
        proxy_pass http://paipan:8911/api/bazi;
        proxy_set_header Host $host;
    }

    # TTS语音服务
    location /api/tts {
        proxy_pass http://tts:8912/api/tts;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 30s;
    }

    # 面相分析
    location /api/face-analyze {
        proxy_pass http://paipan:8911/api/face-analyze;
        proxy_set_header Host $host;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # gzip
    gzip on;
    gzip_types text/css application/javascript application/json text/html;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # 安全头
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
}
