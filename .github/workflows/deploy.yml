name: Deploy to GitHub Pages

on:
  push:
    branches: [gh-pages]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          # 复制所有目录
          cp -r app _site/app
          cp -r docs _site/docs
          cp -r knowledge _site/knowledge
          # 复制根目录HTML
          cp *.html _site/ 2>/dev/null || true
          # 创建.nojekyll（禁用Jekyll处理）
          touch _site/.nojekyll
          # 用printf创建根目录跳转页（避免heredoc缩进问题）
          printf '%s\n' \
            '<!DOCTYPE html>' \
            '<html lang="zh-CN">' \
            '<head>' \
            '<meta charset="UTF-8">' \
            '<meta http-equiv="refresh" content="0; url=app/divination-hub.html">' \
            '<title>命理宝鉴</title>' \
            '</head>' \
            '<body>' \
            '<p>正在跳转到<a href="app/divination-hub.html">命理宝鉴主页面</a>...</p>' \
            '</body>' \
            '</html>' > _site/index.html
          # 创建微信版入口
          printf '%s\n' \
            '<!DOCTYPE html>' \
            '<html lang="zh-CN">' \
            '<head>' \
            '<meta charset="UTF-8">' \
            '<meta http-equiv="refresh" content="0; url=app/wechat-hub.html">' \
            '<title>命理宝鉴 - 移动端</title>' \
            '</head>' \
            '<body>' \
            '<p>正在跳转到<a href="app/wechat-hub.html">命理宝鉴移动端</a>...</p>' \
            '</body>' \
            '</html>' > _site/mobile.html
          echo "✅ Deploy directory prepared:"
          ls -la _site/ | head -10
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4