<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>按钮测试</title>
<style>
body { font-family: sans-serif; padding: 20px; }
button { padding: 10px 20px; margin: 5px; font-size: 16px; }
#output { margin-top: 20px; padding: 10px; background: #f0f0f0; }
</style>
</head>
<body>
<h1>按钮点击测试</h1>
<button onclick="testClick('A')">按钮 A</button>
<button onclick="testClick('B')">按钮 B</button>
<button id="btnC">按钮 C (addEventListener)</button>
<div id="output">点击结果将显示在这里</div>

<script>
function testClick(name) {
  document.getElementById('output').innerHTML += '<br>按钮 ' + name + ' 被点击了！时间: ' + new Date().toLocaleTimeString();
}

document.getElementById('btnC').addEventListener('click', function() {
  document.getElementById('output').innerHTML += '<br>按钮 C 被点击了！(addEventListener)';
});

console.log('测试页面 JS 已加载');
</script>
</body>
</html>
