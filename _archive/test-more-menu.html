<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>更多菜单测试</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0c0c0c;
  color: #e8e4d9;
  min-height: 100vh;
}
:root {
  --gold: #c9a84c;
  --text: #e8e4d9;
  --paper2: #d4c9b0;
}
.top-nav {
  background: rgba(12, 12, 12, 0.95);
  border-bottom: 1px solid rgba(201, 168, 76, 0.15);
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
}
.nav-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  height: 64px;
}
.nav-brand {
  font-family: 'Ma Shan Zheng', serif;
  font-size: 22px;
  color: var(--gold);
  letter-spacing: 4px;
}
.nav-tabs {
  display: flex;
  gap: 0;
  margin-left: 48px;
  flex: 1;
}
.nav-tab {
  padding: 20px 20px;
  font-size: 13px;
  letter-spacing: 3px;
  cursor: pointer;
  color: var(--paper2);
  border: none;
  background: none;
  white-space: nowrap;
  position: relative;
  border-bottom: 2px solid transparent;
  transition: all .25s ease;
}
.nav-tab:hover {
  color: var(--gold);
  border-bottom-color: var(--gold);
}
.nav-tab .tab-emoji {
  font-size: 16px;
  display: block;
  text-align: center;
  margin-bottom: 2px;
}
.nav-tab .tab-name {
  display: block;
  text-align: center;
  font-size: 11px;
  letter-spacing: 1px;
}

/* ⭐ 核心样式 - 更多下拉菜单 */
.more-dropdown {
  position: absolute !important;
  top: 100% !important;
  right: 0 !important;
  min-width: 180px !important;
  background: rgba(20, 20, 20, 0.98) !important;
  border: 2px solid rgba(201, 168, 76, 0.4) !important;
  border-radius: 12px !important;
  padding: 12px 0 !important;
  margin-top: 0 !important;
  opacity: 0 !important;
  visibility: hidden !important;
  transform: translateY(-10px) !important;
  transition: opacity 0.2s ease, transform 0.2s ease !important;
  z-index: 99999 !important;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6) !important;
}

/* 关键：按钮和菜单作为一个整体，hover保持 */
.nav-tab:hover .more-dropdown,
.more-dropdown:hover {
  opacity: 1 !important;
  visibility: visible !important;
  transform: translateY(0) !important;
}

.more-dropdown a {
  display: block;
  padding: 14px 24px;
  color: var(--text);
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 2px;
  transition: all 0.2s;
  border-bottom: 1px solid rgba(201, 168, 76, 0.1);
}
.more-dropdown a:last-child {
  border-bottom: none;
}
.more-dropdown a:hover {
  background: rgba(201, 168, 76, 0.15);
  color: var(--gold);
}

.main {
  margin-top: 100px;
  padding: 40px;
  text-align: center;
}
h1 {
  font-family: 'Ma Shan Zheng', serif;
  font-size: 48px;
  color: var(--gold);
  margin-bottom: 20px;
}
p {
  font-size: 16px;
  opacity: 0.7;
  line-height: 1.8;
}
.success {
  background: rgba(46, 204, 113, 0.1);
  border: 1px solid rgba(46, 204, 113, 0.3);
  border-radius: 8px;
  padding: 20px;
  margin-top: 30px;
  color: #2ecc71;
}
</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-inner">
    <div class="nav-brand">测试导航</div>
    <div class="nav-tabs">
      <button class="nav-tab">
        <span class="tab-emoji">🏠</span>
        <span class="tab-name">首页</span>
      </button>
      <button class="nav-tab">
        <span class="tab-emoji">🌟</span>
        <span class="tab-name">命盘</span>
      </button>
      <button class="nav-tab">
        <span class="tab-emoji">䷀</span>
        <span class="tab-name">占卜</span>
      </button>
      <button class="nav-tab">
        <span class="tab-emoji">🏡</span>
        <span class="tab-name">风水</span>
      </button>
      <button class="nav-tab">
        <span class="tab-emoji">🔤</span>
        <span class="tab-name">姓名</span>
      </button>
      <button class="nav-tab" style="position:relative">
        <span class="tab-emoji">☰</span>
        <span class="tab-name">更多</span>
        <div class="more-dropdown">
          <a href="#">📚 知识库</a>
          <a href="#">📅 黄历</a>
          <a href="#">🧬 体质</a>
          <a href="#">🙏 信众</a>
          <a href="#">👑 会员中心</a>
          <a href="#">🛍️ 开运商城</a>
        </div>
      </button>
    </div>
  </div>
</nav>

<div class="main">
  <h1>✅ 更多菜单测试</h1>
  <p>鼠标悬停在右上角的"更多"按钮上<br>下拉菜单应该自动显示</p>
  <div class="success">
    <strong>如果能看到菜单，说明CSS hover生效了！</strong>
  </div>
</div>

</body>
</html>
