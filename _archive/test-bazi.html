<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排盘测试</title>
<style>
body{font-family:'Noto Serif SC',serif;background:#0a0a14;color:#f0e8d8;padding:20px}
h2{color:#c9a84c;text-align:center}
input,select{background:#1a1a2e;border:1px solid #333;color:#f0e8d8;padding:8px 12px;margin:4px;border-radius:4px;width:200px}
button{background:linear-gradient(135deg,#c9a84c,#a0832e);color:#0a0a14;border:none;padding:10px 30px;font-size:16px;border-radius:4px;cursor:pointer}
button:hover{opacity:.85}
.result{margin-top:20px;padding:20px;background:#1a1a2e;border:1px solid #333;border-radius:8px;display:none}
.tag{display:inline-block;background:rgba(201,168,76,.15);color:#c9a84c;padding:4px 10px;margin:3px;border-radius:4px;font-size:13px}
.bazi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}
.bazi-card{text-align:center;background:rgba(201,168,76,.05);padding:16px;border-radius:8px;border:1px solid rgba(201,168,76,.15)}
.bazi-card .stem{font-size:28px;color:#c9a84c;font-weight:bold}
.bazi-card .branch{font-size:22px;margin-top:4px}
.bazi-card .label{font-size:11px;opacity:.5;margin-top:6px}
.bazi-card .ele{font-size:12px;margin-top:4px;opacity:.7}
</style>
</head>
<body>
<h2>八字排盘测试</h2>
<div style="text-align:center;margin:20px">
  <div><input type="text" id="baziName" placeholder="姓名（选填）" style="width:150px"></div>
  <div style="margin-top:8px"><input type="date" id="baziDate"></div>
  <div style="margin-top:8px">
    <select id="baziHour">
      <option value="0">子时 23:00-01:00</option>
      <option value="1">丑时 01:00-03:00</option>
      <option value="2">寅时 03:00-05:00</option>
      <option value="3">卯时 05:00-07:00</option>
      <option value="4">辰时 07:00-09:00</option>
      <option value="5">巳时 09:00-11:00</option>
      <option value="6" selected>午时 11:00-13:00</option>
      <option value="7">未时 13:00-15:00</option>
      <option value="8">申时 15:00-17:00</option>
      <option value="9">酉时 17:00-19:00</option>
      <option value="10">戌时 19:00-21:00</option>
      <option value="11">亥时 21:00-23:00</option>
    </select>
  </div>
  <div style="margin-top:8px">
    <select id="baziSex">
      <option value="male">男</option>
      <option value="female">女</option>
    </select>
  </div>
  <div style="margin-top:16px"><button id="baziBtn">排 盘 演 命</button></div>
</div>

<div class="result" id="baziResult">
  <div style="text-align:center">
    <h3 id="baziNameOut" style="color:#c9a84c"></h3>
    <p id="baziMetaOut" style="opacity:.6;font-size:13px"></p>
    <div id="baziTagsOut" style="margin:10px 0"></div>
  </div>
  <div class="bazi-grid" id="baziGrid"></div>
  <div id="baziAnalysis"></div>
</div>

<script>
const STEMS = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const BRANCHES = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const ELE = {'甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土','庚':'金','辛':'金','壬':'水','癸':'水'};
const ZHI_ELE = {'子':'水','丑':'土','寅':'木','卯':'木','辰':'土','巳':'火','午':'火','未':'土','申':'金','酉':'金','戌':'土','亥':'水'};

// 天干地支计算
function getYearStemBranch(y, m, d) {
  let stemIdx = ((y - 4) % 10 + 10) % 10;
  let branchIdx = ((y - 4) % 12 + 12) % 12;
  if (m === 1 || (m === 2 && d < 4)) { stemIdx = (stemIdx - 1 + 10) % 10; branchIdx = (branchIdx - 1 + 12) % 12; }
  return { stemIdx, branchIdx, stem: STEMS[stemIdx], branch: BRANCHES[branchIdx] };
}

function getDayStemIndex(y, m, d) {
  const base = new Date(1900, 0, 1);
  const target = new Date(y, m - 1, d);
  const diff = Math.floor((target - base) / 86400000);
  return ((diff % 10) + 10) % 10;
}

function getDayBranchIndex(y, m, d) {
  const base = new Date(1900, 0, 1);
  const target = new Date(y, m - 1, d);
  const diff = Math.floor((target - base) / 86400000);
  return ((diff % 12) + 12) % 12;
}

function getMonthStem(dayStemIdx, monthBranch) {
  const branchIdx = BRANCHES.indexOf(monthBranch);
  const offset = (2 - branchIdx + 12) % 12;
  return (dayStemIdx + offset) % 10;
}

// 十神
function getTenGod(dayStem, element) {
  const map = {
    '木':{我:'木',同:'比肩',生:'食神',克:'财',同克:'七杀',生我:'正印',克我:'正官'},
    '火':{我:'火',同:'比肩',生:'食神',克:'财',同克:'七杀',生我:'正印',克我:'正官'},
    '土':{我:'土',同:'比肩',生:'食神',克:'财',同克:'七杀',生我:'正印',克我:'正官'},
    '金':{我:'金',同:'比肩',生:'食神',克:'财',同克:'七杀',生我:'正印',克我:'正官'},
    '水':{我:'水',同:'比肩',生:'食神',克:'财',同克:'七杀',生我:'正印',克我:'正官'}
  };
  const dayEle = ELE[dayStem];
  const m = map[dayEle];
  if (element === dayEle) return m['同'];
  const gen = {木:0,火:1,土:2,金:3,水:4};
  const g = (gen[dayEle] + 1) % 5, k = (gen[dayEle] - 1 + 5) % 5;
  const genName = Object.keys(gen).find(k => gen[k] === g);
  const keName = Object.keys(gen).find(k => gen[k] === k);
  if (element === genName) return m['生'];
  if (element === keName) return m['克'];
  return '偏财';
}

// 排盘
function computeBazi() {
  const name = document.getElementById('baziName').value || '有缘人';
  const dateStr = document.getElementById('baziDate').value;
  const hourVal = document.getElementById('baziHour').value;
  const sex = document.getElementById('baziSex').value;
  
  if (!dateStr) { alert('请输入出生日期'); return; }
  
  const [year, month, day] = dateStr.split('-').map(Number);
  const hour = parseInt(hourVal);
  
  const { stemIdx: ysIdx, branchIdx: ybIdx, stem: yStem, branch: yBranch } = getYearStemBranch(year, month, day);
  const dayStemIdx = getDayStemIndex(year, month, day);
  const dayBranchIdx = getDayBranchIndex(year, month, day);
  const dayStem = STEMS[dayStemIdx];
  const dayBranch = BRANCHES[dayBranchIdx];
  const monthBranch = BRANCHES[((month + 9) % 12)];
  const monthStemIdx = getMonthStem(dayStemIdx, monthBranch);
  const monthStem = STEMS[monthStemIdx];
  const monthBranchIdx = BRANCHES.indexOf(monthBranch);
  const hourBranchIdx = Math.floor(hour / 2) % 12;
  const hourBranch = BRANCHES[hourBranchIdx];
  const hourStemIdx = (dayStemIdx % 5 * 2 + hourBranchIdx) % 10;
  const hourStem = STEMS[hourStemIdx];
  
  const pillars = [
    {label:'年柱', stem:yStem, branch:yBranch},
    {label:'月柱', stem:monthStem, branch:monthBranch},
    {label:'日柱', stem:dayStem, branch:dayBranch},
    {label:'时柱', stem:hourStem, branch:hourBranch}
  ];
  
  const dayEle = ELE[dayStem];
  
  // 五行统计
  const eleCount = {木:0,火:0,土:0,金:0,水:0};
  pillars.forEach(p => { eleCount[ELE[p.stem]]++; eleCount[ZHI_ELE[p.branch]]++; });
  
  // 渲染
  document.getElementById('baziResult').style.display = 'block';
  document.getElementById('baziNameOut').textContent = name + ' 命盘';
  document.getElementById('baziMetaOut').textContent = `公历${year}年${month}月${day}日 ${BRANCHES[Math.floor(hour/2)%12]}时 · ${sex==='male'?'男':'女'}命`;
  document.getElementById('baziTagsOut').innerHTML = `<span class="tag">${dayEle}日主</span><span class="tag">${dayStem}${dayBranch}日柱</span>`;
  
  let gridHtml = '';
  pillars.forEach((p, i) => {
    const tg = getTenGod(dayStem, ELE[p.stem]);
    gridHtml += `<div class="bazi-card">
      <div class="label">${p.label}</div>
      <div class="stem">${p.stem}</div>
      <div class="branch">${p.branch}</div>
      <div class="ele">${ELE[p.stem]}·${ZHI_ELE[p.branch]}</div>
      <div style="font-size:11px;opacity:.5;margin-top:4px">${i===2?'日主':tg}</div>
    </div>`;
  });
  document.getElementById('baziGrid').innerHTML = gridHtml;
  
  // 分析
  let total = Object.values(eleCount).reduce((a,b)=>a+b, 0);
  let analysisHtml = '<h4 style="color:#c9a84c;margin-top:20px">五行分析</h4>';
  analysisHtml += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px">';
  const colors = {木:'#4CAF50',火:'#f44336',土:'#FF9800',金:'#FFD700',水:'#2196F3'};
  for (const [ele, count] of Object.entries(eleCount)) {
    const pct = Math.round(count/total*100);
    analysisHtml += `<span class="tag" style="border:1px solid ${colors[ele]}">${ele} ${count}个 (${pct}%)</span>`;
  }
  analysisHtml += '</div>';
  
  // 缺什么
  const missing = Object.entries(eleCount).filter(([_,v]) => v === 0).map(([k]) => k);
  if (missing.length > 0) {
    analysisHtml += `<p style="margin-top:12px;font-size:13px">五行缺：<strong style="color:#c9a84c">${missing.join('、')}</strong>（传统称"缺"实际需看全局旺衰）</p>`;
  }
  
  analysisHtml += `<p style="margin-top:12px;font-size:12px;opacity:.6">日主${dayStem}(${dayEle})，${sex==='male'?'乾造（男命）':'坤造（女命）'}。四柱共${total}个五行元素。</p>`;
  
  document.getElementById('baziAnalysis').innerHTML = analysisHtml;
  document.getElementById('baziResult').scrollIntoView({behavior:'smooth'});
}

// 使用 addEventListener 绑定按钮
document.getElementById('baziBtn').addEventListener('click', computeBazi);

// 控制台确认
console.log('排盘测试页面加载完成，按钮已绑定');
</script>
</body>
</html>
