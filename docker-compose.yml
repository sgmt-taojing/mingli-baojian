# 命理宝鉴 — 一键部署配置 v2
# 用法: docker-compose up -d
# 环境变量: 复制 .env.example 为 .env 并填写密钥

version: '3.8'

services:
  # ═══ 前端静态服务 ═══
  web:
    image: nginx:alpine
    container_name: mingli-web
    ports:
      - "8080:80"
    volumes:
      - ./app:/usr/share/nginx/html/app
      - ./knowledge:/usr/share/nginx/html/knowledge
      - ./docs:/usr/share/nginx/html/docs
      - ./index.html:/usr/share/nginx/html/index.html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./server/nginx-kb-auth.conf:/etc/nginx/conf.d/kb-auth.conf
    depends_on:
      - api-server
      - paipan
      - tts
    restart: unless-stopped

  # ═══ 后端API服务 v2 (Node.js + Express + RBAC) ═══
  api-server:
    build:
      context: .
      dockerfile: server/Dockerfile.api-v2
    container_name: mingli-api-v2
    ports:
      - "8920:8920"
    environment:
      - NODE_ENV=production
      - API_PORT=8920
      - MINGLI_ENCRYPT_KEY=${MINGLI_ENCRYPT_KEY:?必须设置加密密钥}
      - MINGLI_JWT_SECRET=${MINGLI_JWT_SECRET:?必须设置JWT密钥}
      - G2CLAW_API_KEY=${G2CLAW_API_KEY:-}
      - AI_API_BASE=${AI_API_BASE:-https://api.g2claw.com}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://127.0.0.1:8080,https://sgmt-taojing.github.io}
      - TZ=Asia/Shanghai
    volumes:
      - ./server/database:/app/server/database
      - ./knowledge:/app/knowledge
    restart: unless-stopped

  # ═══ 排盘服务 ═══
  paipan:
    build:
      context: ./server
      dockerfile: Dockerfile.paipan
    container_name: mingli-paipan
    ports:
      - "8911:8911"
    environment:
      - PORT=8911
    restart: unless-stopped

  # ═══ TTS语音服务 ═══
  tts:
    build:
      context: ./server
      dockerfile: Dockerfile.tts
    container_name: mingli-tts
    ports:
      - "8912:8912"
    environment:
      - PORT=8912
    restart: unless-stopped

  # ═══ 每日推送服务 ═══
  daily-push:
    build:
      context: ./server
      dockerfile: Dockerfile.push
    container_name: mingli-push
    environment:
      - TZ=Asia/Shanghai
      - PUSH_API_BASE=${PUSH_API_BASE:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
