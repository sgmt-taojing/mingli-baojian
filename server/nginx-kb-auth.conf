# ═══════════════════════════════════════════════════════════════
# 命理宝鉴 · Nginx 知识库分级访问控制配置模板
# ═══════════════════════════════════════════════════════════════
# 本文件定义 Nginx 层面的知识库文件访问控制策略。
#
# 架构概览：
#   1. 知识库JS文件从 /knowledge/ 迁移到 /data/kb/{级别}/ 目录
#   2. 前端请求 /kb/{级别}/{filename}.js 时，Nginx 发起 auth_request 子请求
#   3. 鉴权服务验证JWT，返回用户角色
#   4. Nginx 根据角色与级别匹配，允许或拒绝访问
#   5. 无权限返回 403，未登录访问非公开内容返回 401
#
# 使用方式：
#   include /etc/nginx/conf.d/nginx-kb-auth.conf;
#   或在 server 块中 include 本文件
# ═══════════════════════════════════════════════════════════════


# ───────────────────────────────────────────────────────────────
# 鉴权服务端点（auth_request 子请求目标）
# 部署在内部端口 3001，仅允许 Nginx 本机访问
# ───────────────────────────────────────────────────────────────
upstream kb_auth_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# ───────────────────────────────────────────────────────────────
# auth_request 鉴权服务器返回处理
# ───────────────────────────────────────────────────────────────
# 鉴权成功（2xx）→ 继续原请求
# 鉴权失败（401）→ 返回登录提示
# 鉴权拒绝（403）→ 返回权限不足提示
server {
    listen 127.0.0.1:3001;
    server_name kb_auth_internal;
    access_log off;

    # 内部鉴权端点：验证JWT并返回角色信息
    location = /_auth {
        internal;

        # 从Cookie或Authorization头提取JWT
        set $jwt_token "";

        # 优先从Authorization头获取
        if ($http_authorization ~* "^Bearer\s+(.+)$") {
            set $jwt_token $1;
        }

        # 回退到Cookie
        if ($jwt_token = "") {
            set $jwt_token $cookie_auth_token;
        }

        # 无Token → 401
        if ($jwt_token = "") {
            return 401 '{"error":"AUTH_TOKEN_MISSING","message":"请先登录"}';
        }

        # 代理到Node.js鉴权API
        proxy_pass http://127.0.0.1:3000/api/auth/verify-kb;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-KB-Level $arg_kb_level;
        proxy_set_header X-JWT-Token $jwt_token;
        proxy_set_header Authorization "Bearer $jwt_token";

        # 传递客户端IP用于审计
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}


# ═══════════════════════════════════════════════════════════════
# 知识库文件访问控制
# ═══════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────
# L1 公开级别 — 无需鉴权，直接访问
# 路径: /kb/public/*.js
# ───────────────────────────────────────────────────────────────
location /kb/public/ {
    alias /data/kb/public/;

    # 公开内容允许缓存
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
    add_header X-KB-Level "public";

    # 仅允许.js文件
    location ~ \.js$ {
        add_header Content-Type "application/javascript; charset=utf-8";
    }

    # 禁止目录遍历
    autoindex off;
}

# ───────────────────────────────────────────────────────────────
# L2 注册级别 — 需登录（free角色以上）
# 路径: /kb/registered/*.js
# ───────────────────────────────────────────────────────────────
location /kb/registered/ {
    # 发起鉴权子请求
    auth_request /_auth_kb_registered;

    alias /data/kb/registered/";

    # 鉴权通过后设置缓存
    expires 1h;
    add_header Cache-Control "private, max-age=3600";
    add_header X-KB-Level "registered";

    autoindex off;

    # 401错误页面
    error_page 401 = @kb_auth_required;
    # 403错误页面
    error_page 403 = @kb_forbidden;
}

# ───────────────────────────────────────────────────────────────
# L3 会员级别 — 需付费会员（mingdao角色以上）
# 路径: /kb/member/*.js
# ───────────────────────────────────────────────────────────────
location /kb/member/ {
    auth_request /_auth_kb_member;

    alias /data/kb/member/;

    expires 1h;
    add_header Cache-Control "private, max-age=3600";
    add_header X-KB-Level "member";

    autoindex off;

    error_page 401 = @kb_auth_required;
    error_page 403 = @kb_forbidden;
}

# ───────────────────────────────────────────────────────────────
# L3+ 精进级别 — 高级会员（advanced角色以上）
# 路径: /kb/premium/*.js
# ───────────────────────────────────────────────────────────────
location /kb/premium/ {
    auth_request /_auth_kb_premium;

    alias /data/kb/premium/;

    expires 1h;
    add_header Cache-Control "private, max-age=3600";
    add_header X-KB-Level "premium";

    autoindex off;

    error_page 401 = @kb_auth_required;
    error_page 403 = @kb_forbidden;
}

# ───────────────────────────────────────────────────────────────
# L4 专业级别 — 大师/医生专用（master/doctor角色）
# 路径: /kb/professional/*.js
# 包含：周易术语 + 医疗知识，严格限制
# ───────────────────────────────────────────────────────────────
location /kb/professional/ {
    auth_request /_auth_kb_professional;

    alias /data/kb/professional/;

    # 专业内容缓存时间较短，确保及时更新
    expires 30m;
    add_header Cache-Control "private, max-age=1800, no-store";
    add_header X-KB-Level "professional";
    add_header X-Content-Restriction "专业内容，严禁传播";

    autoindex off;

    error_page 401 = @kb_auth_required;
    error_page 403 = @kb_forbidden;
}

# ───────────────────────────────────────────────────────────────
# 管理员级别 — 仅管理员可访问
# 路径: /kb/admin/*.js
# ───────────────────────────────────────────────────────────────
location /kb/admin/ {
    auth_request /_auth_kb_admin;

    alias /data/kb/admin/;

    # 管理员内容不缓存
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header X-KB-Level "admin";

    autoindex off;

    error_page 401 = @kb_auth_required;
    error_page 403 = @kb_forbidden;
}


# ═══════════════════════════════════════════════════════════════
# auth_request 内部端点定义（按级别）
# 每个端点附带对应级别参数，鉴权服务据此判断权限
# ═══════════════════════════════════════════════════════════════

location = /_auth_kb_registered {
    internal;
    proxy_pass http://kb_auth_backend/_auth?kb_level=registered;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Real-IP $remote_addr;
}

location = /_auth_kb_member {
    internal;
    proxy_pass http://kb_auth_backend/_auth?kb_level=member;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Real-IP $remote_addr;
}

location = /_auth_kb_premium {
    internal;
    proxy_pass http://kb_auth_backend/_auth?kb_level=premium;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Real-IP $remote_addr;
}

location = /_auth_kb_professional {
    internal;
    proxy_pass http://kb_auth_backend/_auth?kb_level=professional;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Real-IP $remote_addr;
}

location = /_auth_kb_admin {
    internal;
    proxy_pass http://kb_auth_backend/_auth?kb_level=admin;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Real-IP $remote_addr;
}


# ═══════════════════════════════════════════════════════════════
# 错误处理命名位置
# ═══════════════════════════════════════════════════════════════

# 401 — 需要登录
location @kb_auth_required {
    default_type application/json;
    return 401 '{"error":"AUTH_REQUIRED","message":"请先登录后访问此内容"}';
}

# 403 — 权限不足
location @kb_forbidden {
    default_type application/json;
    return 403 '{"error":"KB_FORBIDDEN","message":"您的会员等级不足以访问此内容，请升级会员"}';
}


# ═══════════════════════════════════════════════════════════════
# 安全加固
# ═══════════════════════════════════════════════════════════════

# 防止路径遍历：拒绝包含 .. 的请求
if ($request_uri ~* "\.\.") {
    return 403 '{"error":"PATH_TRAVERSAL_DENIED","message":"非法请求"}';
}

# 防止直接访问原始knowledge目录（迁移后的旧路径保护）
location /knowledge/ {
    # 仅在迁移过渡期允许内部访问
    internal;
    alias /data/kb/legacy/;
}

# 速率限制（需要在 http 块中定义 limit_req_zone）
# limit_req_zone $binary_remote_addr zone=kb_access:10m rate=30r/m;
# 在各 location 中添加：
# limit_req zone=kb_access burst=10 nodelay;

# 日志格式（可在 http 块中定义）
# log_format kb_access '$remote_addr - $remote_user [$time_local] '
#                      '"$request" $status $body_bytes_sent '
#                      '"$http_referer" "$http_user_agent" '
#                      'kb_level=$sent_http_x_kb_level';
