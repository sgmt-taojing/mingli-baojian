<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="var(--ink)">
<title>报告模块配置 · 易道智鉴</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
:root{
  --ink:var(--ink);--ink2:var(--ink2);--ink3:var(--ink3);--ink4:var(--ink4);
  --paper:var(--paper);--paper2:var(--paper2);--paper3:var(--paper3);
  --gold:var(--gold);--gold2:var(--gold2);--gold3:var(--gold3);
  --cinn:var(--cinn);--cinn2:var(--cinn2);
  --jade:var(--jade);--jade2:var(--success);
  --cyan:var(--cyan);--cyan2:var(--cyan2);
  --violet:var(--violet2);--violet2:var(--violet2);
  --danger:var(--danger);
  --border:rgba(201,168,76,.15);;--success:#2ecc71}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif SC','Source Han Serif SC','SimSun',serif;background:var(--ink);color:var(--paper);min-height:100vh;padding-bottom:60px}

.nav-bar{position:sticky;top:0;z-index:100;background:rgba(8,8,8,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:12px 20px}
.nav-brand{font-family:'Ma Shan Zheng',serif;font-size:20px;color:var(--gold);letter-spacing:4px}
.nav-back{color:var(--paper3);text-decoration:none;font-size:13px;padding:6px 14px;border:1px solid var(--border);border-radius:20px;transition:all .2s}
.nav-back:hover{color:var(--gold);border-color:var(--gold)}

.file-nav-bar{display:flex;gap:0;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--ink2)}
.file-nav-btn{padding:8px 14px;font-size:12px;color:var(--paper3);text-decoration:none;border-right:1px solid var(--border);transition:all .2s;white-space:nowrap}
.file-nav-btn:hover{background:rgba(201,168,76,0.08);color:var(--gold)}
.file-nav-btn.active{background:rgba(201,168,76,0.12);color:var(--gold)}

.container{max-width:720px;margin:0 auto;padding:20px 16px}

.page-header{text-align:center;padding:30px 0 20px}
.page-header h1{font-family:'Ma Shan Zheng',serif;font-size:28px;color:var(--gold);letter-spacing:6px}
.page-header p{color:var(--paper3);font-size:12px;margin-top:8px;letter-spacing:2px}

/* 工具栏 */
.toolbar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:20px 0}
.toolbar button{padding:8px 20px;border-radius:20px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .25s}
.btn-select-all{background:rgba(39,174,96,0.12);border:1px solid rgba(39,174,96,0.35);color:var(--jade2)}
.btn-select-all:hover{background:rgba(39,174,96,0.2)}
.btn-deselect-all{background:rgba(220,53,69,0.1);border:1px solid rgba(220,53,69,0.3);color:var(--danger)}
.btn-deselect-all:hover{background:rgba(220,53,69,0.18)}
.btn-reset{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);color:var(--gold)}
.btn-reset:hover{background:rgba(201,168,76,0.18)}
.btn-save{background:rgba(201,168,76,0.15);border:1px solid var(--gold);color:var(--gold);font-weight:600}
.btn-save:hover{background:var(--gold);color:var(--ink)}

/* 模块列表 */
.module-list{display:flex;flex-direction:column;gap:10px;margin:20px 0}

.module-card{display:flex;align-items:center;gap:14px;padding:14px 16px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .25s;position:relative}
.module-card:hover{border-color:rgba(201,168,76,0.3);background:rgba(255,255,255,0.05)}
.module-card.enabled{border-color:rgba(201,168,76,0.35)}
.module-card.disabled{opacity:0.5}

.module-icon{font-size:28px;flex-shrink:0;width:44px;text-align:center}
.module-info{flex:1;min-width:0}
.module-name{font-size:15px;color:var(--paper);font-weight:500}
.module-desc{font-size:11px;color:var(--paper3);margin-top:3px}

.module-toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,0.08);position:relative;flex-shrink:0;transition:all .25s}
.module-toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:var(--paper3);top:2px;left:2px;transition:all .25s}
.module-card.enabled .module-toggle{background:rgba(201,168,76,0.3)}
.module-card.enabled .module-toggle::after{left:22px;background:var(--gold)}

.module-order{font-size:11px;color:var(--paper3);width:24px;text-align:center;flex-shrink:0}

/* 预览区 */
.preview-section{margin:24px 0}
.preview-section h3{font-size:14px;color:var(--gold);letter-spacing:3px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.preview-list{display:flex;flex-wrap:wrap;gap:6px}
.preview-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:14px;font-size:11px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);color:var(--paper2)}
.preview-tag.disabled{opacity:0.4;text-decoration:line-through}

/* 状态提示 */
.status-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(39,174,96,0.9);color:var(--paper);padding:10px 24px;border-radius:24px;font-size:13px;z-index:999;transition:transform .3s;pointer-events:none}
.status-toast.show{transform:translateX(-50%) translateY(0)}

/* 说明区 */
.info-box{background:rgba(201,168,76,0.05);border:1px solid var(--border);border-radius:8px;padding:16px;margin:20px 0;font-size:12px;color:var(--paper3);line-height:1.8}
.info-box strong{color:var(--gold)}

@media(max-width:480px){
  .container{padding:16px 12px}
  .page-header h1{font-size:22px}
  .module-card{padding:12px 10px;gap:10px}
  .module-icon{font-size:24px;width:36px}
  .module-name{font-size:14px}
}
</style>
</head>
<body>

<!-- 导航栏 -->
<div class="nav-bar">
  <a href="divination-hub.html" class="nav-back">← 返回主平台</a>
  <div class="nav-brand">易道智鉴</div>
  <div style="width:80px"></div>
</div>

<!-- 跨文件导航栏 -->
<div class="container">
  <div class="page-header">
    <h1>报告模块配置</h1>
    <p>自定义排盘化解报告内容 · 按需选用</p>
  </div>

  <div class="info-box">
    <strong>📌 使用说明</strong><br>
    • 勾选需要的模块，排盘时将只显示已选模块的内容<br>
    • 未配置时默认显示全部模块（全量输出）<br>
    • 配置保存后立即生效，影响八字排盘和化解方案渲染<br>
    • 点击"重置"可清除配置，恢复默认全量模式
  </div>

  <!-- 工具栏 -->
  <div class="toolbar">
    <button class="btn-select-all" onclick="selectAllModules()">✅ 全选</button>
    <button class="btn-deselect-all" onclick="deselectAllModules()">⬜ 全不选</button>
    <button class="btn-reset" onclick="resetConfig()">🔄 重置</button>
    <button class="btn-save" onclick="saveConfig()">💾 保存配置</button>
  </div>

  <!-- 模块列表 -->
  <div class="module-list" id="moduleList"></div>

  <!-- 预览 -->
  <div class="preview-section">
    <h3>📋 当前配置预览</h3>
    <div class="preview-list" id="previewList"></div>
  </div>

  <!-- 底部保存按钮 -->
  <div class="toolbar" style="margin-top:30px">
    <button class="btn-save" onclick="saveConfig()" style="padding:12px 40px;font-size:14px">💾 保存配置</button>
  </div>

  <div style="text-align:center;padding:20px 0;color:var(--paper3);font-size:11px">
    <div style="color:var(--gold);letter-spacing:4px;font-family:'Ma Shan Zheng',serif;font-size:14px">知命 · 改运 · 修心持善守静</div>
    <div style="margin-top:4px">易道智鉴 · 仅供参考</div>
  </div>
</div>

<div class="status-toast" id="statusToast"></div>

<script src="../js/divination-core.js"></script>
<script>
// 模块配置页面逻辑
(function(){
  // 从全局获取模块定义（divination-core.js加载后可用）
  var MODULES = window.REPORT_MODULES || {};
  var moduleIds = Object.keys(MODULES).sort(function(a,b){
    return (MODULES[a].order || 99) - (MODULES[b].order || 99);
  });

  // 当前编辑状态
  var editState = {};

  // 初始化
  function init() {
    var config = getReportConfig();
    moduleIds.forEach(function(id) {
      editState[id] = config ? (config.modules[id] !== false) : true;
    });
    renderList();
    renderPreview();
  }

  // 渲染模块列表
  function renderList() {
    var container = document.getElementById('moduleList');
    if (!container) return;
    var html = '';
    moduleIds.forEach(function(id, idx) {
      var m = MODULES[id];
      var enabled = editState[id];
      html += '<div class="module-card ' + (enabled ? 'enabled' : 'disabled') + '" onclick="toggleModule(\'' + id + '\')">';
      html += '<div class="module-order">' + (idx + 1) + '</div>';
      html += '<div class="module-icon">' + (m.icon || '📋') + '</div>';
      html += '<div class="module-info">';
      html += '<div class="module-name">' + m.name + '</div>';
      html += '<div class="module-desc">' + m.desc + '</div>';
      html += '</div>';
      html += '<div class="module-toggle"></div>';
      html += '</div>';
    });
    container.innerHTML = html;
  }

  // 渲染预览
  function renderPreview() {
    var container = document.getElementById('previewList');
    if (!container) return;
    var html = '';
    moduleIds.forEach(function(id) {
      var m = MODULES[id];
      var enabled = editState[id];
      var cls = enabled ? '' : 'disabled';
      html += '<span class="preview-tag ' + cls + '">' + (m.icon || '') + ' ' + m.name + '</span>';
    });
    container.innerHTML = html;
  }

  // 切换单个模块
  window.toggleModule = function(id) {
    editState[id] = !editState[id];
    renderList();
    renderPreview();
  };

  // 全选
  window.selectAllModules = function() {
    moduleIds.forEach(function(id) { editState[id] = true; });
    renderList();
    renderPreview();
    showToast('已全选');
  };

  // 全不选
  window.deselectAllModules = function() {
    moduleIds.forEach(function(id) { editState[id] = false; });
    renderList();
    renderPreview();
    showToast('已全不选');
  };

  // 重置
  window.resetConfig = function() {
    resetReportConfig();
    moduleIds.forEach(function(id) { editState[id] = true; });
    renderList();
    renderPreview();
    showToast('已重置为默认全量模式');
  };

  // 保存
  window.saveConfig = function() {
    var modules = {};
    moduleIds.forEach(function(id) {
      modules[id] = editState[id];
    });
    saveReportConfig(modules, moduleIds);
    showToast('✅ 配置已保存');
  };

  // toast
  function showToast(msg) {
    var el = document.getElementById('statusToast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2000);
  }

  // 启动
  if (Object.keys(MODULES).length === 0) {
    // divination-core.js 可能未完全加载，延迟重试
    setTimeout(function() {
      MODULES = window.REPORT_MODULES || {};
      moduleIds = Object.keys(MODULES).sort(function(a,b){
        return (MODULES[a].order || 99) - (MODULES[b].order || 99);
      });
      init();
    }, 200);
  } else {
    init();
  }
})();
</script>

</body>
</html>
