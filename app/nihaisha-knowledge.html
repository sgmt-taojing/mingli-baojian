<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>倪海厦·中医国学知识库</title>
<style>
:root{--gold:#c9a84c;--gold2:#b8932f;--paper:#f5f0e8;--paper3:#8a8275;--title:#2c2823;--border:rgba(201,168,76,.2);--jade:#5a8a6a;--bg:#1a1e14;--card:#222520;--card2:#2c2b26}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--paper);font-family:'Noto Serif SC',serif;line-height:1.8;min-height:100vh}
.header{background:linear-gradient(135deg,#2c2823,#1a1e14);border-bottom:1px solid var(--border);padding:20px 24px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-size:20px;color:var(--gold);letter-spacing:3px}
.header h1 span{font-size:12px;color:var(--paper3);letter-spacing:1px;display:block;margin-top:2px}
.back-btn{color:var(--paper3);text-decoration:none;font-size:12px;padding:6px 16px;border:1px solid var(--border);border-radius:16px;transition:all .25s}
.back-btn:hover{background:rgba(201,168,76,.1);color:var(--gold);border-color:rgba(201,168,76,.3)}
.container{max-width:1200px;margin:0 auto;padding:24px 16px}
.nav-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.nav-tab{padding:10px 20px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--paper3);cursor:pointer;font-size:13px;letter-spacing:2px;transition:all .25s;font-family:'Noto Serif SC',serif}
.nav-tab:hover{border-color:rgba(201,168,76,.3);color:var(--gold)}
.nav-tab.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;color:var(--gold);margin-bottom:12px;letter-spacing:2px;border-bottom:1px solid var(--border);padding-bottom:8px}
.card-body{font-size:13px;line-height:2;color:var(--paper);opacity:.9}
.card-body b{color:var(--gold2)}
.card-body ul{list-style:none;padding-left:0}
.card-body li{padding:4px 0;padding-left:16px;position:relative}
.card-body li::before{content:'·';color:var(--gold);position:absolute;left:0}
.warning{background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.2);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#e74c3c;opacity:.8}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
@media(max-width:768px){.grid{grid-template-columns:1fr}.header h1{font-size:16px}.container{padding:16px 12px}}
.footer{text-align:center;padding:24px;color:var(--paper3);font-size:11px;opacity:.5}
</style>
</head>
<body>
<div class="header">
<div class="header-inner">
<h1>倪海厦·中医国学知识库<span>天纪·伤寒论·金匮要略·针灸·本草 — 学习参考</span></h1>
<a href="divination-hub.html" class="back-btn">← 返回主平台</a>
</div>
</div>
<div class="container">
<div class="warning">⚠️ 本知识库仅供学习参考，不作为医疗诊断、处方或治疗建议。涉及健康问题请咨询专业医师。</div>
<div class="nav-tabs" id="navTabs"></div>
<div id="content"></div>
</div>
<div class="footer">倪海厦中医课程知识库 (nihaisha-nishi-tcm) · 15748行references · 14大模块<br>知识提取时间：2026-07-18 · Skill已安装：~/.openclaw-autoclaw/skills/nihaisha/</div>
<script src="../knowledge/nihaisha-tcm-kb.js"></script>
<script>
var KB=window.NIHAISHA_TCM_KB||{};
var tabs=[
{id:'tianji',name:'🌟 天纪·紫微风水'},
{id:'liujing',name:'🌡️ 六经辨证'},
{id:'wuxing',name:'🌿 五行养生'},
{id:'fangzheng',name:'💊 方证对应'},
{id:'zhenjiu',name:'📌 针灸经络'},
{id:'anli',name:'📋 临床案例'},
{id:'huangdi',name:'📖 黄帝内经'},
{id:'bencao',name:'🌱 神农本草'},
{id:'bagang',name:'⚖️ 八纲辨证'},
{id:'zhongjing',name:'🔮 仲景心法'},
{id:'fuyang',name:'☀️ 扶阳论坛'},
{id:'yijinjing',name:'🧘 易筋经'},
{id:'liangdong',name:'📺 梁冬对话'},
{id:'stanford',name:'🎓 斯坦福演讲'}
];
var nav=document.getElementById('navTabs');
var content=document.getElementById('content');
tabs.forEach(function(t,i){
var btn=document.createElement('button');
btn.className='nav-tab'+(i===0?' active':'');
btn.textContent=t.name;
btn.onclick=function(){document.querySelectorAll('.nav-tab').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');showPanel(t.id)};
nav.appendChild(btn);
});
function showPanel(id){
content.innerHTML='';
var p=document.createElement('div');
p.className='panel active';
var html='';
try{
var data=KB[id];
if(!data){html='<div class="card"><div class="card-body">该模块内容正在整理中...</div></div>';p.innerHTML=html;content.appendChild(p);return;}
if(typeof data==='object'){
Object.keys(data).forEach(function(key){
var v=data[key];
html+='<div class="card"><div class="card-title">'+key+'</div><div class="card-body">';
if(typeof v==='string'){html+='<p>'+v+'</p>';}
else if(Array.isArray(v)){html+='<ul>';v.forEach(function(it){html+='<li>'+(typeof it==='string'?it:JSON.stringify(it))+'</li>'});html+='</ul>';}
else if(typeof v==='object'){
if(v.content){html+='<p>'+v.content+'</p>';}
if(v.items){html+='<ul>';v.items.forEach(function(it){html+='<li>'+(typeof it==='string'?it:JSON.stringify(it))+'</li>'});html+='</ul>';}
Object.keys(v).forEach(function(sk){
if(sk!=='content'&&sk!=='items'){
var sv=v[sk];
html+='<p><b>'+sk+'：</b>'+(typeof sv==='string'?sv:JSON.stringify(sv))+'</p>';
}
});
}else{html+='<p>'+String(v)+'</p>';}
html+='</div></div>';
});
}else{html='<div class="card"><div class="card-body"><p>'+String(data)+'</p></div></div>';}
}catch(e){html='<div class="card"><div class="card-body">内容加载中...'+e.message+'</div></div>';}
if(!html){html='<div class="card"><div class="card-body">该模块内容正在整理中...</div></div>';}
p.innerHTML=html;
content.appendChild(p);
}
showPanel('tianji');
</script>
</body>
</html>
