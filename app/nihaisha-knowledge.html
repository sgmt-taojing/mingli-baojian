<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>倪海厦·中医国学知识库</title>
<style>
:root{--gold:#c9a84c;--gold2:#b8932f;--paper:#f5f0e8;--paper3:#8a8275;--title:#2c2823;--border:rgba(201,168,76,.2);--jade:#5a8a6a;--bg:#1a1e14;--card:#222520;--card2:#2c2b26}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--paper);font-family:'Noto Serif SC',serif;line-height:1.8;min-height:100vh}
.header{background:linear-gradient(135deg,#2c2823,#1a1e14);border-bottom:1px solid var(--border);padding:20px 24px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-size:20px;color:var(--gold);letter-spacing:3px}
.header h1 span{font-size:12px;color:var(--paper3);letter-spacing:1px;display:block;margin-top:2px}
.back-btn{color:var(--paper3);text-decoration:none;font-size:12px;padding:6px 16px;border:1px solid var(--border);border-radius:16px;transition:all .25s}
.back-btn:hover{background:rgba(201,168,76,.1);color:var(--gold);border-color:rgba(201,168,76,.3)}
.container{max-width:1200px;margin:0 auto;padding:24px 16px}
.nav-section{margin-bottom:12px}
.nav-section-title{font-size:11px;color:var(--paper3);letter-spacing:2px;margin-bottom:6px;opacity:.6;text-transform:uppercase}
.nav-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.nav-tab{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--paper3);cursor:pointer;font-size:12px;letter-spacing:1px;transition:all .25s;font-family:'Noto Serif SC',serif}
.nav-tab:hover{border-color:rgba(201,168,76,.3);color:var(--gold)}
.nav-tab.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;color:var(--gold);margin-bottom:12px;letter-spacing:2px;border-bottom:1px solid var(--border);padding-bottom:8px}
.card-body{font-size:13px;line-height:2;color:var(--paper);opacity:.9}
.card-body b{color:var(--gold2)}
.card-body ul{list-style:none;padding-left:0}
.card-body li{padding:4px 0;padding-left:16px;position:relative}
.card-body li::before{content:'·';color:var(--gold);position:absolute;left:0}
.card-body p{margin-bottom:8px}
.card-body .sub-title{color:var(--gold2);font-size:14px;margin-top:10px;display:block}
.warning{background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.2);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#e74c3c;opacity:.8}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.search-box{margin-bottom:16px;display:flex;gap:8px}
.search-input{flex:1;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--paper);font-size:13px;font-family:inherit;outline:none}
.search-input:focus{border-color:var(--gold)}
@media(max-width:768px){.grid{grid-template-columns:1fr}.header h1{font-size:16px}.container{padding:16px 12px}.nav-tab{padding:6px 12px;font-size:11px}}
.footer{text-align:center;padding:24px;color:var(--paper3);font-size:11px;opacity:.5}
</style>
</head>
<body>
<div class="header">
<div class="header-inner">
<h1>倪海厦·中医国学知识库<span>天纪·伤寒论·金匮要略·针灸·本草·仲景心法·扶阳·易筋经 — 学习参考</span></h1>
<a href="divination-hub.html" class="back-btn">← 返回主平台</a>
</div>
</div>
<div class="container">
<div class="warning">⚠️ 本知识库仅供学习参考，不作为医疗诊断、处方或治疗建议。涉及健康问题请咨询专业医师。</div>
<div class="search-box">
<input type="text" class="search-input" id="globalSearch" placeholder="🔍 搜索知识库（方名/症状/穴位/课次...）" onkeyup="if(event.key==='Enter')doSearch()">
</div>
<div id="navTabs"></div>
<div id="content"></div>
</div>
<div class="footer">倪海厦中医课程知识库 · 43个模块 · 5730行 · 全量移植自 nihaisha-nishi-tcm 仓库<br>知识提取时间：2026-07-18 · Skill已安装：~/.openclaw-autoclaw/skills/nihaisha/</div>
<script src="../knowledge/nihaisha-tcm-kb.js"></script>
<script src="../knowledge/nihaisha-batch1.js"></script>
<script src="../knowledge/nihaisha-batch2.js"></script>
<script src="../knowledge/nihaisha-batch3.js"></script>
<script src="../knowledge/nihaisha-batch4.js"></script>
<script src="../knowledge/nihaisha-classics-kb.js"></script>
<script>
var KB=window.NIHAISHA_TCM_KB||{};
// 合并全量移植batch（优先级最高，覆盖精简版）
['NIHAISHA_BATCH1','NIHAISHA_BATCH2','NIHAISHA_BATCH3','NIHAISHA_BATCH4'].forEach(function(k){
  if(window[k]){Object.assign(KB, window[k]);}
});
// 合并经典方剂KB（11份桌面PDF/87721字）
if(window.NIHAISHA_CLASSICS_KB){
  KB._classics = window.NIHAISHA_CLASSICS_KB;
  console.log('[倪师经典KB] 已合并', window.NIHAISHA_CLASSICS_KB._meta);
}
window.NIHAISHA_TCM_KB = KB;

// 46个模块，按分类分组（排除_meta）
var tabGroups=[
{group:'📚 课程模块',tabs:[
{id:'index',name:'📋 总览'},
{id:'tianji',name:'🌟 天纪'},
{id:'shanghanlun',name:'📖 伤寒论'},
{id:'jingui',name:'📕 金匮要略'},
{id:'huangdi',name:'🏺 黄帝内经'},
{id:'bencao',name:'🌱 神农本草'},
{id:'acupuncture',name:'📌 针灸大成'},
{id:'bagang',name:'⚖️ 八纲辨证'},
{id:'zhongjing-xinfa',name:'🔮 仲景心法'},
{id:'fuyang',name:'☀️ 扶阳论坛'},
{id:'yijinjing',name:'🧘 易筋经'},
{id:'liangdong',name:'📺 梁冬对话'},
{id:'stanford',name:'🎓 斯坦福演讲'},
{id:'clinical-cases',name:'📋 临床案例'},
{id:'formula-patterns',name:'💊 方证对应'},
{id:'symptom-index',name:'🩺 症状索引'},
{id:'six-channel',name:'☯️ 六经辨证'},
{id:'lesson-map',name:'🗺️ 课次地图'},
{id:'learning-entry',name:'📚 学习入口'},
{id:'beginner-questions',name:'💬 初学问答'},
{id:'usage-scenarios',name:'🎯 使用场景'},
{id:'ebooks',name:'📖 电子书'},
{id:'audio-collection',name:'🎧 音频合集'}
]},
{group:'💊 经典与方剂',tabs:[
{id:'_classics',name:'📜 中医经典（11份）'}
]},
{group:'📝 笔记模块',tabs:[
{id:'notes-shanghan',name:'📝 伤寒笔记'},
{id:'notes-jingui',name:'📝 金匮笔记'},
{id:'notes-huangdi',name:'📝 内经笔记'},
{id:'notes-bencao',name:'📝 本草笔记'},
{id:'notes-acupuncture-dacheng',name:'📝 针灸笔记'},
{id:'notes-shanghan-scan-essence',name:'🔍 伤寒扫描精华'},
{id:'notes-bencao-scan-essence',name:'🔍 本草扫描精华'},
{id:'notes-huangdi-scan-essence',name:'🔍 内经扫描精华'},
{id:'notes-acupuncture-dacheng-scan-essence',name:'🔍 针灸扫描精华'}
]},
{group:'📸 截图证据',tabs:[
{id:'screenshot-evidence',name:'📸 截图总览'},
{id:'tianji-screenshot-evidence',name:'📸 天纪截图'},
{id:'jingui-screenshot-evidence',name:'📸 金匮截图'},
{id:'huangdi-screenshot-evidence',name:'📸 内经截图'},
{id:'bencao-screenshot-evidence',name:'📸 本草截图'},
{id:'acupuncture-screenshot-evidence',name:'📸 针灸截图'},
{id:'clinical-cases-screenshot-evidence',name:'📸 临床截图'},
{id:'bagang-screenshot-evidence',name:'📸 八纲截图'},
{id:'fuyang-screenshot-evidence',name:'📸 扶阳截图'},
{id:'yijinjing-screenshot-evidence',name:'📸 易筋经截图'},
{id:'zhongjing-xinfa-screenshot-evidence',name:'📸 仲景截图'}
]},
{group:'🔗 其他',tabs:[
{id:'crossModuleThemes',name:'🔗 跨模块主题'},
{id:'mingliCorrelation',name:'🔮 命理关联'}
]}
];

var nav=document.getElementById('navTabs');
var content=document.getElementById('content');
var currentTab='index';

// Build grouped nav
tabGroups.forEach(function(g){
var section=document.createElement('div');
section.className='nav-section';
var sectionTitle=document.createElement('div');
sectionTitle.className='nav-section-title';
sectionTitle.textContent=g.group;
section.appendChild(sectionTitle);
var tabsDiv=document.createElement('div');
tabsDiv.className='nav-tabs';
g.tabs.forEach(function(t){
var btn=document.createElement('button');
btn.className='nav-tab';
btn.textContent=t.name;
btn.dataset.tabId=t.id;
btn.onclick=function(){
document.querySelectorAll('.nav-tab').forEach(function(b){b.classList.remove('active')});
btn.classList.add('active');
currentTab=t.id;
showPanel(t.id);
};
tabsDiv.appendChild(btn);
});
section.appendChild(tabsDiv);
nav.appendChild(section);
});

// Activate first tab
document.querySelector('.nav-tab').classList.add('active');

function escapeHTML(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderValue(v,depth){
var html='';
if(v===null||v===undefined){return '<p>—</p>';}
if(typeof v==='string'){
html+='<p>'+escapeHTML(v)+'</p>';
}else if(Array.isArray(v)){
html+='<ul>';
v.forEach(function(it){
if(typeof it==='string'){
html+='<li>'+escapeHTML(it)+'</li>';
}else if(typeof it==='object'&&it){
var parts=[];
if(it.title)parts.push('<b>'+escapeHTML(it.title)+'</b>');
if(it.name)parts.push('<b>'+escapeHTML(it.name)+'</b>');
if(it.desc)parts.push(escapeHTML(it.desc));
if(it.content)parts.push(escapeHTML(it.content));
if(it.theory)parts.push(escapeHTML(it.theory));
if(it.fang)parts.push('方剂：<b>'+escapeHTML(it.fang)+'</b>');
if(it.zheng)parts.push('证候：'+escapeHTML(it.zheng));
if(it.jiaoji)parts.push('禁忌：'+escapeHTML(it.jiaoji));
if(it.source)parts.push('<i style="color:var(--paper3)">来源：'+escapeHTML(it.source)+'</i>');
if(it.tip)parts.push(escapeHTML(it.tip));
for(var k in it){
if(['title','name','desc','content','theory','fang','zheng','jiaoji','source','tip'].indexOf(k)<0){
parts.push('<b>'+k+'：</b>'+escapeHTML(typeof it[k]==='string'?it[k]:JSON.stringify(it[k])));
}
}
html+='<li>'+parts.join(' · ')+'</li>';
}else{
html+='<li>'+escapeHTML(String(it))+'</li>';
}
});
html+='</ul>';
}else if(typeof v==='object'){
Object.keys(v).forEach(function(key){
var sv=v[key];
html+='<span class="sub-title">◆ '+escapeHTML(key)+'</span>';
if(typeof sv==='string'){
html+='<p>'+escapeHTML(sv)+'</p>';
}else if(Array.isArray(sv)){
html+='<ul>';
sv.forEach(function(it){
if(typeof it==='string'){html+='<li>'+escapeHTML(it)+'</li>';}
else if(typeof it==='object'&&it){
var parts=[];
for(var k in it){
if(typeof it[k]==='string'){parts.push('<b>'+k+'：</b>'+escapeHTML(it[k]));}
}
html+='<li>'+parts.join(' · ')+'</li>';
}else{html+='<li>'+escapeHTML(String(it))+'</li>';}
});
html+='</ul>';
}else if(typeof sv==='object'&&sv){
html+='<div style="margin-left:12px;padding-left:12px;border-left:2px solid var(--border)">';
html+=renderValue(sv,depth+1);
html+='</div>';
}else{
html+='<p>'+escapeHTML(String(sv))+'</p>';
}
});
}else{
html+='<p>'+escapeHTML(String(v))+'</p>';
}
return html;
}

function showPanel(id){
content.innerHTML='';
var p=document.createElement('div');
p.className='panel active';
var html='';
try{
var data=KB[id];
if(!data){html='<div class="card"><div class="card-body">该模块内容正在整理中...</div></div>';p.innerHTML=html;content.appendChild(p);return;}

if(typeof data==='object'){
Object.keys(data).forEach(function(key){
var v=data[key];
var title=key.replace(/_/g,' ');
html+='<div class="card"><div class="card-title">'+escapeHTML(title)+'</div><div class="card-body">';
html+=renderValue(v,0);
html+='</div></div>';
});
}else{
html='<div class="card"><div class="card-body"><p>'+escapeHTML(String(data))+'</p></div></div>';
}
}catch(e){
html='<div class="card"><div class="card-body">内容加载中...'+escapeHTML(e.message)+'</div></div>';
}
if(!html){html='<div class="card"><div class="card-body">该模块内容正在整理中...</div></div>';}
p.innerHTML=html;
content.appendChild(p);
}

function doSearch(){
var q=document.getElementById('globalSearch').value.trim().toLowerCase();
if(!q){showPanel(currentTab);return;}
var results=[];
var searchIn=function(obj,path){
if(typeof obj==='string'){
if(obj.toLowerCase().indexOf(q)>-1){results.push({title:path,body:obj.substring(0,200)});}
}else if(Array.isArray(obj)){
obj.forEach(function(it,i){searchIn(it,path+'['+i+']');});
}else if(typeof obj==='object'&&obj){
Object.keys(obj).forEach(function(k){searchIn(obj[k],path+'.'+k);});
}
};
searchIn(KB,'');
var p=document.createElement('div');
p.className='panel active';
var html='';
if(results.length===0){
html='<div class="card"><div class="card-body">未找到包含"'+escapeHTML(q)+'"的内容</div></div>';
}else{
html='<div class="card"><div class="card-title">搜索结果（'+results.length+'条）</div><div class="card-body">';
results.slice(0,50).forEach(function(r){
html+='<p><b>'+escapeHTML(r.title)+'</b></p><p style="color:var(--paper3);font-size:12px;margin-bottom:10px">'+escapeHTML(r.body)+'</p>';
});
html+='</div></div>';
}
p.innerHTML=html;
content.innerHTML='';
content.appendChild(p);
}

document.getElementById('globalSearch').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
showPanel('index');
</script>
</body>
</html>
