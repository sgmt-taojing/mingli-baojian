<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商城管理后台 · 易道智鉴</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
:root{
  --ink:var(--ink);--ink2:var(--ink2);--ink3:var(--ink3);--ink4:var(--ink4);
  --paper:var(--paper);--paper2:var(--paper2);--paper3:var(--paper3);
  --gold:var(--gold);--gold2:var(--gold2);--gold3:var(--gold3);
  --cinn:var(--cinn);--cinn2:var(--cinn2);
  --jade:var(--jade);--jade2:var(--success);
  --cyan:var(--cyan);--cyan2:var(--cyan2);
  --danger:var(--danger);
  --gold-bright:var(--gold);
  --gray-light:var(--paper3);--gray:var(--steel);;--steel:#7f8c8d;--success:#2ecc71;--metal:#95a5a6}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Noto Serif SC',serif;background:var(--ink);color:var(--paper);min-height:100vh;line-height:1.7}
a{color:var(--gold2);text-decoration:none}
a:hover{color:var(--gold-bright)}

/* 顶部导航 */
.topbar{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,var(--ink2) 0%,var(--ink3) 100%);border-bottom:2px solid var(--gold3);box-shadow:0 2px 20px rgba(201,168,76,.15)}
.topbar-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.5rem;flex-wrap:wrap;gap:.5rem}
.topbar-title{font-family:'Ma Shan Zheng',cursive;font-size:1.5rem;color:var(--gold2);display:flex;align-items:center;gap:.5rem}
.topbar-title .sub{font-family:'Noto Serif SC';font-size:.8rem;color:var(--gray-light);font-weight:300}
.topbar-actions{display:flex;gap:.5rem;align-items:center}

.container{max-width:1400px;margin:0 auto;padding:1.5rem}

/* 管理导航 */
.shop-admin-nav{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:1.5rem;border-bottom:1px solid var(--ink4);padding-bottom:.8rem}
.shop-admin-nav a{padding:.5rem 1rem;border-radius:6px;font-size:.85rem;color:var(--paper2);transition:all .2s;white-space:nowrap;cursor:pointer;border:1px solid transparent}
.shop-admin-nav a:hover,.shop-admin-nav a.active{background:var(--gold3);color:var(--ink);border-color:var(--gold3)}

/* 区块 */
.shop-admin-section{display:none;animation:fadeIn .3s ease}
.shop-admin-section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.section-header{margin-bottom:1.5rem;padding-bottom:.8rem;border-bottom:1px solid var(--ink4);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.section-header h2{font-family:'ZCOOL XiaoWei',serif;font-size:1.6rem;color:var(--gold2)}
.section-header p{color:var(--gray-light);font-size:.85rem;margin-top:.3rem}

/* 仪表盘卡片 */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem}
.card{background:linear-gradient(135deg,var(--ink2),var(--ink3));border:1px solid var(--ink4);border-radius:10px;padding:1.5rem;transition:all .25s;position:relative;text-align:center}
.card:hover{border-color:var(--gold3);box-shadow:0 4px 20px rgba(201,168,76,.1);transform:translateY(-2px)}
.card .stat{font-size:2.2rem;font-weight:700;color:var(--gold-bright)}
.card .meta{font-size:.8rem;color:var(--gray-light);margin-top:.3rem}

/* 表格 */
.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--ink4)}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead{background:var(--ink2)}
th{padding:.7rem .8rem;text-align:left;color:var(--gold2);font-weight:500;border-bottom:2px solid var(--gold3);white-space:nowrap}
td{padding:.6rem .8rem;border-bottom:1px solid var(--ink3);color:var(--paper2);vertical-align:middle}
tr:hover td{background:var(--ink2)}

/* 徽章 */
.badge{display:inline-block;padding:.15rem .6rem;border-radius:10px;font-size:.7rem;font-weight:500}
.badge-ok{background:rgba(39,174,96,.2);color:var(--jade2);border:1px solid var(--jade)}
.badge-err{background:rgba(220,53,69,.2);color:var(--danger);border:1px solid var(--danger)}

/* 搜索/筛选栏 */
.toolbar{display:flex;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{background:var(--ink);border:1px solid var(--ink4);border-radius:6px;padding:.5rem .8rem;color:var(--paper);font-family:inherit;font-size:.82rem;outline:none;transition:border-color .2s}
.toolbar input:focus,.toolbar select:focus{border-color:var(--gold3)}
.toolbar input{flex:1;min-width:200px}
.toolbar input::placeholder{color:var(--gray)}

/* 按钮 */
.btn{display:inline-block;padding:.5rem 1.2rem;border-radius:6px;cursor:pointer;border:none;font-family:inherit;font-size:.82rem;font-weight:500;transition:all .2s;text-decoration:none}
.btn-primary{background:var(--gold3);color:var(--ink)}
.btn-primary:hover{background:var(--gold2)}
.btn-outline{background:transparent;border:1px solid var(--gold3);color:var(--gold2);cursor:pointer}
.btn-outline:hover{background:var(--gold3);color:var(--ink)}
.btn-sm{padding:.3rem .7rem;font-size:.75rem}
.btn-danger{background:rgba(220,53,69,.15);border:1px solid var(--danger);color:var(--danger);cursor:pointer}
.btn-danger:hover{background:var(--danger);color:var(--paper)}
.btn-green{background:rgba(39,174,96,.15);border:1px solid var(--jade);color:var(--jade2);cursor:pointer}
.btn-green:hover{background:var(--jade);color:var(--paper)}

/* 表单 */
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.82rem;color:var(--gold2);margin-bottom:.3rem;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--ink);border:1px solid var(--ink4);border-radius:6px;padding:.6rem .8rem;color:var(--paper);font-family:inherit;font-size:.85rem;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold3)}
.form-group textarea{min-height:80px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.form-actions{display:flex;gap:.5rem;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--ink4)}

/* 图片上传区 */
.upload-zone{border:2px dashed var(--ink4);border-radius:10px;padding:2rem;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:.5rem}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--gold3);background:rgba(201,168,76,.05)}
.upload-zone .upload-icon{font-size:2rem;margin-bottom:.5rem}
.upload-zone .upload-text{font-size:.85rem;color:var(--gray-light)}
.upload-zone .upload-hint{font-size:.75rem;color:var(--gray);margin-top:.3rem}
.image-previews{display:flex;gap:.8rem;flex-wrap:wrap;margin-top:.8rem}
.img-preview-item{width:100px;height:100px;border-radius:8px;border:1px solid var(--ink4);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--ink2);flex-shrink:0}
.img-preview-item img{width:100%;height:100%;object-fit:cover}
.img-preview-item.empty{border-style:dashed}
.img-remove-btn{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:rgba(220,53,69,.8);color:var(--paper);border:none;cursor:pointer;font-size:12px;line-height:20px;text-align:center;padding:0}
.img-remove-btn:hover{background:var(--danger)}
.img-main-badge{position:absolute;bottom:2px;left:2px;background:var(--gold3);color:var(--ink);font-size:10px;padding:1px 5px;border-radius:4px;font-weight:600}

/* 分类列表 */
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1rem;background:var(--ink2);border:1px solid var(--ink4);border-radius:8px;margin-bottom:.5rem;transition:all .2s}
.cat-item:hover{border-color:var(--gold3)}
.cat-info{display:flex;align-items:center;gap:.5rem}
.cat-actions{display:flex;gap:.3rem}

/* 确认弹窗 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--ink2);border:1px solid var(--ink4);border-radius:10px;padding:1.5rem;max-width:400px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.modal-box h3{color:var(--gold2);margin-bottom:.8rem;font-family:'ZCOOL XiaoWei';font-size:1.2rem}
.modal-box p{color:var(--paper2);font-size:.85rem;margin-bottom:1.2rem;line-height:1.6;white-space:pre-line}
.modal-actions{display:flex;gap:.5rem;justify-content:flex-end}

/* 页脚 */
footer{text-align:center;padding:2rem 1rem;border-top:1px solid var(--ink4);margin-top:2rem;font-size:.75rem;color:var(--gray-light)}
footer a{color:var(--gold2);margin:0 .5rem}

/* 响应式 */
@media(max-width:768px){
  .topbar-inner{padding:.5rem .8rem}
  .topbar-title{font-size:1.1rem}
  .container{padding:.8rem}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .card-grid{grid-template-columns:1fr 1fr}
  .shop-admin-nav{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .shop-admin-nav a{padding:.4rem .7rem;font-size:.78rem}
}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:var(--ink4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold3)}
.highlight{background:rgba(201,168,76,.15);border-radius:3px;padding:0 .2rem}
</style>
</head>
<body>
<div style="position:fixed;top:12px;right:12px;z-index:99998">
  <a href="tcm-clinic.html" style="display:inline-block;padding:6px 16px;background:rgba(201,168,76,0.12);color:var(--gold,#c9a84c);border:1px solid rgba(201,168,76,0.25);border-radius:16px;font-size:12px;text-decoration:none;font-family:'Noto Serif SC',serif;letter-spacing:1px">🏥 中医诊疗</a>
</div>

<!-- 顶部导航 -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="topbar-title">🛍️ 易道智鉴 <span class="sub">· 商城管理后台</span></div>
    <div class="topbar-actions">
      <button class="btn btn-outline btn-sm" onclick="window._shopAdmin.exportData()">📥 导出数据</button>
      <button class="btn btn-outline btn-sm" onclick="window._shopAdmin.importData()">📤 导入数据</button>
      <button class="btn btn-outline btn-sm" onclick="window._shopAdmin.resetData()">🔄 重置</button>
      <a href="divination-hub.html" class="btn btn-outline btn-sm">🏠 返回主站</a>
      <a href="admin.html" class="btn btn-outline btn-sm">📊 主后台</a>
    </div>
  </div>
</div>

<!-- 管理导航 -->
<div class="container">
  <nav class="shop-admin-nav">
    <a href="#" data-shop-section="dashboard" class="active">📊 概览</a>
    <a href="#" data-shop-section="products">📦 商品管理</a>
    <a href="#" data-shop-section="categories">📂 分类管理</a>
  </nav>

  <!-- 仪表盘 -->
  <section id="shop-section-dashboard" class="shop-admin-section active">
    <div class="section-header">
      <h2>📊 商品概览</h2>
    </div>
    <div class="card-grid" id="shop-dashboard-stats"></div>
    <div style="display:flex;gap:.8rem;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="window._shopAdmin.openAddProduct()">➕ 新增商品</button>
      <button class="btn btn-outline" onclick="window._shopAdmin.showSection('products')">📦 查看所有商品</button>
    </div>
  </section>

  <!-- 商品管理 -->
  <section id="shop-section-products" class="shop-admin-section">
    <div class="section-header">
      <div><h2>📦 商品管理</h2><p>管理所有商品的上架、编辑和删除</p></div>
      <button class="btn btn-primary" onclick="window._shopAdmin.openAddProduct()">➕ 新增商品</button>
    </div>
    
    <div class="toolbar">
      <input type="text" id="shop-search-input" placeholder="🔍 搜索商品名称、描述、标签...">
      <select id="shop-category-filter" onchange="window._shopAdmin.filterByCategory()">
        <option value="all">全部分类</option>
      </select>
      <select id="shop-status-filter" onchange="window._shopAdmin.filterByStatus()">
        <option value="all">全部状态</option>
        <option value="online">已上架</option>
        <option value="offline">已下架</option>
      </select>
    </div>
    
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>图片</th>
            <th>名称</th>
            <th>分类</th>
            <th>价格</th>
            <th>库存</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="shop-product-tbody"></tbody>
      </table>
    </div>
    
    <div id="shop-product-pagination" style="text-align:center;margin-top:1rem;color:var(--gray);font-size:.8rem">
      <span id="shop-product-count"></span>
    </div>
  </section>

  <!-- 商品表单 -->
  <section id="shop-section-product-form" class="shop-admin-section">
    <div class="section-header">
      <div><h2 id="product-form-title">新增商品</h2></div>
      <div>
        <button class="btn btn-outline btn-sm" onclick="window._shopAdmin.showSection('products')">← 返回列表</button>
      </div>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label>商品名称 *</label>
        <input type="text" id="prod-name" placeholder="输入商品名称">
      </div>
      <div class="form-group">
        <label>价格 *</label>
        <input type="text" id="prod-price" placeholder="如 ¥168 或 ¥168-588">
      </div>
    </div>
    
    <div class="form-row-3">
      <div class="form-group">
        <label>分类 *</label>
        <select id="prod-category" onchange="window._shopAdmin.onCategoryChange()">
          <option value="">-- 选择分类 --</option>
        </select>
      </div>
      <div class="form-group">
        <label>子分类</label>
        <select id="prod-subcategory">
          <option value="">-- 选择子分类 --</option>
        </select>
      </div>
      <div class="form-group">
        <label>状态</label>
        <select id="prod-status">
          <option value="online">上架</option>
          <option value="offline">下架</option>
        </select>
      </div>
    </div>
    
    <div class="form-row-3">
      <div class="form-group">
        <label>原价</label>
        <input type="text" id="prod-original-price" placeholder="如 ¥298">
      </div>
      <div class="form-group">
        <label>库存</label>
        <input type="number" id="prod-stock" value="0" min="0">
      </div>
      <div class="form-group">
        <label>销量</label>
        <input type="number" id="prod-sales" value="0" min="0">
      </div>
    </div>
    
    <div class="form-row-3">
      <div class="form-group">
        <label>材质</label>
        <input type="text" id="prod-material" placeholder="如 纯铜精铸">
      </div>
      <div class="form-group">
        <label>规格尺寸</label>
        <input type="text" id="prod-size" placeholder="如 高度8-15cm">
      </div>
      <div class="form-group">
        <label>产地/来源</label>
        <input type="text" id="prod-origin" placeholder="如 浙江杭州">
      </div>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label>作者/品牌</label>
        <input type="text" id="prod-author" placeholder="作者或品牌名称">
      </div>
      <div class="form-group">
        <label>评分</label>
        <input type="number" id="prod-rating" value="4.5" min="0" max="5" step="0.1" style="width:100px">
      </div>
    </div>
    
    <div class="form-group">
      <label>标签（用逗号分隔）</label>
      <input type="text" id="prod-tags" placeholder="如 招财, 补金, 镇宅">
    </div>
    
    <div class="form-group">
      <label>商品描述</label>
      <textarea id="prod-description" rows="2" placeholder="简短描述商品"></textarea>
    </div>
    
    <div class="form-group">
      <label>功效/特点</label>
      <textarea id="prod-effects" rows="2" placeholder="功效描述"></textarea>
    </div>
    
    <div class="form-group">
      <label>适用人群</label>
      <textarea id="prod-suitable" rows="2" placeholder="适用人群描述"></textarea>
    </div>
    
    <div class="form-group">
      <label>推荐理由</label>
      <textarea id="prod-reason" rows="2" placeholder="推荐理由"></textarea>
    </div>
    
    <!-- 图片上传 -->
    <div class="form-group">
      <label>商品图片（最多5张，第一张为主图）</label>
      <div class="upload-zone" id="image-drop-zone">
        <div class="upload-icon">📸</div>
        <div class="upload-text">拖拽图片到此处或点击上传</div>
        <div class="upload-hint">支持 JPG/PNG/WebP，单张不超过5MB，最多5张</div>
      </div>
      <input type="file" id="image-file-input" accept="image/*" multiple style="display:none">
      <div class="image-previews" id="image-preview-container"></div>
    </div>
    
    <div class="form-actions">
      <button class="btn btn-primary" onclick="window._shopAdmin.saveProduct()">💾 保存商品</button>
      <button class="btn btn-outline" onclick="window._shopAdmin.showSection('products')">取消</button>
    </div>
  </section>

  <!-- 分类管理 -->
  <section id="shop-section-categories" class="shop-admin-section">
    <div class="section-header">
      <div><h2>📂 分类管理</h2><p>管理商品分类和子分类</p></div>
      <button class="btn btn-primary" onclick="window._shopAdmin.openAddCategory()">➕ 新增分类</button>
    </div>
    <div id="shop-category-list"></div>
  </section>

  <!-- 分类表单 -->
  <section id="shop-section-category-form" class="shop-admin-section">
    <div class="section-header">
      <div><h2 id="cat-form-title">新增分类</h2></div>
      <button class="btn btn-outline btn-sm" onclick="window._shopAdmin.showSection('categories')">← 返回列表</button>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label>分类名称 *</label>
        <input type="text" id="cat-name" placeholder="如 命理化解吉祥物">
      </div>
      <div class="form-group">
        <label>图标（emoji）*</label>
        <input type="text" id="cat-icon" placeholder="如 🔮" style="width:100px">
      </div>
    </div>
    
    <div class="form-group">
      <label>分类描述</label>
      <textarea id="cat-desc" rows="2" placeholder="分类描述"></textarea>
    </div>
    
    <div class="form-group">
      <label>子分类列表（每行一个，格式：id|名称|颜色|描述）</label>
      <textarea id="cat-sub-list" rows="6" placeholder="jin|五行缺金|var(--metal)|补金增强决断力、财运&#10;mu|五行缺木|var(--jade)|补木增强生机、仁德&#10;shui|五行缺水|var(--cyan)|补水增强智慧、财运"></textarea>
    </div>
    
    <div class="form-actions">
      <button class="btn btn-primary" onclick="window._shopAdmin.saveCategory()">💾 保存分类</button>
      <button class="btn btn-outline" onclick="window._shopAdmin.showSection('categories')">取消</button>
    </div>
  </section>

  <footer>
    <p>易道智鉴 · 商城管理后台 · v2026.06.29</p>
    <p><a href="divination-hub.html">主站</a> | <a href="admin.html">主后台</a> | <a href="disclaimer.html">免责声明</a></p>
  </footer>
</div>

<!-- 确认弹窗 -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal-box">
    <h3>⚠️ 确认操作</h3>
    <p id="confirm-message"></p>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" id="confirm-cancel">取消</button>
      <button class="btn btn-danger btn-sm" id="confirm-ok">确认</button>
    </div>
  </div>
</div>

<script src="js/ui-toast.js" defer></script>
<script src="js/toast-helper.js"></script>
<script src="../knowledge/shop-data.js"></script>
<script src="../js/shop-admin.js"></script>
</body>
</html>
