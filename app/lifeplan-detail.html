<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" var(--ink)>
<title>人生规划蓝图 · 易道智鉴</title>
<meta name="description" content="人生规划蓝图：年龄阶段/12 领域矩阵/未来 5 年/行动清单。可分享、可打印。">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0a0a0a;--paper:#f5f1e8;--gold:#c9a84c;--gold2:#a07c2a;--bronze:#8c6a30;--line:rgba(201,168,76,.2);--r:10px}
body{font-family:'Noto Serif SC',serif;background:linear-gradient(135deg,#0a0a0a,#1a1208);color:var(--paper);min-height:100vh;padding:20px;line-height:1.7}
.wrap{max-width:680px;margin:0 auto}
header{text-align:center;padding:24px 0 16px;border-bottom:1px solid var(--line);margin-bottom:24px}
h1{font-size:24px;font-weight:500;color:var(--gold);letter-spacing:4px;margin-bottom:6px}
header p{font-size:12px;opacity:.55;letter-spacing:1px}
.card{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:14px}
.card h2{font-size:14px;color:var(--gold);font-weight:500;border-left:3px solid var(--gold);padding-left:10px;margin-bottom:12px;letter-spacing:1px}
label{display:block;font-size:12px;opacity:.7;margin-bottom:4px;margin-top:10px}
input,textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:6px;background:rgba(255,255,255,.05);color:var(--paper);font:inherit;font-size:14px;outline:none}
input:focus,textarea:focus{border-color:var(--gold)}
textarea{min-height:60px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:480px){.row{grid-template-columns:1fr 1fr}}
.btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--bronze));color:#0a0a0a;font:inherit;font-size:15px;font-weight:600;border:none;border-radius:var(--r);cursor:pointer;letter-spacing:4px;margin-top:8px}
.btn:hover:not(:disabled){box-shadow:0 6px 18px rgba(201,168,76,.3)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.report{display:none}
.report.show{display:block;animation:fadein .4s}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.banner{text-align:center;padding:20px 16px;margin:18px 0;background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.04));border-radius:var(--r);border:1px solid var(--line)}
.banner .age{font-size:32px;color:var(--gold);font-weight:600;letter-spacing:4px}
.banner .stage{font-size:14px;color:var(--gold2);margin-top:4px}
.banner .focus{font-size:12px;opacity:.7;margin-top:6px}
/* 12 领域 */
.doms{display:grid;grid-template-columns:repeat(auto-fit,minmax(95px,1fr));gap:6px;margin-top:10px}
.dom{padding:10px;background:rgba(201,168,76,.05);border-radius:8px;text-align:center}
.dom .ico{font-size:18px}
.dom .nm{font-size:11px;opacity:.75;margin:2px 0}
.dom .num{font-size:17px;color:var(--gold);font-weight:600}
.dom .bar{height:4px;border-radius:2px;background:rgba(201,168,76,.15);margin-top:5px;overflow:hidden}
.dom .bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--bronze));transition:width .8s}
.dom .st{font-size:10px;margin-top:3px;color:var(--gold2)}
/* 时间轴 */
.tl{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.tl-row{display:flex;gap:12px;align-items:flex-start;padding:10px;background:rgba(201,168,76,.04);border-radius:8px;border-left:3px solid var(--gold)}
.tl-age{font-size:18px;color:var(--gold);font-weight:600;flex-shrink:0;min-width:36px}
.tl-info b{font-size:14px;color:var(--paper);display:block}
.tl-info small{font-size:12px;opacity:.65}
/* 5 年 */
.fy{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.fy-row{display:flex;gap:10px;padding:8px 12px;background:rgba(201,168,76,.04);border-radius:6px;align-items:center}
.fy-y{font-size:13px;color:var(--gold);font-weight:600;min-width:50px}
/* 行动 */
.ol{padding-left:24px;font-size:14px}
.ol li{margin:8px 0;line-height:1.6}
.summary{font-size:13px;opacity:.85;padding:12px;background:rgba(201,168,76,.05);border-radius:8px;margin-top:10px}
.tools{display:flex;gap:8px;margin:18px 0}
.tools button{flex:1;padding:10px;font:inherit;font-size:13px;background:rgba(255,255,255,.05);color:var(--paper);border:1px solid var(--line);border-radius:6px;cursor:pointer}
.tools button:hover{background:rgba(201,168,76,.1);border-color:var(--gold)}

/* ===== 第二十一轮·大运流年起伏图 ===== */
.dyun-track{position:relative;margin:14px 0;padding:14px 6px 28px;background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:8px;overflow-x:auto;white-space:nowrap}
.dyun-track::-webkit-scrollbar{height:5px}
.dyun-track::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
.dyun-row{display:inline-flex;gap:6px;align-items:flex-end;height:130px;padding:0 4px}
.dyun-bar{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;cursor:pointer;min-width:34px;transition:all .2s}
.dyun-bar:hover{transform:scale(1.08)}
.dyun-bar .b{width:26px;border-radius:4px 4px 0 0;transition:all .2s}
.dyun-bar.up .b{background:linear-gradient(180deg,var(--gold),var(--bronze))}
.dyun-bar.down .b{background:linear-gradient(180deg,#c0392b,#7b241c)}
.dyun-bar.flat .b{background:linear-gradient(180deg,#7f8c8d,#566573)}
.dyun-bar.now .b{box-shadow:0 0 12px var(--gold);border:1px solid var(--paper)}
.dyun-bar .a{font-size:10px;color:var(--gold);margin-top:4px;letter-spacing:1px}
.dyun-bar .n{font-size:9px;opacity:.6;margin-top:2px}
.dyun-legend{display:flex;gap:14px;font-size:10px;opacity:.65;margin-top:6px;justify-content:center}
.dyun-legend .lg{display:flex;align-items:center;gap:4px}
.dyun-legend .lgs{width:10px;height:10px;border-radius:2px}
.dyun-legend .lg-up .lgs{background:var(--gold)}
.dyun-legend .lg-down .lgs{background:#c0392b}
.dyun-legend .lg-flat .lgs{background:#7f8c8d}

/* 当前大运详情 */
.dyun-now{padding:14px;background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.04));border-radius:8px;border-left:3px solid var(--gold);margin-top:14px}
.dyun-now .dn-title{font-size:14px;color:var(--gold);font-weight:600;letter-spacing:2px;margin-bottom:6px}
.dyun-now .dn-score{font-size:24px;color:var(--gold);font-weight:600;letter-spacing:2px}
.dyun-now .dn-desc{font-size:12px;line-height:1.7;opacity:.85;margin-top:8px}
.dyun-now .dn-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.dyun-now .dn-tag{font-size:10px;padding:3px 10px;border-radius:12px;background:rgba(201,168,76,.15);border:1px solid var(--line);letter-spacing:1px}
.dyun-now .dn-tag.warn{background:rgba(192,57,43,.12);border-color:rgba(192,57,43,.3);color:#e8a8a0}

/* 未来 5 年预警 */
.future5{padding:10px;background:rgba(255,255,255,.03);border-radius:6px;border-left:2px solid var(--bronze);margin-bottom:6px}
.future5.warn{border-left-color:#c0392b;background:rgba(192,57,43,.06)}
.future5.great{border-left-color:var(--gold);background:rgba(201,168,76,.08)}
.future5 .fy-t{font-size:13px;color:var(--paper);font-weight:600}
.future5 .fy-d{font-size:11px;opacity:.7;margin-top:3px}
.future5 .fy-a{font-size:11px;color:var(--gold);margin-top:5px;letter-spacing:1px}

/* ===== 第二十一轮·12 时辰补强引擎 ===== */
.shichen-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
@media(max-width:480px){.shichen-grid{grid-template-columns:repeat(2,1fr)}}
.shichen-cell{padding:12px;background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:8px;text-align:center;transition:all .2s;position:relative}
.shichen-cell:hover{border-color:var(--gold);background:rgba(201,168,76,.06)}
.shichen-cell.weak{background:rgba(192,57,43,.05);border-color:rgba(192,57,43,.3)}
.shichen-cell.boost{background:rgba(39,174,96,.06);border-color:rgba(39,174,96,.3)}
.shichen-cell .sc-time{font-size:12px;color:var(--gold);letter-spacing:2px;font-weight:600}
.shichen-cell .sc-zhi{font-size:18px;color:var(--paper);margin:4px 0;font-family:'Ma Shan Zheng',serif}
.shichen-cell .sc-wx{font-size:10px;opacity:.5;letter-spacing:1px}
.shichen-cell .sc-tag{position:absolute;top:6px;right:6px;font-size:9px;padding:1px 6px;border-radius:8px}
.shichen-cell.weak .sc-tag{background:#c0392b;color:#fff}
.shichen-cell.boost .sc-tag{background:#27ae60;color:#fff}
.shichen-cell .sc-method{font-size:10px;margin-top:8px;padding:6px;background:rgba(0,0,0,.2);border-radius:4px;line-height:1.5;color:var(--gold2);text-align:left}

/* 时辰补强汇总表 */
.shichen-summary{padding:14px;background:rgba(255,255,255,.02);border-radius:8px;margin-top:12px}
.shichen-summary .ss-title{font-size:13px;color:var(--gold);letter-spacing:2px;margin-bottom:10px;font-weight:600}
.shichen-summary .ss-item{display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px dashed var(--line);font-size:12px}
.shichen-summary .ss-item:last-child{border-bottom:none}
.shichen-summary .ss-time{color:var(--gold);font-weight:600;min-width:80px}
.shichen-summary .ss-ability{color:var(--paper);flex:1;padding:0 10px}
.shichen-summary .ss-method{color:var(--gold2);font-size:11px;flex:1.5;text-align:right}

/* ===== 第二十一轮·趋吉避凶总评 ===== */
.trend-summary{padding:16px;background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.02));border-radius:8px;border:1px solid var(--line);margin-top:12px}
.trend-summary .ts-title{font-size:14px;color:var(--gold);letter-spacing:3px;margin-bottom:10px;font-weight:600}
.trend-summary .ts-quote{font-size:12px;line-height:1.8;opacity:.8;font-style:italic;padding:10px;background:rgba(0,0,0,.15);border-left:2px solid var(--gold);border-radius:4px;margin-bottom:10px}
.trend-summary .ts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(max-width:480px){.trend-summary .ts-grid{grid-template-columns:1fr}}
.trend-summary .ts-item{padding:8px 10px;background:rgba(255,255,255,.03);border-radius:6px;font-size:11px;line-height:1.6}
.trend-summary .ts-item b{color:var(--gold);display:block;margin-bottom:3px;font-size:11px;letter-spacing:1px}

/* 来源标记 */
.kb-source{font-size:10px;opacity:.45;margin-top:8px;padding-top:6px;border-top:1px dashed var(--line);letter-spacing:1px;text-align:right}

@media print{body{background:#fff;color:#000;padding:10px}.card,.banner,.tl-row,.fy-row,.dom{background:#fafafa !important;color:#000 !important;border:1px solid #ccc !important}.btn,.tools,#input{display:none !important}.banner .age,.card h2,.dom .num{color:#000 !important}h1{color:#000}}

<style>
/* ===== 第二十四轮·流月流日 ===== */
.ly-track{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;margin:12px 0;padding:8px;background:rgba(0,0,0,.15);border-radius:6px}
.ly-cell{aspect-ratio:1;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;cursor:pointer;transition:transform .2s}
.ly-cell:hover{transform:scale(1.1);z-index:2}
.ly-cell .ly-m{font-size:11px;font-weight:600}
.ly-cell .ly-s{font-size:9px;opacity:.75}
.ly-cell.lg-up{background:rgba(39,174,96,.35);border:1px solid rgba(39,174,96,.6)}
.ly-cell.lg-flat{background:rgba(201,168,76,.25);border:1px solid rgba(201,168,76,.5)}
.ly-cell.lg-down{background:rgba(192,57,43,.35);border:1px solid rgba(192,57,43,.6)}
.ly-cell.lg-now{box-shadow:0 0 0 2px var(--gold);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.ly-legend{display:flex;gap:12px;font-size:10px;margin-top:6px;opacity:.7;flex-wrap:wrap}
.ly-legend div{display:flex;align-items:center;gap:3px}
.ly-legend .dot{width:10px;height:10px;border-radius:2px}
.lr-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;margin:12px 0;padding:8px;background:rgba(0,0,0,.15);border-radius:6px}
@media(max-width:768px){.lr-grid{grid-template-columns:repeat(5,1fr)}}
.lr-cell{aspect-ratio:1;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;cursor:pointer;transition:transform .15s}
.lr-cell:hover{transform:scale(1.15);z-index:2}
.lr-cell .lr-d{font-size:11px;font-weight:600}
.lr-cell .lr-x{font-size:8px;opacity:.65}
.lr-cell.lg-up{background:rgba(39,174,96,.35);border:1px solid rgba(39,174,96,.6)}
.lr-cell.lg-flat{background:rgba(201,168,76,.25);border:1px solid rgba(201,168,76,.5)}
.lr-cell.lg-down{background:rgba(192,57,43,.35);border:1px solid rgba(192,57,43,.6)}
.lr-cell.lg-today{box-shadow:0 0 0 2px var(--gold)}
.ly-summary{margin-top:14px;padding:12px;background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(201,168,76,.02));border-radius:8px;border-left:3px solid var(--gold);font-size:11px;line-height:1.7}
.ly-summary b{color:var(--gold)}
.lr-summary{margin-top:14px;padding:12px;background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(201,168,76,.02));border-radius:8px;border-left:3px solid var(--gold);font-size:11px;line-height:1.7}
.lr-summary b{color:var(--gold)}
.lf-source{font-size:10px;opacity:.4;margin-top:10px;padding-top:6px;border-top:1px dashed var(--line);letter-spacing:1px;text-align:right}
/* R38-A lifeplan-detail 双核仪表盘 */
.lp-dash{padding:18px;background:linear-gradient(135deg,rgba(74,154,110,.05),rgba(74,138,168,.05));border-radius:14px;margin:20px 0;border:1px solid var(--line)}
.lp-dash-title{font-size:16px;color:var(--gold);letter-spacing:2px;margin-bottom:14px;font-weight:600}
.lp-dash-dual{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.lp-card{padding:14px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.04)}
.lp-card.health{border-left:4px solid #4a9a6e;background:linear-gradient(135deg,rgba(74,154,110,.08),rgba(255,255,255,.02))}
.lp-card.career{border-left:4px solid #4a8aa8;background:linear-gradient(135deg,rgba(74,138,168,.08),rgba(255,255,255,.02))}
.lp-card-title{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.lp-card.health .lp-card-title{color:#4a9a6e}
.lp-card.career .lp-card-title{color:#4a8aa8}
.lp-card-score{font-size:26px;font-weight:700;letter-spacing:1px}
.lp-card.health .lp-card-score{color:#4a9a6e}
.lp-card.career .lp-card-score{color:#4a8aa8}
.lp-card-bar{height:6px;background:rgba(0,0,0,.3);border-radius:3px;overflow:hidden;margin:8px 0}
.lp-card-fill{height:100%;border-radius:3px;transition:.4s}
.lp-card.health .lp-card-fill{background:linear-gradient(90deg,#4a9a6e,#7ab86e)}
.lp-card.career .lp-card-fill{background:linear-gradient(90deg,#4a8aa8,#6ab0d0)}
.lp-8grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.lp-8cell{padding:10px 8px;background:rgba(201,168,76,.05);border:1px solid var(--line);border-radius:6px;transition:.2s;cursor:pointer}
.lp-8cell:hover{background:rgba(201,168,76,.12);border-color:var(--gold);transform:translateY(-1px)}
.lp-8cell .icon{font-size:18px;display:block;margin-bottom:4px}
.lp-8cell b{display:block;font-size:11px;color:var(--gold);margin-bottom:4px}
.lp-8cell .tip{font-size:10px;opacity:.7;line-height:1.5}
.lp-stage{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.lp-stage-cell{padding:10px;background:rgba(74,138,168,.06);border:1px solid rgba(74,138,168,.2);border-radius:6px;text-align:center;cursor:pointer}
.lp-stage-cell:hover{background:rgba(74,138,168,.15)}
.lp-stage-cell b{display:block;font-size:11px;color:#6ab0d0;margin-bottom:4px}
.lp-verdict{margin-top:14px;padding:12px;background:rgba(0,0,0,.2);border-radius:8px;border:1px dashed var(--gold);font-size:12px;line-height:1.9}
.lp-source{font-size:10px;opacity:.4;margin-top:10px;padding-top:6px;border-top:1px dashed var(--line);letter-spacing:1px;text-align:right}
@media(max-width:768px){.lp-dash-dual{grid-template-columns:1fr}.lp-8grid,.lp-stage{grid-template-columns:repeat(2,1fr)}}
</style>

</head>
<body>
<div class="wrap">
  <header>
    <h1>人生规划蓝图</h1>
    <p>8 阶段 / 12 领域 / 5 年步进 · 易道智鉴</p>
  </header>
  <div class="card" id="input">
    <h2>📋 基础信息</h2>
    <div class="row">
      <div><label>年龄</label><input id="lAge" type="number" min="1" max="120" value="28"></div>
      <div><label>性别</label><select id="lSex"><option value="male">男</option><option value="female">女</option></select></div>
      <div><label>现居地</label><input id="lResidence" placeholder="例：上海"></div>
    </div>
    <label>关注领域（逗号分隔）</label>
    <input id="lFocus" placeholder="例：事业、财运、健康">
    <label>补充情况（可选，影响领域加权）</label>
    <textarea id="lExtra" placeholder="例：计划 30 岁前完成理财布局，金融行业从业5年"></textarea>
    <button class="btn" id="genBtn" onclick="generate()">✨ 生成蓝图</button>
  </div>
  <div class="report" id="report"></div>
  <p style="text-align:center;font-size:11px;opacity:.4;margin:24px 0;letter-spacing:1px">易道智鉴 · 仅供参考 · 命数只占 30%，努力占 70%</p>
</div>
<script>
const STAGES = [
  {key:'preschool',name:'学龄前',range:'0-6岁',focus:['先天','亲子','健康']},
  {key:'school',name:'小学中学',range:'7-17岁',focus:['学习','品德','兴趣']},
  {key:'university',name:'大学',range:'18-23岁',focus:['专业','社交','实践']},
  {key:'career',name:'职场+婚恋',range:'24-65岁',focus:['事业','婚恋','健康']}
];
const DOMAINS = [
  {key:'xueye',name:'学业',icon:'📚'},
  {key:'zhiye',name:'职业',icon:'💼'},
  {key:'caiyun',name:'财运',icon:'💰'},
  {key:'hunyin',name:'婚姻',icon:'💕'},
  {key:'jiankang',name:'健康',icon:'💊'},
  {key:'chengshi',name:'城市',icon:'🏙️'},
  {key:'xiuyang',name:'修养',icon:'🎋'},
  {key:'renmai',name:'人脉',icon:'🤝'},
  {key:'chuangye',name:'创业',icon:'🚀'},
  {key:'yanglao',name:'养老',icon:'🌳'},
  {key:'chuancheng',name:'传承',icon:'🎁'},
  {key:'jiangxiu',name:'享福',icon:'🌸'}
];
const WUXING_KW = {'金':['理财','金融','法律'],'木':['学习','成长','教育'],'水':['智慧','思考','学术'],'火':['创业','激情','表达'],'土':['稳健','养老','健康']};

function generate(){
  const btn=document.getElementById('genBtn');
  btn.disabled=true; btn.textContent='⏳ 生成中...';
  setTimeout(()=>{
    try{
      const age=parseInt(document.getElementById('lAge').value)||30;
      const sex=document.getElementById('lSex').value;
      const residence=document.getElementById('lResidence').value.trim();
      const focus=(document.getElementById('lFocus').value||'').trim();
      const extra=(document.getElementById('lExtra').value||'').trim();
      const userText = extra+' '+focus;
      const stageKey = age<=6?'preschool':age<=17?'school':age<=23?'university':'career';
      const stage = STAGES.find(s=>s.key===stageKey);

      const domainScores = DOMAINS.map(d=>{
        let base=60;

          }
        }
        const final=Math.max(30,Math.min(95,base));
        return {key:d.key,name:d.name,icon:d.icon,score:final,status:final>=75?'优':final>=60?'良好':'有潜力'};
      });

      const next5 = [

      ];

}

  // ===== 大运流年起伏引擎（依《三命通会》《滴天髓》《子平真诠》） =====
  function calcDayunFluctuation(currentAge){

      curStem = STEMS[(STEMS.indexOf(curStem)+1)%10];
      const dayunStem = curStem;

      // 大运评分：与命主日干的关系
      let score = 60;
      const rel = [];
      if(dayunEle === dayEle){score += 10; rel.push('比肩·稳健');}

      else if(shengMap[dayunEle]===dayEle){score += 22; rel.push('印绶·贵人·宜学');}
      else if(keMap[dayEle]===dayunEle){score -= 15; rel.push('财星·破耗·慎财');}
      else if(keMap[dayunEle]===dayEle){score -= 22; rel.push('官杀·压力·宜稳');}
      // 大运阶段额外加权
      if(ageStart>=18 && ageStart<=40 && score>=70) score += 5;
      if(ageStart>=50 && score<55) score -= 5;
      score = Math.max(15, Math.min(95, score));
      dayuns.push({ageStart,ageEnd,stem:dayunStem,ele:dayunEle,score,rel,isNow:currentAge>=ageStart&&currentAge<=ageEnd});
    }
    return dayuns;
  }

  // ===== 12 时辰补强引擎（依《十二时辰养生》《黄帝内经》《易经·十二辟卦》） =====

/* ===== 第二十四轮·流月流日引擎 ===== */
function calcLiuyueScore(currentAge, dayStem, dayEle){
  const MONTH_ZHI = ['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'];
  const now = new Date();
  const curMonth = now.getMonth();
  const STEMS = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  // 五虎遁年起月
  const TIGER_MAP = {0:2,5:2, 1:4,6:4, 2:6,7:6, 3:8,8:8, 4:0,9:0};
  const yr = now.getFullYear();
  const yrStemIdx = (yr - 4) % 10;
  const startStemIdx = TIGER_MAP[yrStemIdx];
  const SHENG_MAP = {木:'火',火:'土',土:'金',金:'水',水:'木'};
  const KE_MAP = {木:'土',火:'金',土:'水',金:'木',水:'火'};
  const ELE_BY_STEM = {甲:'木',乙:'木',丙:'火',丁:'火',戊:'土',己:'土',庚:'金',辛:'金',壬:'水',癸:'水'};
  const ZHI_WX = {子:'水',丑:'土',寅:'木',卯:'木',辰:'土',巳:'火',午:'火',未:'土',申:'金',酉:'金',戌:'土',亥:'水'};
  const MONTH_NAMES = ['正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

  return MONTH_ZHI.map((zhi, i)=>{
    const stemIdx = (startStemIdx + i) % 10;
    const stem = STEMS[stemIdx];
    const stemEle = ELE_BY_STEM[stem];
    const zhiEle = ZHI_WX[zhi];

    let score = 60;
    let relation = '平';
    if(stemEle === dayEle){ score += 10; relation='比肩'; }
    else if(SHENG_MAP[dayEle] === stemEle){ score += 22; relation='印绶（吉）'; }
    else if(stemEle === SHENG_MAP[dayEle]){ score += 18; relation='食伤（泄秀）'; }
    else if(KE_MAP[dayEle] === stemEle){ score -= 15; relation='财星（破耗）'; }
    else if(stemEle === KE_MAP[dayEle]){ score -= 22; relation='官杀（压力）'; }
    if(zhiEle === dayEle) score += 5;

    score = Math.max(20, Math.min(99, score));
    const level = score >= 70 ? '吉' : (score < 55 ? '凶' : '平');
    const advice = score >= 70 ? '可谋大事·进取有功' : (score < 55 ? '宜守不宜攻·修身养性' : '稳中求进·顺势而为');

    return {
      monthName: MONTH_NAMES[i],
      stem, branch: zhi,
      score, level, relation,
      reason: monthReasons(i),
      advice,
      isNow: i === curMonth
    };
  });
}

function monthReasons(idx){
  const r = ['寅月木旺·正月建生','卯月木极·仲春生气','辰月土湿·季春库开','巳月火初·孟夏火苗','午月火极·仲夏阳盛','未月土燥·季夏养金','申月金锐·孟秋肃杀','酉月金极·仲秋收成','戌月土藏·季秋库收','亥月水生·孟冬阳藏','子月水极·仲冬阴盛','丑月土冻·季冬守藏'];
  return r[idx] || '月令转换';
}

function calcTrendAdvice(dayuns, shichen){
    const now = dayuns.find(x=>x.isNow);
    if(!now) return '';
    const ups = dayuns.filter(x=>x.score>=70);
    const downs = dayuns.filter(x=>x.score<55);
    const avgScore = Math.round(dayuns.reduce((s,x)=>s+x.score,0)/dayuns.length);
    const curScore = now.score;
    let trend = '';
    let phase = '';
    if(curScore>=75) {trend='大运当头，宜大展宏图'; phase='吉期·进取';}
    else if(curScore>=65) {trend='运势稳健，宜守成扩展'; phase='平顺·守成';}
    else if(curScore>=55) {trend='运程偏弱，宜守不妄动'; phase='潜伏·蛰伏';}
    else {trend='运程低伏，宜静修化煞'; phase='低谷·化解';}
    // 建议方向
    const goodDir = ELE_LOC[shengMap[dayEle]] || '东方';

    return {
      trend, phase, avgScore, curScore, goodDir, badDir,
      upsCount:ups.length, downsCount:downs.length,
      recItem:itemMap[dayEle],
      recommendAge:dayuns.reduce((best,x)=>x.score>best.score?x:best,dayuns[0])
    };

  // ===== 渲染大运 + 时辰 + 趋吉避凶 =====
  const dayuns = calcDayunFluctuation(d.age);
  const shichen = calcShichenBoost(dayEle);
  const trend = calcTrendAdvice(dayuns, shichen);


  // ===== 第二十四轮·R24·流月流日精度补强 =====

function restoreFromHash(){
  const h=location.hash.slice(1);
  if(!h) return;
  try{
    const d=JSON.parse(decodeURIComponent(escape(atob(h))));
    if(d.age) document.getElementById('lAge').value=d.age;
    if(d.sex) document.getElementById('lSex').value=d.sex;
    if(d.residence) document.getElementById('lResidence').value=d.residence;
    if(d.focus) document.getElementById('lFocus').value=d.focus;
    if(d.extra) document.getElementById('lExtra').value=d.extra;
    generate();
  }catch(e){}
}

function shareUrl(){
  const url=location.href;
  if(navigator.share){navigator.share({title:'人生规划蓝图',url}).catch(()=>{});}
  else if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>showToast('链接已复制'));}
  else prompt('复制链接分享：',url);
}

function copyTxt(){
  if(navigator.clipboard){navigator.clipboard.writeText(document.getElementById('report').innerText).then(()=>showToast('已复制'));}
}

function showToast(m){
  const t=document.createElement('div');
  t.textContent=m;
  t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(201,168,76,.9);color:#0a0a0a;padding:10px 24px;border-radius:8px;font-size:14px;z-index:1000';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1800);
}
