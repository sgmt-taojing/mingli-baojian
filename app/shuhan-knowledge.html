<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>舒晗·奇门遁甲知识库</title>
<style>
:root{--gold:var(--gold);--gold2:var(--gold3);--paper:var(--paper2);--paper3:var(--paper3);--title:var(--ink3);--border:rgba(201,168,76,.2);--jade:var(--jade);--bg:var(--ink3);--card:var(--ink2);--card2:var(--ink2);--paper2:#d4c9b0;--ink3:#0a0a0c;--gold3:#b8964a;--ink2:rgba(20,20,24,.8);--cinn2:#e74c3c}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--paper);font-family:'Noto Serif SC',serif;line-height:1.8;min-height:100vh}
.header{background:linear-gradient(135deg,var(--ink3),var(--ink3));border-bottom:1px solid var(--border);padding:20px 24px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-size:20px;color:var(--gold);letter-spacing:3px}
.header h1 span{font-size:12px;color:var(--paper3);letter-spacing:1px;display:block;margin-top:2px}
.back-btn{color:var(--paper3);text-decoration:none;font-size:12px;padding:6px 16px;border:1px solid var(--border);border-radius:16px;transition:all .25s}
.back-btn:hover{background:rgba(201,168,76,.1);color:var(--gold);border-color:rgba(201,168,76,.3)}
.container{max-width:1200px;margin:0 auto;padding:24px 16px}
.warning{background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.2);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:var(--cinn2);opacity:.8}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.tab{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--paper3);cursor:pointer;font-size:12px;letter-spacing:1px;transition:all .25s;font-family:'Noto Serif SC',serif}
.tab:hover{border-color:rgba(201,168,76,.3);color:var(--gold)}
.tab.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.lesson-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .25s}
.lesson-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 16px rgba(201,168,76,.15)}
.lesson-num{font-size:11px;color:var(--paper3);letter-spacing:2px;margin-bottom:6px}
.lesson-title{font-size:14px;color:var(--gold);margin-bottom:8px;font-weight:600}
.lesson-desc{font-size:12px;color:var(--paper3);line-height:1.6}
.detail-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-top:16px}
.detail-title{font-size:16px;color:var(--gold);margin-bottom:12px;letter-spacing:2px;border-bottom:1px solid var(--border);padding-bottom:8px;font-weight:700}
.detail-body{font-size:13px;line-height:2;color:var(--paper);opacity:.9}
.detail-body b{color:var(--gold2)}
.detail-body .sub-title{color:var(--gold2);font-size:14px;margin-top:14px;display:block;font-weight:600}
.detail-body ul{list-style:none;padding-left:0;margin:8px 0}
.detail-body li{padding:4px 0;padding-left:18px;position:relative}
.detail-body li::before{content:'◆';color:var(--gold);position:absolute;left:0;font-size:9px;top:8px}
.detail-body p{margin-bottom:8px}
.search-box{margin-bottom:16px;display:flex;gap:8px}
.search-input{flex:1;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--paper);font-size:13px;font-family:inherit;outline:none}
.search-input:focus{border-color:var(--gold)}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px}
.stat-num{font-size:24px;color:var(--gold);font-weight:700}
.stat-label{font-size:11px;color:var(--paper3);letter-spacing:1px;margin-top:4px}
@media(max-width:768px){.lesson-grid{grid-template-columns:1fr}.header h1{font-size:16px}.container{padding:16px 12px}.tab{padding:6px 12px;font-size:11px}}
.footer{text-align:center;padding:24px;color:var(--paper3);font-size:11px;opacity:.5;margin-top:24px}
</style>
</head>
<body>
<div style="position:fixed;top:12px;right:12px;z-index:99998">
  <a href="tcm-clinic.html" style="display:inline-block;padding:6px 16px;background:rgba(201,168,76,0.12);color:var(--gold,#c9a84c);border:1px solid rgba(201,168,76,0.25);border-radius:16px;font-size:12px;text-decoration:none;font-family:'Noto Serif SC',serif;letter-spacing:1px">🏥 中医诊疗</a>
</div>
<div class="header">
<div class="header-inner">
<h1>舒晗·奇门遁甲知识库<span>32节基础课 · 密训班 · 天纪系列 · 经典术数体系</span></h1>
<a href="divination-hub.html" class="back-btn">← 返回主平台</a>
</div>
</div>
<div class="container">
<div class="warning">⚠️ 本知识库仅供学习参考。奇门遁甲为传统术数，不构成投资/医疗/法律决策依据。</div>

<div class="stat-row" id="statRow"></div>

<div class="search-box">
<input type="text" class="search-input" id="globalSearch" placeholder="🔍 搜索：课程主题/概念/技法关键词（例：空亡、击刑、八门、九星）">
</div>

<div class="tabs" id="mainTabs"></div>

<div id="content"></div>
</div>

<div class="footer">舒晗奇门遁甲知识库 · 32节基础课+密训 · 提取自 ~/Desktop/国学学习/<br>提取时间：2026-07-18</div>

<script defer src="../knowledge/shuhan-kb-combined.js"></script>
<script>
let BASIC = window.SHUHAN_KB || {};
let MIXUN = window.SHUHAN_MIXUN_TIANJI_KB || {};
let OCRKB = window.ShuhanBasicKB || {};
// 合并 OCR 全量内容到 BASIC
if (OCRKB.content) {
  BASIC.ocrContent = OCRKB.content;
  BASIC.ocrMixun = OCRKB.mixun;
  BASIC.ocrQuickRef = OCRKB.quickRef;
  BASIC.searchOcr = function(kw) { return OCRKB.search ? OCRKB.search(kw) : []; };
  BASIC.getOcrLesson = function(n) { return OCRKB.getLesson ? OCRKB.getLesson(n) : null; };
  BASIC.getOcrContext = function(kw, maxLen) { return OCRKB.getContext ? OCRKB.getContext(kw, maxLen) : []; };
}
let KB = {
  basic: BASIC,
  mixun: MIXUN,
  ocr: OCRKB
};

function escapeHTML(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderLessonsGrid(){
  let html = '<div class="lesson-grid">';
  let lessons = (KB.basic && KB.basic.lessons) || {};
  Object.keys(lessons).forEach(function(k){
    if(!/^\d+$/.test(k))return;
    let n = parseInt(k);
    let title = lessons[k];
    html += '<div class="lesson-card" onclick="showLesson('+n+')">';
    html += '<div class="lesson-num">第 '+n+' 课</div>';
    html += '<div class="lesson-title">'+escapeHTML(title)+'</div>';
    html += '<div class="lesson-desc">点击查看详情</div>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function renderLessonDetail(n){
  let c = (KB.basic && KB.basic.content && KB.basic.content['lesson_'+n]) || {};
  if(Object.keys(c).length===0){
    return '<div class="detail-panel"><div class="detail-title">第 '+n+' 课</div><div class="detail-body"><p>课程详细内容整理中...</p></div></div>';
  }
  let title = (KB.basic.lessons && KB.basic.lessons[n]) || ('第'+n+'课');
  let html = '<div class="detail-panel">';
  html += '<div class="detail-title">第 '+n+' 课 · '+escapeHTML(title)+'</div>';
  html += '<div class="detail-body">';
  Object.keys(c).forEach(function(k){
    let v = c[k];
    let keyLabel = k.replace(/_/g,' ');
    html += '<span class="sub-title">◆ '+escapeHTML(keyLabel)+'</span>';
    if(typeof v === 'string'){
      html += '<p>'+escapeHTML(v)+'</p>';
    }else if(Array.isArray(v)){
      html += '<ul>';
      v.forEach(function(it){
        if(typeof it === 'string'){
          html += '<li>'+escapeHTML(it)+'</li>';
        }else if(typeof it === 'object' && it){
          let parts = [];
          Object.keys(it).forEach(function(kk){
            parts.push('<b>'+kk+'：</b>'+escapeHTML(String(it[kk])));
          });
          html += '<li>'+parts.join(' · ')+'</li>';
        }
      });
      html += '</ul>';
    }else if(typeof v === 'object' && v){
      Object.keys(v).forEach(function(sk){
        let sv = v[sk];
        if(typeof sv === 'string'){
          html += '<p><b>'+escapeHTML(sk)+'：</b>'+escapeHTML(sv)+'</p>';
        }
      });
    }
  });
  html += '</div></div>';
  return html;
}

function showLesson(n){
  document.getElementById('content').innerHTML = renderLessonDetail(n);
  window.scrollTo({top:200,behavior:'smooth'});
}

function showMixun(){
  let html = '<div class="detail-panel"><div class="detail-title">密训班内容</div><div class="detail-body">';
  if(KB.mixun && KB.mixun.content){
    Object.keys(KB.mixun.content).forEach(function(k){
      let v = KB.mixun.content[k];
      html += '<span class="sub-title">◆ '+escapeHTML(k)+'</span>';
      if(typeof v === 'string'){
        html += '<p>'+escapeHTML(v)+'</p>';
      }else if(Array.isArray(v)){
        html += '<ul>';
        v.forEach(function(it){
          html += '<li>'+escapeHTML(typeof it==='string'?it:JSON.stringify(it))+'</li>';
        });
        html += '</ul>';
      }else if(typeof v === 'object' && v){
        Object.keys(v).forEach(function(sk){
          html += '<p><b>'+escapeHTML(sk)+'：</b>'+escapeHTML(typeof v[sk]==='string'?v[sk]:JSON.stringify(v[sk]))+'</p>';
        });
      }
    });
  }else{
    html += '<p>密训班内容整理中...</p>';
  }
  html += '</div></div>';
  document.getElementById('content').innerHTML = html;
}

function showTianji(){
  let html = '<div class="detail-panel"><div class="detail-title">天纪系列</div><div class="detail-body">';
  if(KB.mixun && KB.mixun.tianji){
    Object.keys(KB.mixun.tianji).forEach(function(k){
      let v = KB.mixun.tianji[k];
      html += '<span class="sub-title">◆ '+escapeHTML(k)+'</span>';
      if(typeof v === 'string'){
        html += '<p>'+escapeHTML(v)+'</p>';
      }else if(Array.isArray(v)){
        html += '<ul>';
        v.forEach(function(it){
          html += '<li>'+escapeHTML(typeof it==='string'?it:JSON.stringify(it))+'</li>';
        });
        html += '</ul>';
      }else if(typeof v === 'object' && v){
        Object.keys(v).forEach(function(sk){
          html += '<p><b>'+escapeHTML(sk)+'：</b>'+escapeHTML(typeof v[sk]==='string'?v[sk]:JSON.stringify(v[sk]))+'</p>';
        });
      }
    });
  }else{
    html += '<p>天纪内容整理中...</p>';
  }
  html += '</div></div>';
  document.getElementById('content').innerHTML = html;
}

function showQuickRef(){
  let q = (KB.basic && KB.basic.quickRef) || {};
  let html = '<div class="detail-panel"><div class="detail-title">速查表 · 经典术数体系</div><div class="detail-body">';
  Object.keys(q).forEach(function(k){
    let v = q[k];
    html += '<span class="sub-title">◆ '+escapeHTML(k)+'</span>';
    if(typeof v === 'string'){
      html += '<p>'+escapeHTML(v)+'</p>';
    }else if(Array.isArray(v)){
      html += '<ul>';
      v.forEach(function(it){
        html += '<li>'+escapeHTML(typeof it==='string'?it:JSON.stringify(it))+'</li>';
      });
      html += '</ul>';
    }else if(typeof v === 'object' && v){
      Object.keys(v).forEach(function(sk){
        html += '<p><b>'+escapeHTML(sk)+'：</b>'+escapeHTML(typeof v[sk]==='string'?v[sk]:JSON.stringify(v[sk]))+'</p>';
      });
    }
  });
  html += '</div></div>';
  document.getElementById('content').innerHTML = html;
}

function showOverview(){
  let lessonCount = (KB.basic && KB.basic.lessons) ? Object.keys(KB.basic.lessons).filter(function(k){return /^\d+$/.test(k);}).length : 0;
  let mixunKeys = KB.mixun ? Object.keys(KB.mixun.content || {}).length : 0;
  let tianjiKeys = KB.mixun ? Object.keys(KB.mixun.tianji || {}).length : 0;
  document.getElementById('content').innerHTML = 
    '<div class="detail-panel"><div class="detail-title">📚 舒晗奇门遁甲知识库</div><div class="detail-body">'+
    '<p>本知识库整合 <b style="color:var(--gold2)">舒晗奇门遁甲基础课</b> 32 节课程内容 + <b style="color:var(--gold2)">密训班</b>专项内容 + <b style="color:var(--gold2)">天纪系列</b>。</p>'+
    '<span class="sub-title">◆ 内容来源</span>'+
    '<ul>'+
    '<li>基础课 32 节 PPT 标题（已完整提取）</li>'+
    '<li>导图 PDF 13 份（提取文字 19,091 字）</li>'+
    '<li>密训班 PDF 8 份</li>'+
    '<li>天纪相关 PDF（部分）</li>'+
    '</ul>'+
    '<span class="sub-title">◆ 学习路径</span>'+
    '<ul>'+
    '<li>第一步：基础课 → 32 节系统学习</li>'+
    '<li>第二步：密训班 → 实战应用</li>'+
    '<li>第三步：天纪 → 高级拓展</li>'+
    '<li>速查表 → 随时查阅六维模型与五行生克</li>'+
    '</ul>'+
    '<span class="sub-title">◆ 核心术数体系</span>'+
    '<p>六维模型：天时(九星)+地利(九宫)+人和(八门)+神助(八神)+格局(天干)+周期(十二长生)</p>'+
    '</div></div>';
}

function doSearch(){
  let q = document.getElementById('globalSearch').value.trim().toLowerCase();
  if(!q){showOverview();return;}
  let results = [];
  function searchIn(obj, path){
    if(typeof obj === 'string'){
      if(obj.toLowerCase().indexOf(q)>-1){
        results.push({title:path,body:obj.substring(0,200)});
      }
    }else if(Array.isArray(obj)){
      obj.forEach(function(it,i){searchIn(it,path+'['+i+']');});
    }else if(typeof obj === 'object' && obj){
      Object.keys(obj).forEach(function(k){searchIn(obj[k],path+'.'+k);});
    }
  }
  searchIn(KB,'');
  let html = '<div class="detail-panel"><div class="detail-title">搜索 "'+escapeHTML(q)+'" — '+results.length+' 条结果</div><div class="detail-body">';
  if(results.length === 0){
    html += '<p>未找到匹配内容</p>';
  }else{
    results.slice(0,50).forEach(function(r){
      html += '<p style="margin-top:10px"><b>'+escapeHTML(r.title)+'</b></p>';
      html += '<p style="color:var(--paper3);font-size:12px">'+escapeHTML(r.body)+'</p>';
    });
  }
  html += '</div></div>';
  document.getElementById('content').innerHTML = html;
}

// 初始化统计
(function(){
  let lessonCount = (KB.basic && KB.basic.lessons) ? Object.keys(KB.basic.lessons).filter(function(k){return /^\d+$/.test(k);}).length : 0;
  document.getElementById('statRow').innerHTML = 
    '<div class="stat-card"><div class="stat-num">'+lessonCount+'</div><div class="stat-label">基础课节数</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+(KB.basic && KB.basic.lessons && KB.basic.lessons.lessons || '—')+'</div><div class="stat-label">总课次</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+(KB.mixun ? '✓' : '—')+'</div><div class="stat-label">密训班</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+(KB.mixun && KB.mixun.tianji ? '✓' : '—')+'</div><div class="stat-label">天纪系列</div></div>';
})();

// 初始化主tabs
(function(){
  let tabs = [
    {id:'overview',name:'📋 总览',fn:showOverview},
    {id:'basic',name:'📚 32节基础课',fn:function(){
      document.getElementById('content').innerHTML = renderLessonsGrid();
    }},
    {id:'mixun',name:'🎓 密训班',fn:showMixun},
    {id:'tianji',name:'🌟 天纪系列',fn:showTianji},
    {id:'quickref',name:'🔖 速查表',fn:showQuickRef}
  ];
  let tabBar = document.getElementById('mainTabs');
  tabs.forEach(function(t){
    let btn = document.createElement('button');
    btn.className = 'tab';
    btn.textContent = t.name;
    btn.onclick = function(){
      document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      t.fn();
    };
    tabBar.appendChild(btn);
  });
  // 默认显示总览
  document.querySelector('.tab').classList.add('active');
  showOverview();
})();

document.getElementById('globalSearch').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
</script>
</body>
</html>
