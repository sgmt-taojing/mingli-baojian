<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>舒晗国学·奇门知识库</title>
<style>
:root{--gold:#c9a84c;--gold2:#b8932f;--paper:#f5f0e8;--paper2:#ede5d3;--paper3:#8a8275;--title:#2c2823;--border:rgba(201,168,76,.2);--jade:#5a8a6a;--violet2:#8a5cbf;--bg:#1a1814;--card:#252220;--card2:#2f2b26}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--paper);font-family:'Noto Serif SC',serif;line-height:1.8;min-height:100vh}
.header{background:linear-gradient(135deg,#2c2823,#1a1814);border-bottom:1px solid var(--border);padding:20px 24px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-size:20px;color:var(--gold);letter-spacing:3px}
.header h1 span{font-size:12px;color:var(--paper3);letter-spacing:1px;display:block;margin-top:2px}
.back-btn{color:var(--paper3);text-decoration:none;font-size:12px;padding:6px 16px;border:1px solid var(--border);border-radius:16px;transition:all .25s}
.back-btn:hover{background:rgba(201,168,76,.1);color:var(--gold);border-color:rgba(201,168,76,.3)}
.container{max-width:1200px;margin:0 auto;padding:24px 16px}
.nav-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.nav-tab{padding:10px 20px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--paper3);cursor:pointer;font-size:13px;letter-spacing:2px;transition:all .25s;font-family:'Noto Serif SC',serif}
.nav-tab:hover{border-color:rgba(201,168,76,.3);color:var(--gold)}
.nav-tab.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
.panel{display:none}
.panel.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px;transition:all .25s}
.card:hover{border-color:rgba(201,168,76,.3)}
.card-title{font-size:15px;font-weight:700;color:var(--gold);margin-bottom:12px;letter-spacing:2px;border-bottom:1px solid var(--border);padding-bottom:8px}
.card-body{font-size:13px;line-height:2;color:var(--paper);opacity:.9}
.card-body b{color:var(--gold2)}
.card-body ul{list-style:none;padding-left:0}
.card-body li{padding:4px 0;padding-left:16px;position:relative}
.card-body li::before{content:'·';color:var(--gold);position:absolute;left:0}
.tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;margin:2px 4px}
.tag-p0{background:rgba(231,76,60,.15);color:#e74c3c;border:1px solid rgba(231,76,60,.3)}
.tag-p1{background:rgba(243,156,18,.15);color:#f39c12;border:1px solid rgba(243,156,18,.3)}
.tag-p2{background:rgba(52,152,219,.15);color:#3498db;border:1px solid rgba(52,152,219,.3)}
.tag-new{background:rgba(39,174,96,.15);color:#27ae60;border:1px solid rgba(39,174,96,.3)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
@media(max-width:768px){.grid{grid-template-columns:1fr}.header h1{font-size:16px}.container{padding:16px 12px}}
.footer{text-align:center;padding:24px;color:var(--paper3);font-size:11px;opacity:.5}
</style>
</head>
<body>
<div class="header">
<div class="header-inner">
<h1>舒晗国学·奇门知识库<span>基于舒晗老师奇门遁甲系统课程 · 专业学习与参考</span></h1>
<a href="divination-hub.html" class="back-btn">← 返回主平台</a>
</div>
</div>
<div class="container">
<div class="nav-tabs" id="navTabs"></div>
<div id="content"></div>
</div>
<div class="footer">⚠️ 本知识库为学习参考资料，不构成任何决策建议<br>舒晗国学·奇门遁甲系统课程知识提取</div>
<script src="js/engine-v3-bundle.js"></script>
<script src="../knowledge/shuhan-mixun-tianji.js"></script>
<script>
var KB=window.SHUHAN_MIXUN_TIANJI_KB||{};
var tabs=[
{id:'overview',name:'📋 总览'},
{id:'paipan',name:'🔮 排盘体系'},
{id:'shihai',name:'⚔️ 四害调理'},
{id:'liuwei',name:'📊 六维运势'},
{id:'mifa',name:'🔑 八大秘法'},
{id:'geju',name:'🎯 格局体系'},
{id:'yongshen',name:'📐 用神体系'},
{id:'tianji',name:'🌟 天纪框架'}
];
var nav=document.getElementById('navTabs');
var content=document.getElementById('content');
tabs.forEach(function(t,i){
var btn=document.createElement('button');
btn.className='nav-tab'+(i===0?' active':'');
btn.textContent=t.name;
btn.onclick=function(){document.querySelectorAll('.nav-tab').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');showPanel(t.id)};
nav.appendChild(btn);
});
function showPanel(id){
content.innerHTML='';
var p=document.createElement('div');
p.className='panel active';
var html='';
try{
if(id==='overview'&&KB.overview){
html+='<div class="card"><div class="card-title">📚 知识库概览</div><div class="card-body">';
html+='<p><b>来源：</b>'+KB.source+'</p>';
html+='<p><b>提取时间：</b>'+KB.extractedAt+'</p>';
if(KB.mixun&&KB.mixun.courseSystem){
html+='<p><b>课程体系：</b>'+KB.mixun.courseSystem+'</p>';
}
html+='</div></div>';
}
if(KB.mixun){
var m=KB.mixun;
if(id==='paipan'&&m.paipan){html+=renderSection('排盘体系',m.paipan);}
if(id==='shihai'&&m.sihai){html+=renderSection('四害调理',m.sihai);}
if(id==='liuwei'&&m.liuweiModel){html+=renderSection('六维运势分析',m.liuweiModel);}
if(id==='mifa'&&m.eightSecrets){html+=renderSection('八大秘法',m.eightSecrets);}
if(id==='geju'&&m.gejuSystem){html+=renderSection('格局体系',m.gejuSystem);}
if(id==='yongshen'&&m.yongshen){html+=renderSection('用神体系',m.yongshen);}
}
if(KB.tianji&&id==='tianji'){
html+=renderSection('天纪框架',KB.tianji);
}
}catch(e){html='<div class="card"><div class="card-body">内容加载中...</div></div>';}
if(!html){html='<div class="card"><div class="card-body">该模块内容正在整理中...</div></div>';}
p.innerHTML=html;
content.appendChild(p);
}
function renderSection(title,obj){
var html='';
if(Array.isArray(obj)){
obj.forEach(function(item,i){
html+='<div class="card"><div class="card-title">'+(item.title||title+' '+(i+1))+'</div><div class="card-body">';
if(item.content){html+='<p>'+(typeof item.content==='string'?item.content:JSON.stringify(item.content))+'</p>';}
if(item.items){html+='<ul>';item.items.forEach(function(it){html+='<li>'+(typeof it==='string'?it:JSON.stringify(it))+'</li>'});html+='</ul>';}
html+='</div></div>';
});
}else if(typeof obj==='object'){
Object.keys(obj).forEach(function(key){
html+='<div class="card"><div class="card-title">'+key+'</div><div class="card-body">';
var v=obj[key];
if(typeof v==='string'){html+='<p>'+v+'</p>';}
else if(Array.isArray(v)){html+='<ul>';v.forEach(function(it){html+='<li>'+(typeof it==='string'?it:JSON.stringify(it))+'</li>'});html+='</ul>';}
else if(typeof v==='object'){html+='<p>'+JSON.stringify(v,null,2).replace(/[{}"\[\]]/g,'').replace(/,\n/g,'<br>')+'</p>';}
else{html+='<p>'+String(v)+'</p>';}
html+='</div></div>';
});
}else{
html+='<div class="card"><div class="card-body"><p>'+String(obj)+'</p></div></div>';
}
return html;
}
showPanel('overview');
</script>
</body>
</html>
