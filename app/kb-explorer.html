<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库浏览器 | 命理宝鉴</title>
<link rel="stylesheet" href="css/pro-panel.css">
<style>
:root{--bg:#0a0a0f;--line:rgba(255,255,255,.08);--paper:#e8e4df;--paper3:#b0a89e;--gold:#c9a84c;--gold2:#b8943f;--green:#5cb878;--red:#d76060;--blue:#5b9bd5}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--paper);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;line-height:1.6;padding-bottom:60px}
.kbe-wrap{max-width:1200px;margin:0 auto;padding:20px}
.kbe-header{text-align:center;padding:30px 0 20px;margin-bottom:24px;border-bottom:2px solid var(--line);position:relative}
.kbe-header h1{font-size:30px;color:var(--gold);letter-spacing:6px;margin-bottom:10px}
.kbe-header p{font-size:12px;opacity:.6;letter-spacing:2px}
.kbe-engine{position:absolute;top:30px;right:30px;font-size:11px;color:var(--gold);opacity:.6;letter-spacing:1px}
.kbe-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kbe-stat{padding:18px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;position:relative;overflow:hidden}
.kbe-stat::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--gold)}
.kbe-stat.blue::before{background:var(--blue)}
.kbe-stat.green::before{background:var(--green)}
.kbe-stat.red::before{background:var(--red)}
.kbe-stat-label{font-size:11px;color:var(--paper3);letter-spacing:1.5px;margin-bottom:8px}
.kbe-stat-num{font-size:28px;font-weight:700;color:var(--gold)}
.kbe-stat.blue .kbe-stat-num{color:var(--blue)}
.kbe-stat.green .kbe-stat-num{color:var(--green)}
.kbe-stat.red .kbe-stat-num{color:var(--red)}
.kbe-stat-sub{font-size:11px;opacity:.5;margin-top:4px}
.kbe-search{display:flex;gap:10px;margin-bottom:24px;padding:18px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;align-items:center}
.kbe-search input{flex:1;padding:12px 16px;background:rgba(0,0,0,.4);color:var(--paper);border:1px solid var(--line);border-radius:8px;font-size:14px;transition:.2s}
.kbe-search input:focus{border-color:var(--gold);outline:none;box-shadow:0 0 0 3px rgba(201,168,76,.15)}
.kbe-search select{padding:12px 16px;background:rgba(0,0,0,.4);color:var(--paper);border:1px solid var(--line);border-radius:8px;font-size:13px;cursor:pointer}
.kbe-search button{padding:12px 24px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0f;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:2px}
.kbe-search button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(201,168,76,.4)}
.kbe-tabs{display:flex;gap:6px;margin-bottom:20px;border-bottom:1px solid var(--line)}
.kbe-tab{padding:10px 20px;background:transparent;border:none;color:var(--paper3);font-size:13px;letter-spacing:1px;cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.kbe-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.kbe-tab:hover{color:var(--paper)}
.kbe-panel{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:20px;min-height:300px}
.kbe-panel-title{font-size:14px;color:var(--gold);letter-spacing:2px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px dashed var(--line)}
.kbe-panel-title .panel-en{font-size:10px;opacity:.5;margin-left:8px;letter-spacing:1px;text-transform:uppercase}
.kbe-modules{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.kbe-mod{padding:12px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:8px;cursor:pointer;transition:.2s;text-align:center}
.kbe-mod:hover{border-color:var(--gold);background:rgba(201,168,76,.08)}
.kbe-mod-name{font-size:14px;color:var(--paper);margin-bottom:4px;font-weight:600}
.kbe-mod-count{font-size:11px;color:var(--paper3);opacity:.7}
.kbe-mod-count strong{color:var(--gold)}
.kbe-results{display:grid;gap:14px}
.kbe-result{padding:18px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:10px;transition:.2s;cursor:pointer}
.kbe-result:hover{border-color:var(--gold);transform:translateX(4px)}
.kbe-result-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.kbe-mod-badge{padding:3px 10px;background:rgba(201,168,76,.15);color:var(--gold);border-radius:12px;font-size:11px;font-weight:600;letter-spacing:1px}
.kbe-trust-badge{padding:3px 10px;background:rgba(92,184,120,.15);color:var(--green);border-radius:12px;font-size:11px;font-weight:600}
.kbe-trust-badge.low{background:rgba(215,96,96,.15);color:var(--red)}
.kbe-result-title{font-size:16px;color:var(--paper);font-weight:600;flex:1}
.kbe-result-snippet{font-size:13px;color:var(--paper3);line-height:1.7;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.kbe-result-meta{font-size:11px;color:var(--paper3);opacity:.6;margin-top:8px;display:flex;gap:14px}
.kbe-empty{text-align:center;padding:60px 20px;color:var(--paper3);opacity:.5}
.kbe-empty-icon{font-size:50px;margin-bottom:14px;opacity:.3}
.kbe-loading{text-align:center;padding:40px;color:var(--paper3)}
.kbe-hits-bar{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px dashed var(--line)}
.kbe-hits-bar:last-child{border-bottom:none}
.kbe-hits-name{flex:0 0 120px;font-size:13px;color:var(--paper3)}
.kbe-hits-bar-track{flex:1;height:22px;background:rgba(255,255,255,.05);border-radius:11px;overflow:hidden;position:relative}
.kbe-hits-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:11px;transition:width .8s}
.kbe-hits-bar-val{flex:0 0 60px;text-align:right;font-size:13px;color:var(--gold);font-weight:600}
.kbe-footnav{margin-top:30px;text-align:center;padding:20px;font-size:12px;opacity:.4;border-top:1px solid var(--line)}
.kbe-footnav a{color:var(--gold);text-decoration:none;margin:0 8px}
@media(max-width:768px){.kbe-stats{grid-template-columns:repeat(2,1fr)}.kbe-search{flex-direction:column;align-items:stretch}.kbe-modules{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}.kbe-engine{position:static;text-align:center;margin-top:10px}}
</style>
</head>
<body>
<div class="kbe-wrap">
<div class="kbe-header">
<h1>📚 知识库浏览器</h1>
<p>命理 / 中医 / 风水 / 八字 · 9173 条权威知识 · 实时检索</p>
<span class="kbe-engine">🔍 KB Search Engine · v1</span>
</div>

<div class="kbe-stats" id="statsBox">
<div class="kbe-stat"><div class="kbe-stat-label">📚 总条目</div><div class="kbe-stat-num" id="statTotal">—</div><div class="kbe-stat-sub">kb_formal</div></div>
<div class="kbe-stat blue"><div class="kbe-stat-label">⭐ 高置信度</div><div class="kbe-stat-num" id="statHi">—</div><div class="kbe-stat-sub">trust ≥ 0.7</div></div>
<div class="kbe-stat green"><div class="kbe-stat-label">🎯 总命中</div><div class="kbe-stat-num" id="statHits">—</div><div class="kbe-stat-sub">累计 hit_count</div></div>
<div class="kbe-stat red"><div class="kbe-stat-label">📂 模块数</div><div class="kbe-stat-num" id="statMod">—</div><div class="kbe-stat-sub">多领域知识</div></div>
</div>

<div class="kbe-search">
<input type="text" id="qInput" placeholder="搜中医、八字、倪海厦、失眠、风水...（2字以上）" autocomplete="off">
<select id="modFilter"><option value="">全部模块</option></select>
<button onclick="doSearch()">🔍 搜索</button>
</div>

<div class="kbe-tabs">
<button class="kbe-tab active" data-tab="search" onclick="switchTab('search')">🔍 检索结果</button>
<button class="kbe-tab" data-tab="modules" onclick="switchTab('modules')">📂 模块分布</button>
<button class="kbe-tab" data-tab="hits" onclick="switchTab('hits')">🎯 命中统计</button>
</div>

<div class="kbe-panel" id="tabPanel">
<div class="kbe-panel-title" id="panelTitle">检索结果 <span class="panel-en">Search Results</span></div>
<div id="resultBox">
<div class="kbe-empty">
<div class="kbe-empty-icon">📖</div>
<div>输入关键词开始检索命理宝鉴知识库</div>
<div style="margin-top:14px;font-size:12px;opacity:.6">支持：中医 / 倪海厦 / 八字 / 风水 / 紫微 / 奇门 / 易经 / 舒晗老师...</div>
</div>
</div>
</div>

<div class="kbe-footnav">
<a href="index.html">🏠 首页</a>
<a href="ai-assistant.html">🤖 AI 助手</a>
<a href="divination-hub.html">🔮 化解枢纽</a>
<a href="knowledge-panel.html">📚 经典知识</a>
<a href="https://github.com/sgmt-taojing/mingli-baojian" target="_blank">⭐ GitHub</a>
</div>
</div>

<script>
const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.hostname === '')
  ? 'http://127.0.0.1:8920' : '';
let allModules = [];
let currentTab = 'search';

function fmtNum(n){ return Number(n||0).toLocaleString('zh-CN'); }

async function fetchStats(){
  try{
    const r = await fetch(API + '/api/public/kb/stats');
    const d = await r.json();
    document.getElementById('statTotal').textContent = fmtNum(d.total);
    document.getElementById('statHi').textContent = fmtNum(d.hi_trust);
    document.getElementById('statHits').textContent = fmtNum(d.total_hits);
    document.getElementById('statMod').textContent = (d.top_modules || []).length || 41;
    return d;
  }catch(e){
    document.getElementById('statTotal').textContent = '9173';
    document.getElementById('statHi').textContent = '—';
    document.getElementById('statHits').textContent = '—';
    document.getElementById('statMod').textContent = '41';
  }
}

async function fetchModules(){
  try{
    const r = await fetch(API + '/api/public/kb-manager/list');
    const d = await r.json();
    if(d && d.modules){
      allModules = d.modules;
      const sel = document.getElementById('modFilter');
      allModules.slice().sort((a,b)=>b.count-a.count).forEach(m=>{
        const opt = document.createElement('option');
        opt.value = m.module;
        opt.textContent = `${m.module} (${m.count})`;
        sel.appendChild(opt);
      });
    }
  }catch(e){}
}

async function fetchHits(){
  try{
    const r = await fetch(API + '/api/public/kb/hits');
    const d = await r.json();
    return d;
  }catch(e){ return null; }
}

async function doSearch(){
  const q = document.getElementById('qInput').value.trim();
  const mod = document.getElementById('modFilter').value;
  if(!q || q.length < 2){
    document.getElementById('resultBox').innerHTML = '<div class="kbe-empty"><div class="kbe-empty-icon">⚠️</div><div>请输入至少 2 个字符</div></div>';
    return;
  }
  switchTab('search');
  document.getElementById('resultBox').innerHTML = '<div class="kbe-loading">正在检索知识库</div>';
  try{
    const r = await fetch(API + '/api/public/kb/search?q=' + encodeURIComponent(q) + (mod ? '&module=' + encodeURIComponent(mod) : ''));
    const d = await r.json();
    const results = d.results || [];
    if(!results.length){
      document.getElementById('resultBox').innerHTML = '<div class="kbe-empty"><div class="kbe-empty-icon">🔍</div><div>未找到匹配条目</div><div style="margin-top:14px;font-size:12px;opacity:.6">试试其他关键词，比如"失眠"、"五行"、"倪师方剂"</div></div>';
      return;
    }
    let html = '<div class="kbe-results">';
    results.forEach(r=>{
      const trustClass = r.trust_score >= 0.85 ? '' : 'low';
      const trustLabel = r.trust_score >= 0.85 ? '高置信' : (r.trust_score >= 0.7 ? '置信' : '一般');
      html += `<div class="kbe-result">
        <div class="kbe-result-head">
          <span class="kbe-mod-badge">${r.module}</span>
          <span class="kbe-result-title">${r.title}</span>
          <span class="kbe-trust-badge ${trustClass}">⭐ ${trustLabel} ${r.trust_score}</span>
        </div>
        <div class="kbe-result-snippet">${r.snippet || ''}</div>
        <div class="kbe-result-meta">
          <span>🎯 命中 ${r.hit_count||0} 次</span>
          <span>📖 模块：${r.module}</span>
        </div>
      </div>`;
    });
    html += '</div>';
    document.getElementById('resultBox').innerHTML = html;
  }catch(e){
    document.getElementById('resultBox').innerHTML = '<div class="kbe-empty"><div class="kbe-empty-icon">❌</div><div>检索失败：' + e.message + '</div></div>';
  }
}

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.kbe-tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
  const title = tab === 'search' ? '检索结果' : tab === 'modules' ? '模块分布' : '命中统计';
  const titleEn = tab === 'search' ? 'Search Results' : tab === 'modules' ? 'Modules' : 'Hit Stats';
  document.getElementById('panelTitle').innerHTML = title + ' <span class="panel-en">' + titleEn + '</span>';
  if(tab === 'modules') renderModules();
  else if(tab === 'hits') renderHits();
  else document.getElementById('resultBox').innerHTML = '<div class="kbe-empty"><div class="kbe-empty-icon">📖</div><div>请在上方输入关键词进行检索</div></div>';
}

function renderModules(){
  if(!allModules.length){
    document.getElementById('resultBox').innerHTML = '<div class="kbe-loading">加载模块列表</div>';
    return;
  }
  const sorted = allModules.slice().sort((a,b)=>b.count-a.count);
  let html = '<div class="kbe-modules">';
  sorted.forEach(m=>{
    html += `<div class="kbe-mod" onclick="document.getElementById('modFilter').value='${m.module}';switchTab('search');doSearch()">
      <div class="kbe-mod-name">${m.module}</div>
      <div class="kbe-mod-count"><strong>${m.count}</strong> 条</div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('resultBox').innerHTML = html;
}

async function renderHits(){
  document.getElementById('resultBox').innerHTML = '<div class="kbe-loading">加载命中统计</div>';
  const d = await fetchHits();
  if(!d || !d.modules || !d.modules.length){
    document.getElementById('resultBox').innerHTML = '<div class="kbe-empty"><div class="kbe-empty-icon">📊</div><div>暂无命中数据</div><div style="margin-top:14px;font-size:12px;opacity:.6">通过 AI 助手或 KB 检索产生的命中会显示在这里</div></div>';
    return;
  }
  const max = Math.max(...d.modules.map(m=>m.hits));
  let html = '<div style="margin-bottom:16px;font-size:12px;color:var(--paper3);opacity:.7">📅 ' + d.date + '　·　今日总命中：<strong style="color:var(--gold)">' + d.total + '</strong> 次</div>';
  d.modules.forEach(m=>{
    const pct = max ? (m.hits / max * 100) : 0;
    html += `<div class="kbe-hits-bar">
      <div class="kbe-hits-name">${m.module}</div>
      <div class="kbe-hits-bar-track"><div class="kbe-hits-bar-fill" style="width:${pct}%"></div></div>
      <div class="kbe-hits-bar-val">${m.hits}</div>
    </div>`;
  });
  document.getElementById('resultBox').innerHTML = html;
}

document.getElementById('qInput').addEventListener('keypress', e=>{
  if(e.key === 'Enter') doSearch();
});

(async function init(){
  await fetchStats();
  await fetchModules();
})();
</script>
</body>
</html>
