<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="站内消息">
<title>站内消息 · 易道智鉴</title>
<style>
:root{
  --bg:#0b1220;--bg2:#0f172a;--card:#1e293b;--card2:#273449;
  --line:#334155;--line2:#475569;--text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;
  --gold:#f59e0b;--gold2:#fbbf24;--accent:#06b6d4;--accent2:#22d3ee;
  --ok:#22c55e;--warn:#eab308;--err:#ef4444;
  --me:#3b82f6;--other:#475569;
  --r:14px;--r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;height:100%}
body{display:flex;flex-direction:column;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}

/* ===== 顶栏 ===== */
.topbar{
  position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:10px;
  padding:14px 16px;background:linear-gradient(180deg,var(--bg2),rgba(15,23,42,.92));
  backdrop-filter:blur(20px);border-bottom:1px solid var(--line);
}
.topbar .back{
  width:32px;height:32px;display:grid;place-items:center;border-radius:10px;
  background:var(--card);color:var(--text);text-decoration:none;font-size:18px;
}
.topbar h1{flex:1;font-size:17px;font-weight:600;letter-spacing:.5px}
.topbar .new-btn{
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#001020;
  padding:8px 14px;border-radius:20px;text-decoration:none;font-size:13px;font-weight:600;
}
.topbar .badge{
  position:absolute;top:8px;right:8px;background:var(--err);color:#fff;
  font-size:10px;padding:2px 6px;border-radius:10px;font-weight:700;display:none;
}

/* ===== Tab 切换 ===== */
.tabs{display:flex;background:var(--bg2);padding:0 16px;border-bottom:1px solid var(--line);gap:0}
.tab{
  flex:1;padding:12px 0;text-align:center;font-size:14px;color:var(--muted);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-weight:500;
}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ===== 视图容器 ===== */
.view{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.view.active{display:flex;flex-direction:column}

/* ===== 会话列表 ===== */
.session-list{padding:8px 0;flex:1;overflow-y:auto}
.session-item{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  border-bottom:1px solid var(--line);cursor:pointer;transition:background .15s;
}
.session-item:active{background:var(--card)}
.avatar{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:grid;place-items:center;color:#001020;font-weight:700;font-size:18px;
}
.avatar.ai{background:linear-gradient(135deg,var(--gold),var(--gold2))}
.avatar.group{background:linear-gradient(135deg,#a855f7,#ec4899)}
.session-info{flex:1;min-width:0}
.session-title{display:flex;align-items:center;justify-content:space-between;gap:8px}
.session-name{font-size:15px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-time{font-size:11px;color:var(--dim);flex-shrink:0}
.session-preview{
  display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:4px;
}
.preview-text{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.preview-unread{
  background:var(--err);color:#fff;font-size:11px;padding:1px 7px;border-radius:10px;
  font-weight:700;min-width:20px;text-align:center;flex-shrink:0;
}

/* ===== 通讯录 ===== */
.directory{padding:8px 0;flex:1;overflow-y:auto}
.role-section{padding:8px 16px 4px}
.role-label{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.contact-list{display:flex;flex-direction:column}
.contact-item{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  border-bottom:1px solid var(--line);cursor:pointer;
}
.contact-item:active{background:var(--card)}
.contact-info{flex:1}
.contact-name{font-size:15px;font-weight:600;color:var(--text)}
.contact-role{font-size:12px;color:var(--muted);margin-top:2px}
.role-tag{
  display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;
  font-weight:600;background:var(--card2);color:var(--accent);margin-left:6px;
}
.role-tag.ai{background:rgba(245,158,11,.15);color:var(--gold2)}
.role-tag.admin{background:rgba(239,68,68,.15);color:var(--err)}
.role-tag.master{background:rgba(168,85,247,.15);color:#c084fc}
.role-tag.doctor{background:rgba(34,197,94,.15);color:var(--ok)}
.role-tag.agent{background:rgba(234,179,8,.15);color:var(--warn)}

/* ===== 空态 ===== */
.empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 30px;text-align:center;color:var(--dim);
}
.empty-icon{font-size:64px;margin-bottom:16px;opacity:.4}
.empty-title{font-size:16px;font-weight:600;color:var(--muted);margin-bottom:6px}
.empty-desc{font-size:13px;color:var(--dim);line-height:1.6}
.empty-btn{
  margin-top:20px;padding:10px 24px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#001020;border-radius:24px;font-weight:600;text-decoration:none;font-size:14px;
}

/* ===== 详情页 / 聊天面板 ===== */
.chat{
  flex:1;display:none;flex-direction:column;height:100vh;
  position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:100;
}
.chat.active{display:flex}
.chat-header{
  display:flex;align-items:center;gap:10px;padding:14px 16px;
  background:var(--bg2);border-bottom:1px solid var(--line);
  padding-top:max(14px,env(safe-area-inset-top));
}
.chat-header .back{width:32px;height:32px;display:grid;place-items:center;border-radius:10px;background:var(--card);font-size:18px;cursor:pointer}
.chat-header .title{flex:1;font-size:16px;font-weight:600}
.chat-header .ai-btn{
  background:rgba(245,158,11,.15);color:var(--gold2);padding:7px 12px;
  border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(245,158,11,.3);
}
.chat-body{
  flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;
  display:flex;flex-direction:column;gap:10px;
}
.msg{display:flex;gap:8px;max-width:85%;align-items:flex-end}
.msg.me{margin-left:auto;flex-direction:row-reverse}
.msg .avatar{width:36px;height:36px;font-size:14px}
.msg-bubble{
  padding:10px 14px;border-radius:14px;word-break:break-word;
  font-size:14px;line-height:1.5;
}
.msg.me .msg-bubble{background:var(--me);color:#fff;border-bottom-right-radius:4px}
.msg.other .msg-bubble{background:var(--card);color:var(--text);border-bottom-left-radius:4px}
.msg.system .msg-bubble{background:rgba(245,158,11,.1);color:var(--gold2);font-size:12px;font-style:italic;text-align:center;max-width:100%;border-radius:8px}
.msg.ai .msg-bubble{background:rgba(245,158,11,.08);color:var(--text);border:1px solid rgba(245,158,11,.2);border-bottom-left-radius:4px}
.msg-meta{font-size:10px;color:var(--dim);margin-top:3px}
.msg-time{text-align:center;font-size:11px;color:var(--dim);margin:10px 0}

.chat-input{
  display:flex;gap:8px;padding:10px 12px;background:var(--bg2);border-top:1px solid var(--line);
  padding-bottom:max(10px,env(safe-area-inset-bottom));
}
.chat-input textarea{
  flex:1;background:var(--card);color:var(--text);border:1px solid var(--line);
  border-radius:20px;padding:9px 14px;font-size:14px;font-family:inherit;resize:none;
  max-height:120px;min-height:38px;line-height:1.4;
}
.chat-input textarea:focus{outline:none;border-color:var(--accent)}
.chat-input .send-btn{
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#001020;
  border:none;border-radius:20px;padding:0 18px;font-size:14px;font-weight:600;cursor:pointer;
}
.chat-input .send-btn:disabled{opacity:.5;cursor:not-allowed}

/* ===== 加载态 ===== */
.loading{padding:40px;text-align:center;color:var(--muted);font-size:13px}
.spinner{
  display:inline-block;width:20px;height:20px;border:2px solid var(--line);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;
  vertical-align:middle;margin-right:8px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== 角色徽章颜色 ===== */
.role-tag[data-role="admin"]{background:rgba(239,68,68,.15);color:var(--err)}
.role-tag[data-role="master"]{background:rgba(168,85,247,.15);color:#c084fc}
.role-tag[data-role="doctor"]{background:rgba(34,197,94,.15);color:var(--ok)}
.role-tag[data-role="agent"]{background:rgba(234,179,8,.15);color:var(--warn)}
.role-tag[data-role="ai"]{background:rgba(245,158,11,.15);color:var(--gold2)}
.role-tag[data-role="user"]{background:var(--card2);color:var(--muted)}

/* ===== 移动端适配 ===== */
@media(max-width:480px){
  .session-item,.contact-item{padding:12px 14px}
  .avatar{width:44px;height:44px;font-size:16px}
  .msg{max-width:90%}
}
</style>
</head>
<body>

<!-- 顶栏 -->
<header class="topbar">
  <a class="back" href="divination-hub.html" title="返回首页">←</a>
  <h1>站内消息</h1>
  <a class="new-btn" id="newBtn" href="javascript:void(0)">＋ 新建</a>
  <span class="badge" id="topBadge"></span>
</header>

<!-- 视图 Tab -->
<nav class="tabs">
  <div class="tab active" data-view="sessions">会话</div>
  <div class="tab" data-view="directory">通讯录</div>
</nav>

<!-- 会话视图 -->
<section class="view active" id="view-sessions">
  <div class="session-list" id="sessionList">
    <div class="loading"><span class="spinner"></span>加载会话中...</div>
  </div>
</section>

<!-- 通讯录视图 -->
<section class="view" id="view-directory">
  <div class="directory" id="directoryList">
    <div class="loading"><span class="spinner"></span>加载通讯录中...</div>
  </div>
</section>

<!-- 聊天面板 -->
<div class="chat" id="chatPanel">
  <header class="chat-header">
    <span class="back" id="chatBack">←</span>
    <span class="title" id="chatTitle">会话</span>
    <span class="ai-btn" id="aiBtn" style="display:none">✨ 召 AI</span>
  </header>
  <div class="chat-body" id="chatBody"></div>
  <div class="chat-input">
    <textarea id="msgInput" rows="1" placeholder="输入消息..." maxlength="4000"></textarea>
    <button class="send-btn" id="sendBtn">发送</button>
  </div>
</div>

<script src="js/ui-toast.js"></script>
<script>
/* ============ 全局态 ============ */
const API_BASE = (location.hostname === '127.0.0.1' || location.hostname === 'localhost')
  ? 'http://127.0.0.1:8920/api/v1' : '/api/v1';

// ME 用户身份：优先从 localStorage 读 token 解码，否则从 userInfo 同步
function getCurrentMe() {
  // 优先尝试 JWT 解码
  try {
    const tk = localStorage.getItem('token') || sessionStorage.getItem('token');
    if (tk && tk.split('.').length === 3) {
      const payload = JSON.parse(atob(tk.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
      if (payload.uid || payload.userId || payload.id) {
        return {
          id: String(payload.uid || payload.userId || payload.id),
          role: payload.role || 'user',
          name: payload.name || payload.username || '访客'
        };
      }
    }
  } catch(e) {}
  // 否则用持久化的访客 ID（首次访问写入）
  let gid = localStorage.getItem('im_user_id');
  if (!gid) {
    // 用稳定的 nonce（基于日期的非随机值）
    const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    gid = 'guest_' + today;
    localStorage.setItem('im_user_id', gid);
  }
  return {
    id: gid,
    role: localStorage.getItem('im_user_role') || 'user',
    name: localStorage.getItem('im_user_name') || '访客'
  };
}
const ME = getCurrentMe();
localStorage.setItem('im_user_role', ME.role);
localStorage.setItem('im_user_id', ME.id);
localStorage.setItem('im_user_role', ME.role);

let currentChatId = null;
let sseSource = null;

/* ============ API 封装 ============ */
async function api(path, options = {}){
  const r = await fetch(API_BASE + path, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      'X-User-Id': ME.id,
      'X-User-Role': ME.role,
      ...(options.headers || {})
    }
  });
  const data = await r.json().catch(() => ({ ok:false, error:'PARSE_FAIL' }));
  if(!data.ok){
    toast(data.message || data.error || '请求失败', 'err');
    throw new Error(data.message || data.error);
  }
  return data;
}

/* ============ 视图切换 ============ */
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('view-' + t.dataset.view).classList.add('active');
    if(t.dataset.view === 'sessions') loadSessions();
    else loadDirectory();
  };
});

/* ============ 加载会话列表 ============ */
async function loadSessions(){
  const box = document.getElementById('sessionList');
  box.innerHTML = '<div class="loading"><span class="spinner"></span>加载会话中...</div>';
  try{
    const { sessions } = await api('/im/sessions');
    if(!sessions.length){
      box.innerHTML = `
        <div class="empty">
          <div class="empty-icon">💬</div>
          <div class="empty-title">还没有会话</div>
          <div class="empty-desc">从通讯录发起对话<br>或召唤 AI 助手解惑</div>
          <a class="empty-btn" href="javascript:void(0)" onclick="document.querySelector('.tab[data-view=directory]').click()">打开通讯录</a>
        </div>`;
      return;
    }
    box.innerHTML = sessions.map(s => {
      const otherParts = s.participants.filter(p => p.user_id !== ME.id);
      const otherName = s.is_group ? (s.title || '群聊') :
        (otherParts[0]?.role === 'ai' ? 'AI 命理助手' :
         otherParts.map(p => roleLabel(p.role)).join('/') || '会话');
      const avatarClass = s.is_group ? 'group' : (otherParts[0]?.role === 'ai' ? 'ai' : '');
      const avatarChar = s.is_group ? '群' : (otherParts[0]?.role === 'ai' ? 'AI' :
        (otherParts[0]?.user_id || '?').toString().slice(0,2));
      return `
        <div class="session-item" onclick="openChat(${s.id}, '${escAttr(otherName)}')">
          <div class="avatar ${avatarClass}">${escHtml(avatarChar)}</div>
          <div class="session-info">
            <div class="session-title">
              <div class="session-name">${escHtml(otherName)}</div>
              <div class="session-time">${formatTime(s.last_msg_at)}</div>
            </div>
            <div class="session-preview">
              <div class="preview-text">${escHtml(s.last_msg_preview || '暂无消息')}</div>
              ${s.unread > 0 ? `<div class="preview-unread">${s.unread}</div>` : ''}
            </div>
          </div>
        </div>`;
    }).join('');
  }catch(e){
    box.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">加载失败</div><div class="empty-desc">${escHtml(e.message)}</div></div>`;
  }
}

/* ============ 加载通讯录 ============ */
async function loadDirectory(){
  const box = document.getElementById('directoryList');
  box.innerHTML = '<div class="loading"><span class="spinner"></span>加载通讯录中...</div>';
  try{
    const { list, allowRoles } = await api('/im/directory');
    const grouped = {};
    for(const r of allowRoles) grouped[r] = [];
    for(const u of list){
      const r = u.role || 'user';
      if(!grouped[r]) grouped[r] = [];
      grouped[r].push(u);
    }
    const order = ['ai','admin','master','doctor','agent','user'];
    let html = '';
    for(const r of order){
      const arr = grouped[r];
      if(!arr || !arr.length) continue;
      html += `<div class="role-section"><div class="role-label">${roleLabel(r)} · ${arr.length}</div></div><div class="contact-list">`;
      for(const u of arr){
        html += `
          <div class="contact-item" onclick="startDirectChat('${escAttr(u.id)}','${escAttr(u.role)}','${escAttr(u.name)}')">
            <div class="avatar ${u.role==='ai'?'ai':''}">${u.role==='ai'?'AI':escHtml(u.name.slice(0,2))}</div>
            <div class="contact-info">
              <div class="contact-name">${escHtml(u.name)}<span class="role-tag ${u.role}">${roleLabel(u.role)}</span></div>
              <div class="contact-role">${u.role==='ai'?'可召唤进入任意会话':'点击发起对话'}</div>
            </div>
          </div>`;
      }
      html += '</div>';
    }
    box.innerHTML = html || '<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">通讯录为空</div></div>';
  }catch(e){
    box.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">加载失败</div><div class="empty-desc">${escHtml(e.message)}</div></div>`;
  }
}

/* ============ 新建会话按钮 ============ */
document.getElementById('newBtn').onclick = () => {
  document.querySelector('.tab[data-view=directory]').click();
};

/* ============ 发起一对一对话 ============ */
async function startDirectChat(oid, orole, oname){
  try{
    const { sessionId } = await api('/im/sessions', {
      method: 'POST',
      body: JSON.stringify({ participants: [{ id: oid, role: orole }], isGroup: false })
    });
    openChat(sessionId, orole === 'ai' ? 'AI 命理助手' : oname);
  }catch(e){
    toast('创建会话失败：' + e.message, 'err');
  }
}

/* ============ 打开聊天面板 ============ */
async function openChat(sid, title){
  currentChatId = sid;
  document.getElementById('chatTitle').textContent = title;
  document.getElementById('chatPanel').classList.add('active');
  document.getElementById('aiBtn').style.display = title.includes('AI') ? 'none' : 'inline-block';
  await loadMessages(sid);
  // 标记已读
  api('/im/sessions/' + sid + '/read', { method: 'POST' }).catch(()=>{});
}

document.getElementById('chatBack').onclick = () => {
  document.getElementById('chatPanel').classList.remove('active');
  currentChatId = null;
  loadSessions();
};

/* ============ 加载历史消息 ============ */
async function loadMessages(sid){
  const body = document.getElementById('chatBody');
  body.innerHTML = '<div class="loading"><span class="spinner"></span>加载消息...</div>';
  try{
    const { messages } = await api('/im/sessions/' + sid + '/messages?limit=50');
    renderMessages(messages);
  }catch(e){
    body.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">加载失败</div></div>`;
  }
}

function renderMessages(msgs){
  const body = document.getElementById('chatBody');
  if(!msgs.length){
    body.innerHTML = '<div class="empty"><div class="empty-icon">👋</div><div class="empty-title">开始对话吧</div></div>';
    return;
  }
  let html = '';
  let lastDate = '';
  for(const m of msgs){
    const dt = new Date(m.created_at);
    const dateStr = dt.toLocaleDateString('zh-CN');
    if(dateStr !== lastDate){
      html += `<div class="msg-time">${dateStr}</div>`;
      lastDate = dateStr;
    }
    const isMe = m.sender_id === ME.id;
    const isSystem = m.msg_type === 'system';
    const isAi = m.sender_role === 'ai';
    html += `<div class="msg ${isMe?'me':(isSystem?'system':(isAi?'ai':'other'))}">`;
    if(!isMe && !isSystem){
      html += `<div class="avatar ${isAi?'ai':''}">${isAi?'AI':escHtml(m.sender_id.slice(0,2))}</div>`;
    }
    html += `<div>
      <div class="msg-bubble">${escHtml(m.content)}</div>
      <div class="msg-meta">${dt.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</div>
    </div></div>`;
  }
  body.innerHTML = html;
  body.scrollTop = body.scrollHeight;
}

/* ============ 发送消息 ============ */
async function sendMessage(){
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text || !currentChatId) return;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  input.value = '';
  try{
    await api('/im/sessions/' + currentChatId + '/messages', {
      method: 'POST',
      body: JSON.stringify({ content: text, msgType: 'text' })
    });
    // 重新加载（也可乐观更新）
    await loadMessages(currentChatId);
  }catch(e){
    toast('发送失败：' + e.message, 'err');
  }finally{
    btn.disabled = false;
    input.focus();
  }
}

document.getElementById('sendBtn').onclick = sendMessage;
document.getElementById('msgInput').addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});

/* ============ AI 助手召唤 ============ */
document.getElementById('aiBtn').onclick = async () => {
  if(!currentChatId) return;
  const input = document.getElementById('msgInput');
  const question = input.value.trim() || '请基于本次对话上下文给出整体建议';
  try{
    const { answer } = await api('/im/sessions/' + currentChatId + '/ai', {
      method: 'POST',
      body: JSON.stringify({ question, module: 'bazi' })
    });
    toast('AI 已回应', 'ok');
    await loadMessages(currentChatId);
  }catch(e){
    toast('召唤失败：' + e.message, 'err');
  }
};

/* ============ 工具函数 ============ */
function escHtml(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escAttr(s){ return escHtml(s).replace(/"/g,'&quot;'); }
function roleLabel(r){
  return ({admin:'管理员',master:'大师',doctor:'医师',agent:'代理',user:'信众',ai:'AI 助手'})[r] || r;
}
function formatTime(ts){
  if(!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diff = (now - d) / 1000;
  if(diff < 60) return '刚刚';
  if(diff < 3600) return Math.floor(diff/60) + '分钟前';
  if(diff < 86400) return Math.floor(diff/3600) + '小时前';
  if(diff < 86400*7) return Math.floor(diff/86400) + '天前';
  return d.toLocaleDateString('zh-CN').slice(5);
}

/* ============ 启动 ============ */
loadSessions();
loadUnread();
setInterval(loadUnread, 30000);

// === SSE 实时消息推送 ===
let sseRetry = 0;
function connectSSE() {
  try {
    if (sseSource) sseSource.close();
    const url = API_BASE + '/im/stream?' + (ME.id ? 'token=' + encodeURIComponent(localStorage.getItem('token')||'') : '');
    sseSource = new EventSource(url);
    sseSource.addEventListener('message', e => {
      try {
        const m = JSON.parse(e.data);
        // 当前打开该会话 → 追加；否则刷新未读
        if (currentChatId && m.session_id == currentChatId) {
          appendIncomingMessage(m);
        } else {
          loadUnread();
          // 非当前会话：会话列表顶部加一条提示
          toast('新消息：' + (m.content || '').slice(0, 20), 'info');
        }
      } catch(_){}
    });
    sseSource.onerror = () => {
      sseSource.close();
      // 指数退避重连：3s, 6s, 12s, 30s 上限
      sseRetry = Math.min(sseRetry + 1, 5);
      const wait = Math.min(3000 * Math.pow(2, sseRetry - 1), 30000);
      setTimeout(connectSSE, wait);
    };
    sseSource.onopen = () => { sseRetry = 0; };
  } catch(e) {
    console.warn('SSE connect failed:', e);
  }
}
connectSSE();

function appendIncomingMessage(m) {
  const body = document.getElementById('chatBody');
  // 移除空态
  const empty = body.querySelector('.empty');
  if (empty) empty.remove();
  const isMe = m.sender_id === ME.id;
  const isAi = m.sender_role === 'ai';
  const isSystem = m.msg_type === 'system';
  const dt = new Date(m.created_at || Date.now());
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (isMe ? 'me' : (isSystem ? 'system' : (isAi ? 'ai' : 'other')));
  wrap.innerHTML = `
    ${(!isMe && !isSystem) ? `<div class="avatar ${isAi?'ai':''}">${isAi?'AI':escHtml(String(m.sender_id).slice(0,2))}</div>` : ''}
    <div>
      <div class="msg-bubble">${escHtml(m.content || '')}</div>
      <div class="msg-meta">${dt.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</div>
    </div>`;
  body.appendChild(wrap);
  body.scrollTop = body.scrollHeight;
}

// 离开页面前关闭 SSE
window.addEventListener('beforeunload', () => { try { sseSource && sseSource.close(); } catch(_){} });

async function loadUnread(){
  try{
    const { unread } = await api('/im/unread-count');
    const badge = document.getElementById('topBadge');
    if(unread > 0){
      badge.textContent = unread;
      badge.style.display = 'block';
    }else{
      badge.style.display = 'none';
    }
  }catch(_){}
}
</script>
