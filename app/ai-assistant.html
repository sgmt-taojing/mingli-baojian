<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>
:root{--ink:#080808;--ink2:#111;--paper:#f0e8d8;--paper2:#d4c9b0;--paper3:#8a7e6a;--gold:#c9a84c;--gold2:#e8cc7a;--gold3:#a08030;--border:rgba(201,168,76,.12);--jade:#27ae60}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--ink);color:var(--paper);font-family:'Noto Serif SC',-apple-system,serif;display:flex;flex-direction:column}

/* 导航 */
.nav{position:fixed;top:0;left:0;right:0;z-index:190;background:rgba(8,8,8,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:42px;display:flex;align-items:center;justify-content:center;gap:3px;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav a{flex-shrink:0;padding:4px 10px;background:rgba(201,168,76,0.04);color:var(--gold);border:1px solid var(--border);border-radius:12px;font-size:10px;text-decoration:none;white-space:nowrap;transition:all .15s}
.nav a:hover{background:rgba(201,168,76,0.1)}
.nav a.active{background:rgba(201,168,76,0.18);border-color:var(--gold)}

/* 主体 */
.app{flex:1;display:flex;flex-direction:column;margin-top:42px;max-width:680px;width:100%;margin-left:auto;margin-right:auto;overflow:hidden}

/* 对话区 */
.chat{flex:1;overflow-y:auto;padding:16px 16px 8px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.15);border-radius:2px}

/* 欢迎页 */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:20px}
.welcome .logo{font-size:36px;margin-bottom:8px}
.welcome h2{color:var(--gold);font-size:18px;font-weight:600;margin-bottom:6px;letter-spacing:2px}
.welcome .sub{color:var(--paper3);font-size:12px;margin-bottom:20px;line-height:1.6}
.welcome .suggest{display:flex;flex-direction:column;gap:8px;width:100%;max-width:320px}
.welcome .s-item{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;text-align:left}
.welcome .s-item:hover{border-color:rgba(201,168,76,0.3);background:rgba(201,168,76,0.04)}
.welcome .s-icon{font-size:18px;flex-shrink:0}
.welcome .s-text{font-size:13px;color:var(--paper2)}
.welcome .s-desc{font-size:10px;color:var(--paper3)}

/* 消息 */
.msg{margin-bottom:10px;animation:in .25s ease}
@keyframes in{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
.m-user{display:flex;justify-content:flex-end}
.m-user .b{background:rgba(201,168,76,0.08);border-radius:10px 10px 3px 10px;padding:8px 12px;max-width:80%;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.m-ai .b{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:3px 10px 10px 10px;padding:10px 14px;font-size:13px;line-height:1.75;white-space:pre-wrap;word-break:break-word}
.m-ai .b b{color:var(--gold2)}
.m-ai .b .sec{color:var(--gold);font-weight:600;display:block;margin-top:6px}

/* 追问（极简1行2个）*/
.fu{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.fu button{padding:4px 12px;background:none;border:1px solid var(--border);border-radius:12px;color:var(--paper3);font-size:11px;cursor:pointer;transition:all .15s;font-family:inherit}
.fu button:hover{color:var(--gold);border-color:rgba(201,168,76,0.25)}

/* 操作行（保存+复制→收为小图标）*/
.ops{display:flex;gap:8px;margin-top:4px;opacity:.4}
.ops span{font-size:10px;cursor:pointer;padding:1px 4px}
.ops span:hover{opacity:1}

/* 打字 */
.typing{display:inline-flex;gap:3px;padding:10px 14px}
.typing i{width:5px;height:5px;background:var(--gold);border-radius:50%;animation:bk 1s infinite}
.typing i:nth-child(2){animation-delay:.15s}
.typing i:nth-child(3){animation-delay:.3s}
@keyframes bk{0%,100%{opacity:.2}50%{opacity:1}}

/* 输入区 */
.input{border-top:1px solid var(--border);padding:8px 12px;display:flex;gap:6px;align-items:center;background:rgba(8,8,8,0.85);backdrop-filter:blur(8px)}
.input input{flex:1;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:18px;padding:8px 14px;color:var(--paper);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.input input:focus{border-color:rgba(201,168,76,0.2)}
.input input::placeholder{color:var(--paper3);opacity:.5}
.input .mic{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:none;color:var(--paper3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.input .mic:hover{color:var(--gold)}
.input .mic.on{background:rgba(231,76,60,0.15);border-color:#c0392b;color:#e74c3c}
.input .send{width:32px;height:32px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--gold),var(--gold3));color:var(--ink);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.input .send:active{opacity:.7}

/* toast */
.toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:var(--gold);padding:6px 16px;border-radius:14px;z-index:9999;font-size:11px;animation:in .2s}

@media(max-width:768px){.app{max-width:100%}.chat{padding:12px 10px 6px}.welcome .logo{font-size:28px}.welcome h2{font-size:16px}.m-user .b,.m-ai .b{font-size:12px}.input input{font-size:12px}.nav a{padding:3px 8px;font-size:9px}}
</style>
</head>

<div class="app">
<div class="chat" id="chat">
<div class="welcome" id="welcome">
<div class="logo">🤖</div>
<h2>AI命理助手</h2>
<div class="sub">告诉我您想了解什么<br>命理 · 风水 · 中医 · 运势 · 手机号</div>
<div class="suggest">
<div class="s-item" onclick="ask('我想算八字排盘')">
<div class="s-icon">📅</div>
<div><div class="s-text">八字排盘分析</div><div class="s-desc">提供生辰获取命理报告</div></div>
</div>
<div class="s-item" onclick="ask('分析我的手机号码吉凶')">
<div class="s-icon">📱</div>
<div><div class="s-text">手机号码测评</div><div class="s-desc">八星磁场深度分析</div></div>
</div>
<div class="s-item" onclick="ask('今年运势如何')">
<div class="s-icon">🌟</div>
<div><div class="s-text">运势分析</div><div class="s-desc">流年运势全面预测</div></div>
</div>
</div>
</div>
</div>

<div class="input">
<button class="mic" id="mic" onclick="voice()">🎤</button>
<input type="text" id="box" placeholder="输入问题，或试试「我想算八字」" onkeypress="if(event.key==='Enter')send()">
<button class="send" onclick="send()">➤</button>
</div>
</div>

<script>
const API=(location.hostname==='127.0.0.1'||location.hostname==='localhost')?'http://127.0.0.1:8920':'';
let hist=[],bazi=null;

function ask(q){box.value=q;send()}

async function send(pre){
  const q=(pre||box.value).trim();if(!q)return;
  box.value='';
  if(hist.length===0)chat.innerHTML='';
  add('user',q);
  hist.push({role:'user',content:q});
  if(hist.length>20)hist=hist.slice(-20);
  
  // 打字
  const t=document.createElement('div');
  t.className='msg m-ai';t.id='ty';
  t.innerHTML='<div class="typing"><i></i><i></i><i></i></div>';
  chat.appendChild(t);chat.scrollTop=chat.scrollHeight;
  
  try{
    const r=await fetch(API+'/api/ai/public-chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:hist.slice(-10),baziData:bazi})});
    const d=await r.json();
    const reply=(d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||'抱歉，暂时无法回答。';
    ty.remove();aiReply(reply,q);
  }catch(e){
    ty.remove();aiReply(local(q),q);
  }
}

function aiReply(text,userQ){
  add('ai',text);
  hist.push({role:'assistant',content:text});
  if(hist.length>20)hist=hist.slice(-20);
  // 追问：只显示2个，沿话题方向
  const fus=followups(userQ);
  if(fus.length>0){
    const f=document.createElement('div');
    f.className='fu';
    fus.forEach(fq=>{const b=document.createElement('button');b.textContent=fq;b.onclick=()=>ask(fq);f.appendChild(b);});
    chat.lastElementChild.appendChild(f);
  }
  // 操作图标
  const ops=document.createElement('div');
  ops.className='ops';
  ops.innerHTML='<span onclick="save(this)">💾</span><span onclick="copy(this)">📋</span>';
  chat.lastElementChild.appendChild(ops);
  chat.scrollTop=chat.scrollHeight;
}

function add(type,text){
  const d=document.createElement('div');
  d.className='msg m-'+type;
  if(type==='ai'){
    d.innerHTML='<div class="b">'+esc(text)+'</div>';
  }else{
    d.innerHTML='<div class="b">'+esc(text)+'</div>';
  }
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function followups(q){
  const t=(q||'').toLowerCase();
  let topic='default';
  if(/排盘|八字|命理|四柱|日主/.test(t))topic='排盘';
  else if(/运势|运气|今年/.test(t))topic='运势';
  else if(/风水|布局|方位/.test(t))topic='风水';
  else if(/中医|养生|失眠|头痛/.test(t))topic='中医';
  else if(/手机号|号码|1[3-9]\d{9}/.test(t))topic='手机号';
  else if(/婚姻|感情|桃花/.test(t))topic='感情';
  else if(/财运|投资|理财/.test(t))topic='财运';
  else if(/事业|工作|创业/.test(t))topic='事业';
  const map={
    '排盘':['五行强弱分析','大运走势如何'],
    '运势':['事业运详析','财运详析'],
    '风水':['卧室风水','财位在哪'],
    '中医':['失眠调理','脾胃怎么养'],
    '手机号':['换什么尾号好','号码五行分析'],
    '感情':['桃花星分析','正缘何时到'],
    '财运':['理财方向','破财怎么防'],
    '事业':['适合什么行业','创业时机'],
    'default':['排盘分析命理','今年运势如何']
  };
  const all=map[topic]||map.default;
  const asked=hist.filter(m=>m.role==='user').map(m=>m.content);
  return all.filter(f=>!asked.includes(f)).slice(0,2);
}

function save(el){
  const t=el.closest('.m-ai').querySelector('.b').textContent;
  const ts=new Date().toLocaleString('zh-CN');
  const blob=new Blob(['易道智鉴AI分析报告\n'+ts+'\n\n'+t],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='命理报告.txt';a.click();
  toast('已保存');
}
function copy(el){
  const t=el.closest('.m-ai').querySelector('.b').textContent;
  navigator.clipboard.writeText(t).then(()=>toast('已复制')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('已复制')});
}
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),1500)}

function voice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('请用Chrome或Safari');return}
  const b=mic;
  if(b.dataset.on==='1'){if(window._r)window._r.stop();return}
  b.dataset.on='1';b.classList.add('on');
  const r=new SR();window._r=r;r.lang='zh-CN';r.continuous=false;r.interimResults=true;
  let ft='';
  r.onresult=e=>{let im='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)ft+=e.results[i][0].transcript;else im+=e.results[i][0].transcript;}box.value=ft+im};
  r.onerror=()=>{b.dataset.on='0';b.classList.remove('on')};
  r.onend=()=>{b.dataset.on='0';b.classList.remove('on');if(ft.trim())send()};
  r.start();
}

function esc(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
    .replace(/━━━/g,'<b class="sec">━━━').replace(/━━━/g,'━━━</b>')
    .replace(/\n/g,'<br>');
}

// 本地降级
function local(text){
  if(!text)return'请告诉我您想了解什么。';
  const t=text.toLowerCase();
  var m=text.match(/1[3-9]\d{9}/);
  if(m)return mobile(m[0]);
  if(bazi&&bazi.pillars){
    const dm=bazi.day_master||'?',p=bazi.pillars,wc=bazi.wuxing_count||{};
    const lack=(bazi.wuxing_lack&&bazi.wuxing_lack.length)?bazi.wuxing_lack.join('、'):'无';
    const ele=dm.slice(-1);
    const desc={'金':'金主义，刚毅果断','木':'木主仁，直爽向上','水':'水主智，聪明灵活','火':'火主礼，热情外向','土':'土主信，稳重厚道'}[ele]||'';
    return'━━━ 命盘分析 ━━━\n\n【四柱】'+(p['年']||'?')+' '+(p['月']||'?')+' '+(p['日']||'?')+' '+(p['时']||'?')+'\n【日主】'+dm+'\n【五行】金'+(wc['金']||0)+' 木'+(wc['木']||0)+' 水'+(wc['水']||0)+' 火'+(wc['火']||0)+' 土'+(wc['土']||0)+'\n【缺行】'+lack+'\n\n【性格】'+desc+'\n\n需要进一步分析哪方面？可以问我五行补救、大运走势或年运建议。';
  }
  if(/八字|排盘|命理|算命/.test(t))return'请提供您的出生年月日时+性别，我为您排盘分析。\n\n例如：1985年3月22日8时 女\n\n排盘后可分析：日主五行、四柱关系、五行强弱、用神、大运、格局等。';
  if(/运势|今年|流年/.test(t))return'━━━ 运势分析 ━━━\n\n请提供生辰，我为您分析今年流年运势。\n\n包括：事业/财运/感情/健康/人际五个维度。';
  if(/风水|布局|方位/.test(t))return'━━━ 风水布局 ━━━\n\n【大门】宜吉位\n【客厅】财位在对角线45°\n【卧室】床头靠实墙\n【厨房】宜凶位压煞\n【化煞】路冲→八卦镜·横梁→葫芦\n\n请提供房屋朝向做个性化分析。';
  if(/中医|养生|健康/.test(t))return'━━━ 中医养生 ━━━\n\n【四季】春养肝·夏养心·秋养肺·冬养肾\n【日常】子时前睡·七分饱·适度运动\n\n请描述症状获取针对性方案。';
  if(/失眠/.test(t))return'━━━ 失眠调理 ━━━\n\n【食疗】酸枣仁粥·百合莲子汤\n【穴位】神门·三阴交·安眠穴\n【起居】子时前睡·泡脚·忌手机';
  if(/婚姻|感情|桃花/.test(t))return'━━━ 感情婚姻 ━━━\n\n【桃花】日支子午卯酉→异性缘佳\n【正缘】男看正财·女看正官\n【合婚】五行互补+日柱相生\n\n请提供生辰做深度分析。';
  if(/财运|投资|理财/.test(t))return'━━━ 财运分析 ━━━\n\n【财星】正财→工薪·偏财→投资\n【破财】比劫运→忌合伙\n【招财】喜金→西·喜木→东\n\n请提供生辰分析财运走势。';
  if(/事业|工作|创业/.test(t))return'━━━ 事业分析 ━━━\n\n【官运】正官→体制·七杀→创业\n【行业】金:金融·木:教育·水:物流·火:电子·土:房产\n\n请提供生辰分析事业方向。';
  if(/手机号|号码/.test(t))return'请直接发送11位手机号码，我立即分析八星磁场吉凶。';
  if(/五行|缺什么/.test(t))return'━━━ 五行分析 ━━━\n\n金→肺/西/白·木→肝/东/绿·水→肾/北/黑·火→心/南/红·土→脾/中/黄\n\n请提供生辰分析您的五行。';
  if(/你好|您好|hi|hello/.test(t))return'您好！我是AI命理助手。\n\n我可以帮您：\n📅 排盘 🌟 运势 🏠 风水\n💊 中医 📱 手机号 💕 感情\n💰 财运 💼 事业\n\n请告诉我您想了解什么。';
  if(/谢谢|感谢/.test(t))return'不客气！还有其他问题可以继续问我。';
  return'您可以问我：\n\n📅 排盘 🌟 运势 🏠 风水\n💊 中医 📱 手机号 💕 感情\n💰 财运 💼 事业\n\n或告诉我您的出生年月日时进行排盘。';
}

function mobile(m){
  const BX={'天医':['13','31','68','86','49','94','27','72'],'生气':['14','41','67','76','39','93','28','82'],'延年':['19','91','78','87','34','43','26','62'],'伏位':['11','22','88','99','66','77','33','44'],'六煞':['16','61','47','74','38','83','29','92'],'五鬼':['18','81','79','97','36','63','24','42'],'绝命':['12','21','69','96','48','84','37','73'],'祸害':['17','71','89','98','46','64','23','32']};
  const rk={'天医':'吉','生气':'吉','延年':'吉','伏位':'中','六煞':'中','五鬼':'凶','绝命':'凶','祸害':'凶'};
  function gx(c){for(var n in BX){if(BX[n].indexOf(c)>=0)return{n:n,r:rk[n]};}return{n:'普通',r:'中'};}
  var st=[],ji=0,xi=0;
  for(var i=0;i<10;i+=2){var c=m.substring(i,i+2),s=gx(c);st.push({c:c,s:s.n,r:s.r});if(s.r==='吉')ji++;else if(s.r==='凶')xi++;}
  var last=st[st.length-1];
  var sc=ji*8-xi*6+20+(last.r==='吉'?5:0);sc=Math.max(0,Math.min(40,sc));
  var lv=sc>=30?'优🟢':sc>=20?'中🟡':'差🔴';
  var r='━━━ 手机号分析 ━━━\n\n【号码】'+m+'\n【评分】'+sc+'/40 '+lv+'\n【吉】'+ji+'·凶'+xi+'\n\n━━━ 八星拆解 ━━━\n';
  st.forEach(s=>{r+=s.c+' '+(s.r==='吉'?'✅':s.r==='凶'?'❌':'➖')+' '+s.s+'（'+s.r+'）\n';});
  r+='\n尾号'+last.c+'→'+last.s+'（'+last.r+'）\n\n';
  if(lv.includes('优'))r+='号码吉利，可继续使用。';else if(lv.includes('中'))r+='吉凶参半，注意凶星领域。';else r+='凶星较多，建议更换。优选尾号13/31/68/86等。';
  r+='\n\n如需深度测评，请补充：行业/生辰/使用目的';
  return r;
}
</script>
