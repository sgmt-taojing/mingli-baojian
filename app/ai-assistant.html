<!DOCTYPE html>
<html lang="zh-CN">
<head>

<style>
:root{--ink:#080808;--ink2:#111;--ink3:#1a1a1a;--paper:#f0e8d8;--paper2:#d4c9b0;--paper3:#a09080;--gold:#c9a84c;--gold2:#e8cc7a;--gold3:#a08030;--border:rgba(201,168,76,.15);--jade:#27ae60;--cyan:#2980b9}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ink);color:var(--paper);font-family:'Noto Serif SC',serif;min-height:100vh}
.nav-bar{position:fixed;top:0;left:0;right:0;z-index:190;background:rgba(13,17,23,0.96);backdrop-filter:blur(8px);border-bottom:1px solid rgba(201,168,76,0.12);padding:7px 0;display:flex;justify-content:center;gap:4px;flex-wrap:wrap}
.nav-bar a{display:inline-block;padding:5px 12px;background:rgba(201,168,76,0.06);color:var(--gold);border:1px solid rgba(201,168,76,0.12);border-radius:14px;font-size:11px;text-decoration:none;letter-spacing:1px;transition:all .2s}
.nav-bar a:hover{background:rgba(201,168,76,0.15)}
.nav-bar a.active{background:rgba(201,168,76,0.2);border-color:var(--gold)}
@media(max-width:768px){.nav-bar{gap:2px}.nav-bar a{padding:4px 8px;font-size:10px}}
.container{max-width:800px;margin:0 auto;padding:60px 16px 20px}
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:24px;color:var(--gold);letter-spacing:4px;margin-bottom:6px}
.header p{font-size:12px;color:var(--paper3)}
/* 排盘输入区 */
.paipan-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.paipan-title{font-size:13px;color:var(--gold);margin-bottom:10px;letter-spacing:2px}
.paipan-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.paipan-row label{font-size:12px;color:var(--paper3);min-width:50px}
.paipan-row input,.paipan-row select{background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--paper);font-size:13px;font-family:inherit;outline:none}
.paipan-row input{width:70px}
.paipan-btn{padding:8px 20px;background:linear-gradient(135deg,var(--gold3),var(--gold));color:var(--ink);border:none;border-radius:8px;font-size:12px;cursor:pointer;letter-spacing:2px}
.paipan-btn:hover{opacity:.9}
.paipan-result{margin-top:10px;padding:10px;background:rgba(201,168,76,0.04);border-radius:8px;font-size:12px;display:none}
.paipan-result.show{display:block}
/* 引导提问 */
.guide-box{margin-bottom:12px}
.guide-btn{display:inline-block;padding:6px 14px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.15);border-radius:16px;color:var(--gold);font-size:12px;cursor:pointer;margin:4px 4px;transition:all .2s}
.guide-btn:hover{background:rgba(201,168,76,0.15)}
/* 聊天区 */
.chat-box{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:12px;padding:16px;min-height:300px;max-height:500px;overflow-y:auto;margin-bottom:12px}
.chat-msg{margin-bottom:12px;line-height:1.8;font-size:14px;white-space:pre-wrap;word-break:break-word}
.chat-user{color:var(--paper)}
.chat-user .bubble{background:rgba(201,168,76,0.08);border-radius:12px 12px 4px 12px;padding:10px 14px;margin-left:auto;max-width:85%;display:inline-block;float:right;clear:both}
.chat-ai{color:var(--paper2)}
.chat-ai .label{font-size:11px;color:var(--gold);margin-bottom:4px}
.chat-ai .bubble{background:rgba(255,255,255,0.03);border-radius:12px 12px 12px 4px;padding:10px 14px;max-width:85%;display:inline-block}
.chat-welcome{text-align:center;color:var(--paper3);padding:40px 0;font-size:14px}
.chat-welcome .emoji{font-size:32px;margin-bottom:10px}
.chat-welcome .hint{font-size:11px;margin-top:6px}
.typing{display:inline-block;width:8px;height:8px;background:var(--gold);border-radius:50%;margin:0 2px;animation:blink 1s infinite}
.typing:nth-child(2){animation-delay:.2s}
.typing:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
/* 输入区 */
.input-box{display:flex;gap:8px;align-items:center}
.input-box input{flex:1;background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:20px;padding:10px 16px;color:var(--paper);font-size:14px;font-family:inherit;outline:none}
.input-box input:focus{border-color:rgba(201,168,76,0.3)}
.input-box button{flex-shrink:0;width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--gold),var(--gold3));color:var(--ink);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.input-box button:hover{opacity:.9}
.footer{text-align:center;font-size:11px;color:var(--paper3);margin-top:12px;opacity:.5}
@media(max-width:768px){.container{padding:56px 12px 16px}.header h1{font-size:20px}.paipan-row input{width:60px}}
</style>
</head>

<div class="container">
<div class="header">
<h1>🤖 AI命理助手</h1>
<p>知识库问答 · 排盘解读 · 引导提问</p>
</div>

<!-- 排盘输入 -->
<div class="paipan-box">
<div class="paipan-title">🔮 生辰排盘（可选，填写后AI可深度分析）</div>
<div class="paipan-row">
<label>年</label><input type="number" id="ppYear" placeholder="1985" min="1900" max="2100">
<label>月</label><input type="number" id="ppMonth" placeholder="3" min="1" max="12">
<label>日</label><input type="number" id="ppDay" placeholder="22" min="1" max="31">
<label>时</label><input type="number" id="ppHour" placeholder="8" min="0" max="23">
<label>性别</label>
<select id="ppSex"><option value="male">男</option><option value="female">女</option></select>
<button class="paipan-btn" onclick="doPaipan()">排盘</button>
</div>
<div class="paipan-result" id="paipanResult"></div>
</div>

<!-- 引导提问 -->
<div class="guide-box" id="guideBox">
<span class="guide-btn" onclick="askGuide('您可以告诉我您的出生年月日时，我来为您排盘分析')">📅 提供生辰</span>
<span class="guide-btn" onclick="askGuide('我今年运势如何？')">🌟 今年运势</span>
<span class="guide-btn" onclick="askGuide('我的五行属什么？')">⚖️ 五行分析</span>
<span class="guide-btn" onclick="askGuide('家里风水怎么布置？')">🏠 风水布局</span>
<span class="guide-btn" onclick="askGuide('最近失眠怎么调理？')">💤 养生调理</span>
<span class="guide-btn" onclick="askGuide('倪海厦老师有什么中医建议？')">🪷 倪师中医</span>
<span class="guide-btn" onclick="askGuide('什么是奇门遁甲？')">🔮 奇门遁甲</span>
<span class="guide-btn" onclick="askGuide('大六壬是什么？')">📜 大六壬</span>
<span class="guide-btn" onclick="askGuide('我的体质怎么调理？')">🧬 体质调理</span>
</div>

<!-- 聊天区 -->
<div class="chat-box" id="chatBox">
<div class="chat-welcome">
<div class="emoji">🤖</div>
<div>您好！我是易道智鉴AI命理助手</div>
<div class="hint">可以问我命理、风水、中医、养生等问题<br>填写生辰后排盘可获得深度分析</div>
</div>
</div>

<!-- 输入区 -->
<div class="input-box">
<input type="text" id="chatInput" placeholder="输入问题..." onkeypress="if(event.key==='Enter')sendMsg()">
<button onclick="sendMsg()">➤</button>
</div>
<div style="text-align:center;margin-top:8px">
<button onclick="clearChat()" style="background:none;border:1px solid var(--border);border-radius:12px;padding:4px 12px;color:var(--paper3);font-size:11px;cursor:pointer">🗑 清空对话</button>
</div>
<div class="footer">AI解读仅供参考 · 请理性参考，凡事自辨自省</div>
</div>

<script>
const API_BASE = (location.hostname === '127.0.0.1' || location.hostname === 'localhost') ? 'http://127.0.0.1:8920' : '';
let chatHistory = [];
let baziData = null;

// 排盘
async function doPaipan() {
  const y = parseInt(document.getElementById('ppYear').value);
  const m = parseInt(document.getElementById('ppMonth').value);
  const d = parseInt(document.getElementById('ppDay').value);
  const h = parseInt(document.getElementById('ppHour').value);
  const sex = document.getElementById('ppSex').value;
  if (!y || !m || !d) { alert('请填写年月日'); return; }
  
  const result = document.getElementById('paipanResult');
  result.innerHTML = '排盘中...';
  result.classList.add('show');
  
  try {
    const paipanBase = (location.hostname === '127.0.0.1' || location.hostname === 'localhost') ? 'http://127.0.0.1:8911' : '';
    const resp = await fetch(paipanBase + '/paipan?year=' + y + '&month=' + m + '&day=' + d + '&hour=' + h + '&sex=' + sex);
    const data = await resp.json();
    if (data.error) { result.innerHTML = '排盘失败: ' + data.error; return; }
    
    baziData = data;
    const p = data.pillars || {};
    const dm = data.day_master || '?';
    const wc = data.wuxing_count || {};
    const lack = data.wuxing_lack ? data.wuxing_lack.join('、') : '无';
    
    const dy = data.dayun ? data.dayun.slice(0,3).map(function(d){return d.gz+'('+d.start_age+'岁起)'}).join(' ') : '';
    const shensha = data.shensha ? Object.keys(data.shensha).length + '个' : '0个';
    result.innerHTML = '日主：<b style="color:var(--gold)">' + dm + '</b> | 四柱：' + 
      (p['年']||'?') + ' ' + (p['月']||'?') + ' ' + (p['日']||'?') + ' ' + (p['时']||'?') + 
      ' | 五行：金' + (wc['金']||0) + ' 木' + (wc['木']||0) + ' 水' + (wc['水']||0) + ' 火' + (wc['火']||0) + ' 土' + (wc['土']||0) + 
      ' | 缺：' + lack +
      (dy ? ' | 大运：' + dy : '') +
      ' | 神煞：' + shensha;
    
    // 自动发送排盘数据给AI分析
    sendMsg('请根据我的排盘数据（日主' + dm + '，四柱' + (p['年']||'') + (p['月']||'') + (p['日']||'') + (p['时']||'') + '）分析我的命理特征');
  } catch(e) {
    result.innerHTML = '排盘服务暂不可用（需本地运行后端服务）。您可以直接提问，AI助手会根据您描述的生辰信息回答。';
    result.classList.add('show');
  }
}

// 引导提问
function askGuide(q) {
  document.getElementById('chatInput').value = q;
  sendMsg();
}

// 发送消息
async function sendMsg(prefilled) {
  const input = document.getElementById('chatInput');
  const q = (prefilled || input.value).trim();
  if (!q) return;
  input.value = '';
  
  const box = document.getElementById('chatBox');
  // 清空欢迎语
  if (chatHistory.length === 0) box.innerHTML = '';
  
  // 用户消息
  const userDiv = document.createElement('div');
  userDiv.className = 'chat-msg chat-user';
  userDiv.innerHTML = '<span class="bubble">' + escapeHtml(q) + '</span>';
  box.appendChild(userDiv);
  box.scrollTop = box.scrollHeight;
  
  // 打字指示
  const typingDiv = document.createElement('div');
  typingDiv.className = 'chat-msg chat-ai';
  typingDiv.id = 'typing';
  typingDiv.innerHTML = '<div class="label">🤖 AI命理助手</div><span class="bubble"><span class="typing"></span><span class="typing"></span><span class="typing"></span></span>';
  box.appendChild(typingDiv);
  box.scrollTop = box.scrollHeight;
  
  chatHistory.push({role: 'user', content: q});
  if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
  
  try {
    const resp = await fetch(API_BASE + '/api/ai/public-chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        messages: chatHistory.slice(-10),
        baziData: baziData
      })
    });
    const data = await resp.json();
    const reply = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '抱歉，暂时无法回答，请稍后再试。';
    
    typingDiv.remove();
    
    const aiDiv = document.createElement('div');
    aiDiv.className = 'chat-msg chat-ai';
    aiDiv.innerHTML = '<div class="label">🤖 AI命理助手' + (data._local ? ' <span style="font-size:10px;opacity:.5">(知识库模式)</span>' : '') + '</div><span class="bubble">' + escapeHtml(reply) + '</span>';
    box.appendChild(aiDiv);
    box.scrollTop = box.scrollHeight;
    
    chatHistory.push({role: 'assistant', content: reply});
  } catch(e) {
    typingDiv.remove();
    // GitHub Pages无后端时，用前端本地降级响应
    const reply = _localResponse(q, baziData);
    const aiDiv = document.createElement('div');
    aiDiv.className = 'chat-msg chat-ai';
    aiDiv.innerHTML = '<div class="label">🤖 AI命理助手 <span style="font-size:10px;opacity:.5">(知识库模式)</span></div><span class="bubble">' + escapeHtml(reply) + '</span>';
    box.appendChild(aiDiv);
    box.scrollTop = box.scrollHeight;
    chatHistory.push({role: 'assistant', content: reply});
  }
}

// 前端本地降级响应（GitHub Pages无后端时使用，与后端_aiLocalResponse对齐）
function _localResponse(text, bazi) {
  if (!text) return '您好，我是易道智鉴AI助手。请告诉我您的出生年月日时，我可以为您排盘分析。';
  const t = text.toLowerCase();
  
  if (bazi && bazi.pillars) {
    const dm = bazi.day_master || '未知';
    const p = bazi.pillars;
    const wc = bazi.wuxing_count || {};
    const lack = (bazi.wuxing_lack && bazi.wuxing_lack.length > 0) ? bazi.wuxing_lack.join('、') : '无（五行俱全）';
    const ele = dm.slice(-1);
    let desc = '';
    if (ele==='金') desc='金主义，性格刚毅果断，重情重义';
    else if (ele==='木') desc='木主仁，性格直爽向上，有进取心';
    else if (ele==='水') desc='水主智，性格聪明灵活，善于变通';
    else if (ele==='火') desc='火主礼，性格热情外向，有领导力';
    else if (ele==='土') desc='土主信，性格稳重厚道，重承诺';
    let fix = '';
    if (bazi.wuxing_lack && bazi.wuxing_lack.includes('火')) fix='宜补火：多穿红色、向南方位、食温性食物';
    else if (bazi.wuxing_lack && bazi.wuxing_lack.includes('木')) fix='宜补木：多接触绿色植物、向东方位、食酸性食物';
    else if (bazi.wuxing_lack && bazi.wuxing_lack.includes('金')) fix='宜补金：多穿白色、向西方位、食辛性食物';
    else if (bazi.wuxing_lack && bazi.wuxing_lack.includes('水')) fix='宜补水：多近水、向北方、食咸性食物';
    else if (bazi.wuxing_lack && bazi.wuxing_lack.includes('土')) fix='宜补土：多穿黄色、居中位、食甘性食物';
    else fix='五行平衡，注意整体调和';
    return '根据您的排盘数据：\n\n【四柱】'+(p['年']||'?')+' '+(p['月']||'?')+' '+(p['日']||'?')+' '+(p['时']||'?')+'\n【日主】'+dm+'\n【五行】金'+(wc['金']||0)+' 木'+(wc['木']||0)+' 水'+(wc['水']||0)+' 火'+(wc['火']||0)+' 土'+(wc['土']||0)+'\n【缺行】'+lack+'\n\n【性格特征】'+desc+'\n【五行建议】'+fix+'\n\n（深度AI解读需连接后端服务，当前为离线模式。）';
  }
  
  if (/八字|排盘|命理|算命|算卦|占卜/.test(t)) return '我可以为您做八字排盘分析。请提供出生年月日时和性别。\n\n例如：1985年3月22日8时 女\n\n排盘后可分析：日主五行、四柱关系、五行强弱、用神取向、大运走势等。';
  if (/运势|运气|今年|流年|财运|事业|婚姻|感情/.test(t)) return '运势分析需要您的生辰八字。请提供出生年月日时，我为您排盘后分析今年流年运势。\n\n流年分析包括：事业运、财运、感情运、健康运等方面。';
  if (/五行|缺什么|属什么/.test(t)) return '五行分析需要您的生辰信息。请提供出生年月日时，我可以排盘后告诉您：\n1. 日主五行属性\n2. 五行强弱分布\n3. 缺什么五行\n4. 补救建议（方位/颜色/饮食/行业）';
  if (/风水|布局|方位|房子|家居/.test(t)) return '风水布局建议：\n\n1.【大门】纳气之口，宜在吉位\n2.【卧室】安神休养，床头宜靠实墙\n3.【厨房】火气之源，宜在凶位压煞\n4.【卫生间】排污之所，忌正对大门\n5.【客厅】明堂聚气，宜宽敞明亮\n\n如需个性化分析，请提供房屋朝向。';
  if (/中医|养生|健康/.test(t)) return '中医养生建议：\n\n1.【起居】子时前入睡，养肝胆\n2.【饮食】七分饱，少生冷\n3.【运动】适度运动，气血流通\n4.【情志】少怒少虑，心态平和\n5.【四季】春养肝、夏养心、秋养肺、冬养肾\n\n如需针对性建议，请描述症状。';
  if (/失眠|睡不着|睡眠/.test(t)) return '失眠调理方案：\n\n【辨证】多属心脾两虚或肝郁化火\n【食疗】酸枣仁粥、百合莲子汤\n【穴位】神门、三阴交、安眠穴\n【起居】子时前入睡，睡前忌手机\n\n持续失眠建议就诊。';
  if (/头痛|头晕/.test(t)) return '头痛调理建议：\n\n【分型】\n- 胀痛→肝阳上亢\n- 隐痛→气血不足\n- 刺痛→瘀血阻络\n- 重痛→痰湿内阻\n\n【穴位】太阳穴、风池、合谷\n\n持续头痛请就医。';
  if (/倪海厦|倪师/.test(t)) return '倪海厦老师知识库涵盖46个模块：\n\n【经方】伤寒论、金匮要略\n【针灸】针灸大成\n【本草】神农本草经\n【经典】黄帝内经\n【命理】天纪、人纪\n\n请在「倪师知识库」页面浏览。';
  if (/舒晗/.test(t)) return '舒晗老师知识库包含：命理秘笈、实战心法、进阶课程等。请在「舒晗知识库」页面浏览。';

function escapeHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
    .replace(/\n/g,'<br>');
}
