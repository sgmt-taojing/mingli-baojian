<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><title>智能眼镜 · 历史回溯</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--line:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#06b6d4}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:20px}
h1{font-size:22px;margin-bottom:16px}
.list{display:flex;flex-direction:column;gap:10px}
.row{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;display:flex;justify-content:space-between;align-items:center}
.meta{font-size:12px;color:var(--muted)}
</style></head><body>
<h1>📜 历史会话</h1>
<div id="list" class="list"></div>
<script>
async function load(){
  const r = await fetch('/api/v1/glass/history?token=' + (localStorage.token||''), {credentials:'include'}).then(r=>r.json());
  const items = (r.data||{}).list||[];
  document.getElementById('list').innerHTML = items.map(it=>`
    <div class="row">
      <div><div style="font-weight:600">${it.title}</div><div class="meta">${new Date(it.ts).toLocaleString('zh-CN')}</div></div>
      <span class="meta">${it.status}</span>
    </div>`).join('') || '<div class="meta">无历史</div>';
}
load();
</script></body></html>
