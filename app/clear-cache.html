<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>缓存清理工具 - 易道智鉴</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, var(--ink) 0%, var(--ink3) 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--paper);
}
.container {
  max-width: 600px;
  width: 90%;
  background: rgba(20, 20, 20, 0.95);
  border: 1px solid rgba(201, 168, 76, 0.2);
  border-radius: 16px;
  padding: 40px;
  text-align: center;
}
h1 {
  font-family: 'Ma Shan Zheng', serif;
  font-size: 32px;
  color: var(--gold);
  margin-bottom: 10px;
  letter-spacing: 4px;
}
.subtitle {
  font-size: 14px;
  opacity: 0.6;
  margin-bottom: 30px;
}
.btn {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold) 100%);
  border: none;
  color: var(--ink);
  padding: 16px 40px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  margin: 10px;
  transition: all 0.3s;
  letter-spacing: 2px;
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(201, 168, 76, 0.3);
}
.btn:active {
  transform: translateY(0);
}
.btn-secondary {
  background: transparent;
  border: 1px solid rgba(201, 168, 76, 0.3);
  color: var(--gold);
}
.btn-secondary:hover {
  background: rgba(201, 168, 76, 0.1);
}
.status {
  margin-top: 30px;
  padding: 20px;
  background: rgba(0, 0, 0, 0.3);
  border-radius: 8px;
  text-align: left;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  max-height: 300px;
  overflow-y: auto;
  display: none;
}
.status.show { display: block; }
.status-item {
  padding: 8px 0;
  border-bottom: 1px solid rgba(201, 168, 76, 0.1);
  display: flex;
  justify-content: space-between;
}
.status-item:last-child { border-bottom: none; }
.status-item.success { color: var(--success); }
.status-item.error { color: var(--cinn2); }
.status-item.info { color: var(--cyan2); }
.progress {
  width: 100%;
  height: 4px;
  background: rgba(201, 168, 76, 0.2);
  border-radius: 2px;
  margin: 20px 0;
  overflow: hidden;
  display: none;
}
.progress.show { display: block; }
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  width: 0%;
  transition: width 0.3s;
}
.note {
  font-size: 12px;
  opacity: 0.5;
  margin-top: 30px;
  line-height: 1.6;
}
</style>
</head>
<body>
<div style="position:fixed;top:12px;right:12px;z-index:99998">
  <a href="tcm-clinic.html" style="display:inline-block;padding:6px 16px;background:rgba(201,168,76,0.12);color:var(--gold,#c9a84c);border:1px solid rgba(201,168,76,0.25);border-radius:16px;font-size:12px;text-decoration:none;font-family:'Noto Serif SC',serif;letter-spacing:1px">🏥 中医诊疗</a>
</div>

<div class="container">
  <h1>🧹 缓存清理工具</h1>
  <p class="subtitle">解决页面加载异常、功能不生效等问题</p>

  <div class="progress" id="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div>
    <button class="btn" onclick="clearAllCache()">🗑️ 清理全部缓存</button>
    <button class="btn btn-secondary" onclick="clearServiceWorker()">🔄 重置 Service Worker</button>
  </div>

  <div>
    <button class="btn btn-secondary" onclick="clearLocalStorage()">💾 清理 LocalStorage</button>
    <button class="btn btn-secondary" onclick="clearSessionStorage()">📝 清理 SessionStorage</button>
  </div>

  <div>
    <button class="btn btn-secondary" onclick="forceReload()">🔄 强制刷新主页面</button>
  </div>

  <div class="status" id="status"></div>

  <div class="note">
    <p>💡 提示：</p>
    <p>• 清理后请刷新页面（Ctrl+F5 或 Cmd+Shift+R）</p>
    <p>• 如果问题仍存在，请尝试清理浏览器缓存</p>
    <p>• Safari: 开发 → 清空缓存</p>
    <p>• Chrome: 设置 → 隐私 → 清除浏览数据</p>
  </div>
</div>

<script>
const statusDiv = document.getElementById('status');
const progressBar = document.getElementById('progressBar');
const progressDiv = document.getElementById('progress');

function addStatus(text, type = 'info') {
  const item = document.createElement('div');
  item.className = `status-item ${type}`;
  item.innerHTML = `<span>${text}</span><span>${new Date().toLocaleTimeString()}</span>`;
  statusDiv.appendChild(item);
  statusDiv.classList.add('show');
  statusDiv.scrollTop = statusDiv.scrollHeight;
}

function setProgress(percent) {
  progressDiv.classList.add('show');
  progressBar.style.width = percent + '%';
}

async function clearAllCache() {
  statusDiv.innerHTML = '';
  statusDiv.classList.remove('show');
  setProgress(0);

  addStatus('开始清理缓存...', 'info');
  setProgress(10);

  // 1. 清理 localStorage
  try {
    const lsCount = localStorage.length;
    localStorage.clear();
    addStatus(`LocalStorage 已清理 (${lsCount} 项)`, 'success');
  } catch (e) {
    addStatus('LocalStorage 清理失败: ' + e.message, 'error');
  }
  setProgress(25);

  // 2. 清理 sessionStorage
  try {
    const ssCount = sessionStorage.length;
    sessionStorage.clear();
    addStatus(`SessionStorage 已清理 (${ssCount} 项)`, 'success');
  } catch (e) {
    addStatus('SessionStorage 清理失败: ' + e.message, 'error');
  }
  setProgress(40);

  // 3. 清理 Service Worker
  if ('serviceWorker' in navigator) {
    try {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const reg of regs) {
        await reg.unregister();
        addStatus(`Service Worker 已注销: ${reg.scope}`, 'success');
      }
      if (regs.length === 0) {
        addStatus('没有注册的 Service Worker', 'info');
      }
    } catch (e) {
      addStatus('Service Worker 清理失败: ' + e.message, 'error');
    }
  } else {
    addStatus('浏览器不支持 Service Worker', 'info');
  }
  setProgress(60);

  // 4. 清理 Cache API
  if ('caches' in window) {
    try {
      const cacheNames = await caches.keys();
      for (const name of cacheNames) {
        await caches.delete(name);
        addStatus(`Cache 已删除: ${name}`, 'success');
      }
      if (cacheNames.length === 0) {
        addStatus('没有 Cache Storage', 'info');
      }
    } catch (e) {
      addStatus('Cache API 清理失败: ' + e.message, 'error');
    }
  }
  setProgress(80);

  // 5. 清理 Cookies
  try {
    const cookies = document.cookie.split(';');
    cookies.forEach(cookie => {
      const name = cookie.split('=')[0].trim();
      document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
    });
    addStatus(`Cookies 已清理 (${cookies.length} 项)`, 'success');
  } catch (e) {
    addStatus('Cookies 清理失败: ' + e.message, 'error');
  }
  setProgress(100);

  addStatus('✅ 缓存清理完成！', 'success');
  addStatus('请刷新主页面或点击下方按钮', 'info');
}

async function clearServiceWorker() {
  statusDiv.innerHTML = '';
  statusDiv.classList.remove('show');
  setProgress(0);

  if ('serviceWorker' in navigator) {
    try {
      addStatus('注销 Service Worker...', 'info');
      const regs = await navigator.serviceWorker.getRegistrations();
      setProgress(50);

      for (const reg of regs) {
        await reg.unregister();
        addStatus(`已注销: ${reg.scope}`, 'success');
      }

      setProgress(100);
      addStatus('✅ Service Worker 已重置', 'success');
    } catch (e) {
      addStatus('错误: ' + e.message, 'error');
    }
  } else {
    addStatus('浏览器不支持 Service Worker', 'error');
  }
}

function clearLocalStorage() {
  statusDiv.innerHTML = '';
  statusDiv.classList.remove('show');

  try {
    const count = localStorage.length;
    localStorage.clear();
    addStatus(`✅ LocalStorage 已清理 (${count} 项)`, 'success');
  } catch (e) {
    addStatus('❌ 清理失败: ' + e.message, 'error');
  }
}

function clearSessionStorage() {
  statusDiv.innerHTML = '';
  statusDiv.classList.remove('show');

  try {
    const count = sessionStorage.length;
    sessionStorage.clear();
    addStatus(`✅ SessionStorage 已清理 (${count} 项)`, 'success');
  } catch (e) {
    addStatus('❌ 清理失败: ' + e.message, 'error');
  }
}

function forceReload() {
  addStatus('正在跳转到主页面...', 'info');
  setTimeout(() => {
    window.location.href = 'divination-hub.html?t=' + Date.now();
  }, 500);
}

// 页面加载时检测
window.addEventListener('load', () => {
  addStatus('工具已就绪', 'info');
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      addStatus(`检测到 ${regs.length} 个 Service Worker`, 'info');
    });
  }
  if ('caches' in window) {
    caches.keys().then(names => {
      addStatus(`检测到 ${names.length} 个 Cache`, 'info');
    });
  }
});
</script>

</body>
</html>
