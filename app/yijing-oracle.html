<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>易经·人盘事盘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Ma+Shan+Zheng&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0a0a;
    --ink-deep: #111010;
    --ink-mid: #1e1c1a;
    --paper: #f0e8d8;
    --paper-dark: #d4c9b0;
    --cinnabar: #c0392b;
    --cinnabar-light: #e74c3c;
    --gold: #c9a84c;
    --gold-light: #e8cc7a;
    --jade: #4a7c59;
    --jade-light: #6ba873;
    --cloud: rgba(240,232,216,0.06);
    --cloud2: rgba(240,232,216,0.03);
    --shadow: rgba(0,0,0,0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'EB Garamond', 'Noto Serif SC', serif;
    background: var(--ink);
    color: var(--paper);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ink texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.04) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
  }

  /* ===== NAVIGATION ===== */
  .top-nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 18px 40px;
    background: linear-gradient(to bottom, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0) 100%);
    backdrop-filter: blur(4px);
  }

  .nav-brand {
    font-family: 'Ma Shan Zheng', serif;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 8px;
    text-shadow: 0 0 30px rgba(201,168,76,0.3);
  }

  /* ===== HERO SECTION ===== */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 120px 40px 80px;
    text-align: center;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.04;
    pointer-events: none;
  }

  .hero-bg svg {
    width: 600px;
    height: 600px;
  }

  .hero-eyebrow {
    font-family: 'EB Garamond', serif;
    font-size: 12px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 24px;
    animation: fadeUp 1s ease both;
  }

  .hero-title {
    font-family: 'Ma Shan Zheng', serif;
    font-size: clamp(56px, 10vw, 96px);
    color: var(--paper);
    letter-spacing: 16px;
    line-height: 1.1;
    margin-bottom: 20px;
    text-shadow: 0 0 80px rgba(240,232,216,0.1);
    animation: fadeUp 1s 0.15s ease both;
  }

  .hero-subtitle {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--paper-dark);
    letter-spacing: 4px;
    margin-bottom: 60px;
    line-height: 2;
    animation: fadeUp 1s 0.3s ease both;
  }

  .hero-divider {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    margin: 0 auto 60px;
    animation: fadeUp 1s 0.4s ease both;
  }

  .mode-selection {
    display: flex;
    gap: 24px;
    animation: fadeUp 1s 0.5s ease both;
  }

  .mode-btn {
    position: relative;
    padding: 28px 48px;
    border: 1px solid rgba(201,168,76,0.2);
    background: rgba(201,168,76,0.03);
    color: var(--paper);
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    letter-spacing: 6px;
    cursor: pointer;
    transition: all 0.4s ease;
    overflow: hidden;
  }

  .mode-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.1) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .mode-btn:hover {
    border-color: rgba(201,168,76,0.6);
    color: var(--gold-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 40px rgba(201,168,76,0.15);
  }

  .mode-btn:hover::before { opacity: 1; }

  .mode-btn .mode-label {
    display: block;
    font-size: 20px;
    font-family: 'Ma Shan Zheng', serif;
    letter-spacing: 8px;
    margin-bottom: 6px;
  }

  .mode-btn .mode-desc {
    display: block;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 2px;
    opacity: 0.6;
    font-family: 'EB Garamond', serif;
  }

  /* ===== MAIN READING AREA ===== */
  .reading-area {
    display: none;
    min-height: 100vh;
    padding: 100px 40px 80px;
    max-width: 900px;
    margin: 0 auto;
  }

  .reading-area.active { display: block; }

  /* ===== NAME INPUT ===== */
  .name-section {
    text-align: center;
    margin-bottom: 60px;
  }

  .name-section h2 {
    font-family: 'Ma Shan Zheng', serif;
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 6px;
    margin-bottom: 30px;
  }

  .name-input-group {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .name-input {
    background: rgba(240,232,216,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--paper);
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    padding: 14px 28px;
    letter-spacing: 4px;
    outline: none;
    transition: all 0.3s ease;
    min-width: 200px;
    text-align: center;
  }

  .name-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.15);
  }

  .name-input::placeholder { opacity: 0.3; }

  .birth-input {
    background: rgba(240,232,216,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--paper);
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    padding: 14px 28px;
    letter-spacing: 2px;
    outline: none;
    transition: all 0.3s ease;
    min-width: 200px;
    text-align: center;
    color-scheme: dark;
  }

  .birth-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.15);
  }

  /* ===== COIN DIVINATION ===== */
  .divination-section {
    text-align: center;
    margin-bottom: 60px;
    padding: 60px 40px;
    border: 1px solid rgba(201,168,76,0.1);
    background: var(--cloud);
    position: relative;
  }

  .divination-section h3 {
    font-family: 'Ma Shan Shan', serif;
    font-size: 22px;
    color: var(--paper-dark);
    letter-spacing: 6px;
    margin-bottom: 12px;
  }

  .divination-section p {
    font-size: 13px;
    color: var(--paper-dark);
    opacity: 0.5;
    letter-spacing: 2px;
    margin-bottom: 40px;
    font-weight: 300;
  }

  .coins-display {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 30px;
  }

  .coin {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-family: 'EB Garamond', serif;
    color: var(--gold);
    background: radial-gradient(circle at 30% 30%, rgba(201,168,76,0.1), transparent);
    box-shadow:
      0 4px 20px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(201,168,76,0.2);
    transition: all 0.5s ease;
    opacity: 0;
    transform: translateY(-20px) rotateY(180deg);
  }

  .coin.tossing {
    animation: coinToss 0.8s ease-out forwards;
  }

  .coin.revealed { opacity: 1; transform: none; }

  @keyframes coinToss {
    0% { opacity: 0; transform: translateY(-40px) rotateY(720deg) scale(0.5); }
    60% { opacity: 1; transform: translateY(5px) rotateY(360deg) scale(1.1); }
    80% { transform: translateY(-3px) rotateY(180deg) scale(1); }
    100% { opacity: 1; transform: translateY(0) rotateY(0) scale(1); }
  }

  .line-progress {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 40px;
  }

  .line-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.3);
    background: transparent;
    transition: all 0.3s ease;
  }

  .line-dot.done {
    background: var(--gold);
    border-color: var(--gold);
    box-shadow: 0 0 8px rgba(201,168,76,0.4);
  }

  .line-dot.current {
    border-color: var(--gold);
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(201,168,76,0); }
  }

  .divine-btn {
    padding: 16px 60px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    letter-spacing: 6px;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .divine-btn:hover:not(:disabled) {
    background: var(--gold);
    color: var(--ink);
    box-shadow: 0 0 40px rgba(201,168,76,0.3);
  }

  .divine-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .toss-count {
    margin-top: 16px;
    font-size: 12px;
    color: var(--paper-dark);
    opacity: 0.4;
    letter-spacing: 2px;
  }

  /* ===== RESULT ===== */
  .result-section {
    display: none;
    animation: fadeUp 0.8s ease both;
  }

  .result-section.visible { display: block; }

  .result-header {
    text-align: center;
    margin-bottom: 60px;
    padding-bottom: 40px;
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .result-meta {
    font-size: 12px;
    letter-spacing: 6px;
    color: var(--gold);
    opacity: 0.6;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  .hexagram-title {
    font-family: 'Ma Shan Zheng', serif;
    font-size: clamp(36px, 6vw, 56px);
    color: var(--paper);
    letter-spacing: 8px;
    margin-bottom: 8px;
  }

  .hexagram-pinyin {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 4px;
    margin-bottom: 12px;
  }

  .hexagram-symbol {
    font-size: 48px;
    color: var(--gold-light);
    margin-bottom: 20px;
    opacity: 0.8;
  }

  /* Hexagram Display */
  .hexagram-display-row {
    display: flex;
    gap: 40px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 60px;
  }

  .hexagram-card {
    text-align: center;
    padding: 40px;
    border: 1px solid rgba(201,168,76,0.12);
    background: rgba(240,232,216,0.02);
    min-width: 220px;
    flex: 1;
  }

  .hexagram-card.changed {
    border-color: rgba(74,124,89,0.3);
    background: rgba(74,124,89,0.03);
  }

  .hexagram-card-label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--paper-dark);
    opacity: 0.5;
    margin-bottom: 20px;
  }

  .hexagram-card.changed .hexagram-card-label {
    color: var(--jade-light);
  }

  /* SVG Hexagram */
  .hexagram-svg {
    width: 100px;
    height: 200px;
    margin: 0 auto 20px;
  }

  .hexagram-lines-text {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin: 0 auto 20px;
    width: 80px;
  }

  .gua-line {
    width: 80px;
    height: 10px;
    position: relative;
  }

  .gua-line.yang::before {
    content: '';
    position: absolute;
    left: 0; right: 0; top: 4px;
    height: 3px;
    background: var(--gold);
    border-radius: 1px;
  }

  .gua-line.yin::before {
    content: '';
    position: absolute;
    left: 0; right: 50%;
    top: 4px;
    height: 3px;
    background: var(--gold);
    border-radius: 1px;
  }

  .gua-line.yin::after {
    content: '';
    position: absolute;
    left: 50%; right: 0;
    top: 4px;
    height: 3px;
    background: var(--gold);
    border-radius: 1px;
  }

  .gua-line.old::before { background: var(--cinnabar); }
  .gua-line.old::after { background: var(--cinnabar); }

  .hexagram-card-name {
    font-family: 'Ma Shan Zheng', serif;
    font-size: 28px;
    color: var(--paper);
    letter-spacing: 6px;
    margin-bottom: 4px;
  }

  .hexagram-card-pinyin {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .hexagram-card-meaning {
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    color: var(--paper-dark);
    opacity: 0.7;
    letter-spacing: 2px;
    line-height: 1.8;
    font-weight: 300;
  }

  .arrow-between {
    display: flex;
    align-items: center;
    font-size: 24px;
    color: var(--jade);
    padding-top: 100px;
    opacity: 0.6;
  }

  /* ===== INTERPRETATION ===== */
  .interpretation {
    margin-top: 60px;
  }

  .interpretation h4 {
    font-family: 'Ma Shan Zheng', serif;
    font-size: 24px;
    color: var(--gold);
    letter-spacing: 6px;
    text-align: center;
    margin-bottom: 40px;
  }

  .interp-block {
    margin-bottom: 40px;
    padding: 36px 40px;
    border-left: 2px solid rgba(201,168,76,0.2);
    background: rgba(240,232,216,0.02);
  }

  .interp-block h5 {
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 16px;
  }

  .interp-block p {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    color: var(--paper-dark);
    line-height: 2;
    font-weight: 300;
    letter-spacing: 1px;
  }

  .interp-block.warning p { color: var(--cinnabar-light); }

  /* Trigrams */
  .trigrams-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin: 40px 0;
  }

  .trigram-card {
    padding: 24px;
    border: 1px solid rgba(201,168,76,0.1);
    text-align: center;
    background: rgba(240,232,216,0.02);
  }

  .trigram-name {
    font-family: 'Ma Shan Zheng', serif;
    font-size: 24px;
    color: var(--paper);
    letter-spacing: 4px;
    margin-bottom: 4px;
  }

  .trigram-attr {
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 2px;
    opacity: 0.7;
    margin-bottom: 12px;
  }

  .trigram-lines {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    margin-bottom: 12px;
  }

  .trigram-sym-line {
    width: 40px;
    height: 5px;
  }

  .trigram-sym-line.yang::before {
    content: '';
    display: block;
    width: 40px;
    height: 5px;
    background: var(--gold);
    border-radius: 1px;
  }

  .trigram-sym-line.yin::before {
    content: '';
    display: block;
    width: 40px;
    height: 5px;
    background: var(--gold);
    border-radius: 1px;
  }

  .trigram-sym-line.yin::after {
    content: '';
    display: block;
    width: 40px;
    height: 5px;
    background: var(--gold);
    border-radius: 1px;
    margin-top: -5px;
  }

  .trigram-meaning {
    font-family: 'Noto Serif SC', serif;
    font-size: 12px;
    color: var(--paper-dark);
    opacity: 0.6;
    line-height: 1.8;
    font-weight: 300;
  }

  /* Moving Lines Detail */
  .moving-lines {
    margin: 40px 0;
    padding: 30px;
    border: 1px solid rgba(192,57,43,0.2);
    background: rgba(192,57,43,0.03);
  }

  .moving-lines h5 {
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--cinnabar-light);
    opacity: 0.8;
    margin-bottom: 20px;
  }

  .moving-line-item {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    color: var(--paper-dark);
    font-weight: 300;
  }

  .moving-line-pos {
    font-size: 11px;
    color: var(--cinnabar-light);
    letter-spacing: 2px;
    min-width: 60px;
  }

  .no-moving {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    color: var(--paper-dark);
    opacity: 0.5;
    font-weight: 300;
    letter-spacing: 2px;
  }

  /* Timeline */
  .timeline {
    margin: 40px 0;
    padding: 30px;
    border: 1px solid rgba(201,168,76,0.1);
  }

  .timeline h5 {
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 24px;
  }

  .timeline-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }

  .timeline-segment {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: rgba(201,168,76,0.2);
  }

  .timeline-segment.active { background: var(--gold); }
  .timeline-segment.future { background: rgba(201,168,76,0.5); }

  .timeline-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--paper-dark);
    opacity: 0.5;
    letter-spacing: 2px;
  }

  .timeline-desc {
    margin-top: 16px;
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    color: var(--paper-dark);
    line-height: 1.9;
    font-weight: 300;
  }

  /* Action Buttons */
  .result-actions {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 60px;
    flex-wrap: wrap;
  }

  .action-btn {
    padding: 14px 36px;
    border: 1px solid rgba(201,168,76,0.3);
    background: transparent;
    color: var(--paper-dark);
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .action-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.1);
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .stagger-1 { animation: fadeUp 0.8s 0.1s ease both; }
  .stagger-2 { animation: fadeUp 0.8s 0.2s ease both; }
  .stagger-3 { animation: fadeUp 0.8s 0.3s ease both; }
  .stagger-4 { animation: fadeUp 0.8s 0.4s ease both; }
  .stagger-5 { animation: fadeUp 0.8s 0.5s ease both; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 640px) {
    .mode-selection { flex-direction: column; }
    .mode-btn { padding: 22px 32px; }
    .hexagram-display-row { flex-direction: column; align-items: center; }
    .arrow-between { padding-top: 0; transform: rotate(90deg); }
    .trigrams-grid { grid-template-columns: 1fr; }
    .top-nav { padding: 14px 20px; }
    .hero { padding: 100px 20px 60px; }
    .reading-area { padding: 80px 20px 60px; }
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--ink); }
  ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(201,168,76,0.4); }

  /* Person mode color accent */
  .mode-person .hexagram-card-label { color: var(--cinnabar-light); }

  /* Loading shimmer */
  .loading-shimmer {
    background: linear-gradient(90deg, var(--ink) 25%, rgba(240,232,216,0.05) 50%, var(--ink) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }

const INTERPRETATIONS = {
  1:  { overview:'乾为天，乃纯阳之卦，六爻皆阳，象征天道刚健，自强不息。此卦揭示宇宙万物创生之本源，乾元之气充盈六合。', person:'你命格中乾元之气旺盛，天赋异禀，志向高远。自尊心强，不甘人后，有领袖气质与开拓精神。然过刚易折，当以柔济刚，谦逊待人，方能成大器。', matter:'此事呈纯阳向上之象，正值进取之时。当把握时机，大胆开拓，顺势而为。然阴阳相生，过度刚强反生阻碍，宜刚柔并济，循序渐进。', timing:'时机极利，宜速行动。三至五年内将见显著成效，长远来看更有大展宏图之机。', direction:'宜向西北、正南方向发展，西方亦有贵人相助。忌东北方向。', advice:'天行健，君子以自强不息。但切记：亢龙有悔，满则招损。保持谦逊，知进退存亡之理，方能持盈保泰。' },

  2:  { overview:'坤为地，乃纯阴之卦，六爻皆阴，象征地道柔顺，厚德载物。此卦为母性之德，包容涵养，生养万物而不争。', person:'你命格中坤德深厚，性格温厚仁慈，善于承载与包容。心地善良，人缘极佳，有默默奉献之美德。然过柔易弱，当内刚外柔，培养决断之力，方能在关键时刻挺身而出。', matter:'此事需以柔克刚，顺势而为，不可强求。地基稳固方能建高楼，当稳扎稳打，不宜急于求成。包容与耐心是此事成功的关键。', timing:'此卦主慢功出细活，大器晚成。一至三年内打好基础，三至五年后方见大成。耐心等待，时机自至。', direction:'宜向西南、西北方向发展，忌正东方向。东北方虽有小阻，亦可转化为机遇。', advice:'地势坤，君子以厚德载物。保持仁厚之心，但也要培养内在的力量与主见。柔能克刚，也能生刚，关键在于中庸之道。' },

  3:  { overview:'水雷屯，象征万物初生之艰难。如同种子刚刚入土，萌芽将出未出，困难与机遇并存。此卦告诫：初创之际，宜守正待机，不可妄动。', person:'你人生初期多历磨练，根基扎实。早年或有小波折，但正是这些经历锻造了你的意志与能力。三十岁后运势渐入佳境，晚年必有成就。切记：艰难困苦，玉汝于成。', matter:'此事初起，基础尚浅，时机未完全成熟。宜稳扎稳打，多做准备，不宜贸然大规模行动。眼前的小困难是未来大成功的铺垫。', timing:'黎明前的黑暗最是难熬，但曙光将至。一至两年内会有重大转机，耐心等待。', direction:'宜向东南、正南方向，忌正北（坎宫之困）。', advice:'君子以经纶，在艰难时要能沉得住气，充实自身，等待时机。屯卦之道，在于「习坎」，在困境中学习成长。' },

  4:  { overview:'山水蒙，启蒙发智之卦。象征童蒙之心，纯洁无知，需有师长教导，方能开悟。此卦启示：教育、学习、启蒙之重要性。', person:'你具有蒙卦之心性，聪慧而有求知欲，但有时需借他人之力方可看清方向。善于学习是他的长处，但也需警惕：过于依赖他人意见，而忽视自身判断。', matter:'此事如同蒙昧初开，方向尚未明确。当先明理，再行决策。建议先做充分调研和准备，谋定而后动，切忌盲目冲动。', timing:'学习与准备阶段，不可急躁。两至三年后方可大展身手。', direction:'宜向东南、正东方向发展，学堂、文教之地有利。', advice:'匪我求童蒙，童蒙求我。当主动求学，虚心受教，但最终决策仍需依靠自己的智慧。启蒙之道，在于内省与自悟。' },

  6:  { overview:'天水讼，象征争讼与冲突。此卦提醒：人际之间难免有分歧，当以和为贵，慎争讼，和气生财。', person:'你命中有讼卦之象，个性中有争强好胜的一面。凡事喜争个明白，但要注意：讼则终凶。学会以退为进，以和化争，方能广结善缘。', matter:'此事有争竞之象，宜谨慎处理与各方的关系。能和解则和解，能协调则协调。诉讼非上策，协商才是正道。', timing:'争讼之象多在近期发生，化解之道在于主动沟通。三至六个月内是化解的关键期。', direction:'宜向东南、正南方向，忌正北（加重冲突）。', advice:'君子以作事谋始。在事情开始之前，就要做好协调与预防，避免争讼的发生。讼卦之道，在于「有孚」，诚实与信用是化解争端的根本。' },

  8:  { overview:'水地比，亲密比附之卦。象征众心归一，水润大地，万物相亲。此卦启示：亲附之道，在于以诚相待。', person:'你人缘极佳，有很强的亲和力，身边容易聚集一批志同道合之人。但要注意：亲附亦有原则，不可无原则地讨好他人。', matter:'此事当以「比」道处之，与合作方坦诚相待，建立互信基础。人心齐，泰山移；团结则万事兴。', timing:'人际关系近期有重大改善，抓住机会广结善缘。三至六个月为关系建立的关键期。', direction:'宜向西南、正北方向发展，忌正东方向。', advice:'比之自内，贞吉。在团队中发挥凝聚作用，以身作则，自然众望所归。亲附之道，在于真诚与信任。' },

// Map gua array to hexagram number
function guaToNumber(gua) {
  // gua[0]=upper (3 bits), gua[1]=lower (3 bits)
  // binary: upper << 3 | lower
  let upper = 0, lower = 0;
  for (let i = 0; i < 3; i++) upper = (upper << 1) | gua[0][i];
  for (let i = 0; i < 3; i++) lower = (lower << 1) | gua[1][i];
  return upper * 8 + lower + 1;
}

function getHexagramByNumber(num) {
  return HEXAGRAMS[num - 1];
}

function guaArrayToLines(gua) {
  // Returns array of 6 booleans (true=yang, false=yin), bottom to top
  return [
    gua[1][0], gua[1][1], gua[1][2],
    gua[0][0], gua[0][1], gua[0][2]
  ];
}

function hexagramNumberToGua(num) {
  const idx = num - 1;
  const upper = Math.floor(idx / 8);
  const lower = idx % 8;
  const gua = [[0,0,0],[0,0,0]];
  for (let i = 2; i >= 0; i--) {
    gua[0][2-i] = (upper >> i) & 1;
    gua[1][2-i] = (lower >> i) & 1;
  }
  return gua;
}

function linesToYangYin(line) {
  // In Yijing: yang=1, yin=0
  return line ? 'yang' : 'yin';
}

// ===== CAST COINS =====
async function castCoins() {
  if (tossing) return;
  tossing = true;
  document.getElementById('divineBtn').disabled = true;

  const btn = document.getElementById('divineBtn');
  btn.textContent = '占　卦　中...';

  // Show dots up to current line
  for (let i = 0; i < currentLine; i++) {
    document.getElementById('dot' + i).className = 'line-dot done';
  }
  document.getElementById('dot' + currentLine).className = 'line-dot current';

  // Toss 3 coins
  let total = 0;
  const coins = [];
  for (let i = 0; i < 3; i++) {
    const val = Math.random() < 0.5 ? 2 : 3; // 2=背(head), 3=字(tail)
    total += val;
    coins.push(val);
  }

  // Show coin toss animation
  const coinEls = [
    document.getElementById('coin0'),
    document.getElementById('coin1'),
    document.getElementById('coin2')
  ];

  // Animate each coin
  for (let i = 0; i < 3; i++) {
    coinEls[i].className = 'coin tossing';
    coinEls[i].textContent = '●';
  }

  await sleep(300);

  for (let i = 0; i < 3; i++) {
    await sleep(150 + i * 30);
    const isHead = coins[i] === 2;
    coinEls[i].className = 'coin tossing revealed';
    coinEls[i].textContent = isHead ? '背' : '字';
    coinEls[i].style.color = isHead ? '#e8cc7a' : '#c9a84c';
    coinEls[i].style.borderColor = isHead ? '#e8cc7a' : '#c9a84c';
  }

  await sleep(600);

  // Determine line value: 2+2+2=6, 2+2+3=7, 2+3+3=8, 3+3+3=9
  // 7=yang stable, 8=yin stable, 9=yang moving, 6=yin moving
  const value = total; // 6,7,8,9
  lineValues.push(value);

  // Reset coins
  for (let i = 0; i < 3; i++) {
    coinEls[i].className = 'coin';
    coinEls[i].textContent = '背';
    coinEls[i].style.color = '';
    coinEls[i].style.borderColor = '';
  }

  currentLine++;

  if (currentLine < 6) {
    document.getElementById('tossCount').textContent = `第 ${currentLine + 1} / 6 爻`;
    document.getElementById('divineBtn').disabled = false;
    btn.textContent = '继 续 掷 卦';
  } else {
    document.getElementById('tossCount').textContent = '六 爻 皆 成';
    btn.textContent = '卦 象 已 成';
    await sleep(500);
    showResult();
    return;
  }

  tossing = false;
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// ===== SHOW RESULT =====
function showResult() {
  // Build gua from line values
  // 6,8 = yin (0), 7,9 = yang (1)
  // 6,9 = moving (old yin/old yang)
  const gua = [[0,0,0],[0,0,0]];
  const movingLines = [];

  for (let i = 0; i < 6; i++) {
    const val = lineValues[i];
    const isYang = val % 2 === 1; // 7,9 = yang
    const isMoving = val === 6 || val === 9;

    // gua[1] = lower 3 (positions 1-3 from bottom)
    // gua[0] = upper 3 (positions 4-6 from bottom)
    const guaPos = 5 - i;
    if (i < 3) gua[1][2-i] = isYang ? 1 : 0;
    else gua[0][2-(i-3)] = isYang ? 1 : 0;

    if (isMoving) movingLines.push({ pos: i, val });
  }

  const primaryNum = guaToNumber(gua);
  const primaryHex = getHexagramByNumber(primaryNum);

  // Build changed gua
  let changedNum = null, changedHex = null;
  const changedGua = JSON.parse(JSON.stringify(gua));

  if (movingLines.length > 0) {
    for (const ml of movingLines) {
      const isYang = gua[Math.floor((5-ml.pos)/3) ? 0 : 1][(5-ml.pos)%3];
      if (isYang) {
        // yang moves to yin
        if (ml.pos < 3) changedGua[1][2-ml.pos] = 0;
        else changedGua[0][2-(ml.pos-3)] = 0;
      } else {
        // yin moves to yang
        if (ml.pos < 3) changedGua[1][2-ml.pos] = 1;
        else changedGua[0][2-(ml.pos-3)] = 1;
      }
    }
    changedNum = guaToNumber(changedGua);
    changedHex = getHexagramByNumber(changedNum);
  }

  const personName = document.getElementById('nameInput').value || '有缘人';
  const birthDate = document.getElementById('birthInput').value;

  // === RENDER ===

  // Meta
  const modeText = currentMode === 'person' ? '人盘 · 命格' : '事盘 · 时局';
  document.getElementById('resultMeta').textContent = `${modeText} · ${personName}`;
  document.getElementById('resultSymbol').textContent = primaryHex.symbol;
  document.getElementById('resultTitle').textContent = primaryHex.name + '卦';
  document.getElementById('resultPinyin').textContent = primaryHex.pinyin;

  // Primary hexagram
  const lines = guaArrayToLines(gua);
  renderGuaLines('primaryGua', lines, lineValues);

  document.getElementById('primaryName').textContent = primaryHex.name + '卦';
  document.getElementById('primaryPinyin').textContent = primaryHex.pinyin;
  document.getElementById('primaryMeaning').textContent = `${primaryHex.judgment} · ${primaryHex.meaning}`;

  // Changed hexagram
  const arrow = document.getElementById('arrowBetween');
  const changedCard = document.getElementById('changedCard');

  if (changedHex) {
    arrow.style.display = 'flex';
    changedCard.style.display = 'block';
    const changedLines = guaArrayToLines(changedGua);
    renderGuaLines('changedGua', changedLines, null);
    document.getElementById('changedName').textContent = changedHex.name + '卦';
    document.getElementById('changedPinyin').textContent = changedHex.pinyin;
    document.getElementById('changedMeaning').textContent = `${changedHex.judgment} · ${changedHex.meaning}`;
  } else {
    arrow.style.display = 'none';
    changedCard.style.display = 'none';
  }

  // Trigrams
  renderTrigrams(gua, changedGua, primaryHex, changedHex);

  // Moving lines
  renderMovingLines(movingLines, lineValues);

  // Interpretation
  renderInterpretation(primaryHex, changedHex, currentMode, personName, birthDate, movingLines, primaryNum, changedNum);

  // Timeline
  renderTimeline(primaryHex, changedHex, movingLines);

  // Show result
  document.getElementById('resultSection').classList.add('visible');
  document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
}

function renderGuaLines(containerId, lines, allVals) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  for (let i = 5; i >= 0; i--) {
    const div = document.createElement('div');
    div.className = 'gua-line ' + (lines[i] ? 'yang' : 'yin');
    if (allVals && (allVals[i] === 6 || allVals[i] === 9)) {
      div.classList.add('old');
    }
    container.appendChild(div);
  }
}

function renderTrigrams(gua, changedGua, primaryHex, changedHex) {
  const grid = document.getElementById('trigramsGrid');
  grid.innerHTML = '';

  // Upper (outer) and Lower (inner) trigrams
  const upperIdx = gua[0][0]*4 + gua[0][1]*2 + gua[0][2];
  const lowerIdx = gua[1][0]*4 + gua[1][1]*2 + gua[1][2];
  const upperTr = GUA_MAP[upperIdx];
  const lowerTr = GUA_MAP[lowerIdx];

  const cards = [
    { trigram: upperTr, label: '上　卦（外卦）', pos: 'outer' },
    { trigram: lowerTr, label: '下　卦（内卦）', pos: 'inner' },
  ];

  if (changedHex) {
    const chgUpperIdx = changedGua[0][0]*4 + changedGua[0][1]*2 + changedGua[0][2];
    const chgLowerIdx = changedGua[1][0]*4 + changedGua[1][1]*2 + changedGua[1][2];
    cards.push({ trigram: GUA_MAP[chgUpperIdx], label: '上卦变', pos: 'changed-outer' });
    cards.push({ trigram: GUA_MAP[chgLowerIdx], label: '下卦变', pos: 'changed-inner' });
  }

  for (const card of cards) {
    const div = document.createElement('div');
    div.className = 'trigram-card';

    const lines = card.trigram === upperTr
      ? [gua[0][0], gua[0][1], gua[0][2]]
      : [gua[1][0], gua[1][1], gua[1][2]];

    let linesHTML = '<div class="trigram-lines">';
    for (let i = 0; i < 3; i++) {
      linesHTML += `<div class="trigram-sym-line ${lines[i] ? 'yang' : 'yin'}"></div>`;
    }
    linesHTML += '</div>';

    div.innerHTML = `
      <p class="trigram-name">${card.trigram.symbol} ${card.trigram.name}</p>
      <p class="trigram-attr">${card.trigram.attr} · ${card.trigram.family} · ${card.trigram.element}</p>
      ${linesHTML}
      <p class="trigram-meaning">${card.trigram.meaning}</p>
      <p class="trigram-attr" style="margin-top:8px;font-size:10px;opacity:0.4">方向：${card.trigram.direction}</p>
    `;
    grid.appendChild(div);
  }
}

function renderMovingLines(movingLines, allVals) {
  const block = document.getElementById('movingLinesBlock');
  const content = document.getElementById('movingLinesContent');

  if (movingLines.length === 0) {
    content.innerHTML = '<p class="no-moving">六爻安静，无动爻。本卦持恒不变，宜守不宜动，静待时机。</p>';
    return;
  }

  const lineNames = ['初爻','二爻','三爻','四爻','五爻','上爻'];
  const yuanNames = ['元','亨','利','贞','吉','凶'];

  let html = '';
  for (const ml of movingLines) {
    const isYang = allVals[ml.pos] % 2 === 1;
    const lineName = lineNames[ml.pos];
    const type = isYang ? '老阳（变）' : '老阴（变）';
    const desc = isYang
      ? '阳爻化阴，事物由盛转衰，当防满损'
      : '阴爻化阳，事物由衰转盛，当把握机遇';

    html += `
      <div class="moving-line-item">
        <span class="moving-line-pos">${lineName}</span>
        <span style="color: var(--gold); font-size: 12px; letter-spacing:2px">${type}</span>
        <span>—</span>
        <span>${desc}</span>
      </div>
    `;
  }

  content.innerHTML = html;
}

function renderInterpretation(primaryHex, changedHex, mode, personName, birthDate, movingLines, primaryNum, changedNum) {
  const interp = INTERPRETATIONS[primaryNum] || {};
  const container = document.getElementById('interpBlocks');
  container.innerHTML = '';

  const blocks = [
    { title: '象　数　总　述', text: interp.overview || primaryHex.judgment, type: 'normal' },

    { title: '六　爻　变　化', text: changedHex
      ? `本卦${primaryHex.name}卦，六${movingLines.length > 1 ? '爻' : '一'}动${movingLines.length > 1 ? '' : '爻'}，变${changedHex.name}卦。\n${movingLines.length}处动爻，阴阳转换，事态将由本卦向变卦转化。`
      : '六爻安静，本卦自持。此卦象所示之事，当守不宜变，当静待时机，顺势而为。',
      type: 'normal' },
    { title: '时　机　推　断', text: interp.timing || '时机需根据实际情况具体判断。', type: 'normal' },
    { title: '方　向　指　引', text: interp.direction || '方向选择需因事制宜，择善而从。', type: 'normal' },
    { title: '智　慧　启　示', text: interp.advice || '卦象所示仅为参考，真正的力量在于自己的内心与行动。', type: changedHex ? 'warning' : 'normal' },
  ];

  for (const block of blocks) {
    if (!block.text) continue;
    const div = document.createElement('div');
    div.className = 'interp-block' + (block.type === 'warning' ? ' warning' : '');
    div.innerHTML = `<h5>${block.title}</h5><p>${block.text.replace(/\n/g, '<br>')}</p>`;
    container.appendChild(div);
  }
}

function renderTimeline(primaryHex, changedHex, movingLines) {
  const desc = document.getElementById('timelineDesc');
  const timelineDesc = getTimeline(primaryHex, changedHex, movingLines);
  desc.textContent = timelineDesc;

  // Highlight timeline segments
  const stage = getStage(primaryHex, changedHex, movingLines);
  const segments = ['tl1','tl2','tl3','tl4','tl5'];
  segments.forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'timeline-segment';
    if (i < stage) el.classList.add('active');
    else if (i === stage) el.classList.add('active');
  });
}

function getStage(primaryHex, changedHex, movingLines) {
  if (!changedHex) return 3;
  const movingCount = movingLines.length;
  if (primaryHex.num >= 1 && primaryHex.num <= 2) return 0;
  if (primaryHex.num >= 11 && primaryHex.num <= 14) return 4;
  if (primaryHex.num >= 3 && primaryHex.num <= 10) return 1;
  if (primaryHex.num >= 15 && primaryHex.num <= 30) return 2;
  if (primaryHex.num >= 31 && primaryHex.num <= 50) return 2;
  return 3;
}

function getTimeline(primaryHex, changedHex, movingLines) {
  if (!changedHex) {
    return `此为${primaryHex.name}卦，六爻安静不动，时序运行有其内在节律。初起有难，发展渐顺，至转折处稍遇考验，最终结果取决于本卦之德行与持守之力。`;
  }
  const from = primaryHex.name;
  const to = changedHex.name;
  const count = movingLines.length;
  return `本卦${from}，${count === 1 ? '一爻' : count + '爻'}动，化${to}。事态从${from}向${to}演进：初爻动为事之始，五爻动为事之中，上爻动为事之极。此卦变之路，启示当因时制宜，随机应变，方能趋吉避凶。`;
}

function resetReading() {
  document.getElementById('readingArea').classList.remove('active');
  document.getElementById('heroSection').style.display = 'flex';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
