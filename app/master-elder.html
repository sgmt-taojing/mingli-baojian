<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color"="#3a2818">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>周易大师端 · 老年友好版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
/* 老年友好设计原则：
   - 大字号 (正文 22px / 标题 36px / 按钮 26px)
   - 高对比 (暖黄+深棕)
   - 大按钮 (高度 ≥ 80px)
   - 大间距
   - 简化流程 (≤ 4 步)
   - 一键回到首页
   - 语音提示
*/
:root{
  --ink:#3a2818;       /* 深棕墨色 */
  --ink2:#5a4030;
  --paper:#fff8e7;     /* 暖黄宣纸 */
  --paper2:#f0e4c8;
  --paper3:#a09070;
  --gold:#b8860b;      /* 古金 */
  --gold2:#daa520;
  --jade:#2d8659;
  --cinn:#a52a2a;
  --danger:#a52a2a;
  --success:#2d8659;
  --warn:#cd6600;
  --font:'Noto Serif SC','Source Han Serif SC','SimSun',serif;
  --fs-body:22px;
  --fs-title:36px;
  --fs-h1:48px;
  --fs-btn:26px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:var(--fs-body)}
body{
  font-family:var(--font);
  background:linear-gradient(135deg,var(--paper) 0%,var(--paper2) 100%);
  color:var(--ink);
  min-height:100vh;
  line-height:1.7;
  padding-bottom:120px;
}
/* 顶部 - 超大字号 + 一键回首页 */
.top{
  background:var(--ink);
  color:var(--paper);
  padding:24px 20px;
  text-align:center;
  box-shadow:0 4px 16px rgba(0,0,0,0.2);
  position:sticky;
  top:0;
  z-index:100;
}
.top h1{font-size:var(--fs-h1);font-weight:900;letter-spacing:8px;color:var(--gold2)}
.top .sub{font-size:18px;color:var(--paper2);margin-top:8px;letter-spacing:4px}
/* 大按钮 - 80px 高度 */
.btn-big{
  display:block;
  width:100%;
  min-height:80px;
  padding:20px;
  font-size:var(--fs-btn);
  font-family:var(--font);
  font-weight:700;
  border:none;
  border-radius:16px;
  cursor:pointer;
  margin:16px 0;
  letter-spacing:4px;
  transition:all .2s;
  border:3px solid transparent;
}
.btn-primary{
  background:var(--gold);
  color:#fff;
  box-shadow:0 6px 0 var(--ink2);
}
.btn-primary:active{transform:translateY(4px);box-shadow:0 2px 0 var(--ink2)}
.btn-primary:hover{background:var(--gold2)}
.btn-secondary{
  background:var(--paper);
  color:var(--ink);
  border:3px solid var(--gold);
}
.btn-danger{background:var(--cinn);color:#fff}
/* 大输入框 */
.input-big{
  width:100%;
  min-height:80px;
  padding:16px 20px;
  font-size:24px;
  font-family:var(--font);
  background:#fff;
  border:3px solid var(--gold);
  border-radius:12px;
  color:var(--ink);
  margin:8px 0;
}
.input-big:focus{outline:none;border-color:var(--cinn);box-shadow:0 0 0 4px rgba(165,42,42,0.2)}
label.label-big{
  display:block;
  font-size:24px;
  font-weight:700;
  color:var(--ink);
  margin:16px 0 8px;
  letter-spacing:2px;
}
/* 卡片 */
.card{
  background:#fff;
  border:2px solid var(--gold);
  border-radius:16px;
  padding:24px;
  margin:16px 0;
  box-shadow:0 4px 12px rgba(58,40,24,0.1);
}
.card h2{
  font-size:var(--fs-title);
  color:var(--cinn);
  margin-bottom:16px;
  text-align:center;
  letter-spacing:4px;
}
/* 主容器 */
.main{
  max-width:900px;
  margin:0 auto;
  padding:24px 20px;
}
/* 步骤指示器 - 大圆点 */
.steps{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:32px 0;
}
.step{
  width:60px;height:60px;
  border-radius:50%;
  background:var(--paper2);
  border:4px solid var(--paper3);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  font-weight:900;
  color:var(--paper3);
}
.step.active{background:var(--gold);color:#fff;border-color:var(--gold2);box-shadow:0 0 0 8px rgba(184,134,11,0.2)}
.step.done{background:var(--jade);color:#fff;border-color:var(--success)}
/* 选中态 - 大色块 */
.opt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin:24px 0}
.opt{
  min-height:120px;
  padding:20px;
  background:var(--paper);
  border:4px solid var(--gold);
  border-radius:16px;
  font-size:24px;
  font-weight:700;
  color:var(--ink);
  cursor:pointer;
  text-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:var(--font);
  letter-spacing:2px;
  transition:all .2s;
}
.opt:hover{background:var(--paper2)}
.opt.selected{background:var(--gold);color:#fff;border-color:var(--ink);transform:scale(1.05);box-shadow:0 8px 0 var(--ink2)}
/* 报告区 */
.report{
  background:linear-gradient(180deg,#fff8e7 0%,#f0e4c8 100%);
  border:4px double var(--gold);
  border-radius:16px;
  padding:32px;
  margin:24px 0;
  box-shadow:inset 0 0 24px rgba(184,134,11,0.1);
}
.report h3{font-size:28px;color:var(--cinn);margin:24px 0 12px;letter-spacing:3px;border-bottom:3px solid var(--gold);padding-bottom:8px}
.report p{font-size:22px;margin:12px 0;line-height:1.9}
.report table{width:100%;border-collapse:collapse;margin:16px 0;font-size:20px}
.report th{background:var(--ink);color:var(--paper);padding:14px;font-size:22px;letter-spacing:2px}
.report td{padding:12px;border-bottom:2px solid var(--paper2);font-size:20px}
.report .row-flex{display:flex;gap:16px;flex-wrap:wrap;margin:12px 0}
.report .pill{
  background:var(--gold);
  color:#fff;
  padding:8px 20px;
  border-radius:24px;
  font-size:20px;
  font-weight:700;
  letter-spacing:2px;
}
/* 浮动操作栏 */
.float-bar{
  position:fixed;
  bottom:0;left:0;right:0;
  background:var(--ink);
  padding:16px 20px;
  display:flex;
  gap:12px;
  z-index:90;
  box-shadow:0 -4px 16px rgba(0,0,0,0.2);
}
.float-bar .btn-big{margin:0;min-height:64px;font-size:22px;flex:1}
/* toast */
.toast{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:var(--ink);
  color:#fff;
  padding:24px 40px;
  border-radius:16px;
  font-size:24px;
  z-index:1000;
  display:none;
  border:4px solid var(--gold2);
  letter-spacing:2px;
  max-width:80%;
}
.toast.show{display:block;animation:toastIn .3s}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-40%)}to{opacity:1;transform:translate(-50%,-50%)}}
/* loading */
.spinner{
  width:80px;height:80px;
  border:8px solid var(--paper2);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:32px auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
/* 隐藏 */
.hidden{display:none}
/* 帮助气泡 */
.help-tip{
  background:var(--gold);
  color:#fff;
  border-radius:50%;
  width:36px;height:36px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  cursor:help;
  margin-left:8px;
  font-size:18px;
}
/* 响应式 */
@media (max-width:768px){
  :root{--fs-body:20px;--fs-title:28px;--fs-h1:32px;--fs-btn:22px}
  .main{padding:16px}
  .opt-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="top">
  <h1>☯ 周易大师端</h1>
  <div class="sub">老 师 您 好 · 八 字 排 盘 · 疾 病 预 测</div>
</div>

<div class="main">

  <!-- 步骤指示 -->
  <div class="steps" id="steps">
    <div class="step active" data-step="1">1</div>
    <div class="step" data-step="2">2</div>
    <div class="step" data-step="3">3</div>
    <div class="step" data-step="4">4</div>
  </div>

  <!-- 步骤 1：输入生辰 -->
  <section id="panel-1" class="panel">
    <div class="card">
      <h2>第一步 · 填写生辰</h2>
      <p style="text-align:center;font-size:20px;color:var(--paper3);margin-bottom:24px">
        请填写患者的出生时间，越准确越好
      </p>

      <label class="label-big">① 出生年份</label>
      <input type="number" id="birth-year" class="input-big" placeholder="例如 1958" min="1900" max="2025">

      <label class="label-big">② 出生月份</label>
      <select id="birth-month" class="input-big">
        <option value="">请选择月份</option>
        <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
        <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
        <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
        <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
      </select>

      <label class="label-big">③ 出生日期</label>
      <input type="number" id="birth-day" class="input-big" placeholder="例如 15" min="1" max="31">

      <label class="label-big">④ 出生时辰<span class="help-tip" title="中国古代把一天分为12个时辰，每个时辰2小时">?</span></label>
      <select id="birth-hour" class="input-big">
        <option value="">请选择时辰</option>
        <option value="0">子时 (23:00-01:00)</option>
        <option value="2">丑时 (01:00-03:00)</option>
        <option value="4">寅时 (03:00-05:00)</option>
        <option value="6">卯时 (05:00-07:00)</option>
        <option value="8">辰时 (07:00-09:00)</option>
        <option value="10">巳时 (09:00-11:00)</option>
        <option value="12">午时 (11:00-13:00)</option>
        <option value="14">未时 (13:00-15:00)</option>
        <option value="16">申时 (15:00-17:00)</option>
        <option value="18">酉时 (17:00-19:00)</option>
        <option value="20">戌时 (19:00-21:00)</option>
        <option value="22">亥时 (21:00-23:00)</option>
      </select>

      <label class="label-big">⑤ 性别</label>
      <div class="opt-grid">
        <button class="opt" onclick="selectGender('male',this)">👨 男</button>
        <button class="opt" onclick="selectGender('female',this)">👩 女</button>
      </div>

      <label class="label-big">⑥ 患者姓名 <span style="font-size:18px;color:var(--paper3)">(选填)</span></label>
      <input type="text" id="patient-name" class="input-big" placeholder="例如 王老先生">

      <button class="btn-big btn-primary" onclick="goStep2()">
        下一步 · 排 八 字
      </button>
    </div>
  </section>

  <!-- 步骤 2：八字排盘结果 -->
  <section id="panel-2" class="panel hidden">
    <div class="card">
      <h2>第二步 · 八字排盘</h2>
      <p style="text-align:center;font-size:20px;color:var(--paper3);margin-bottom:24px">
        系统已为您排出八字四柱
      </p>
      <div id="bazi-display" class="report">
        <!-- JS 填充 -->
      </div>
      <button class="btn-big btn-primary" onclick="goStep3()">
        下一步 · 预 测 疾 病
      </button>
    </div>
  </section>

  <!-- 步骤 3：疾病预测 -->
  <section id="panel-3" class="panel hidden">
    <div class="card">
      <h2>第三步 · 疾病预测</h2>
      <p style="text-align:center;font-size:20px;color:var(--paper3);margin-bottom:24px">
        根据八字五行旺衰分析
      </p>
      <div id="disease-display" class="report">
        <!-- JS 填充 -->
      </div>
      <button class="btn-big btn-primary" onclick="goStep4()">
        下一步 · 中 药 推 荐
      </button>
    </div>
  </section>

  <!-- 步骤 4：五行中药 + 完成 -->
  <section id="panel-4" class="panel hidden">
    <div class="card">
      <h2>第四步 · 五行中药</h2>
      <p style="text-align:center;font-size:20px;color:var(--paper3);margin-bottom:24px">
        按五行"缺什么补什么"推荐
      </p>
      <div id="tcm-display" class="report">
        <!-- JS 填充 -->
      </div>
      <div class="row-flex" style="justify-content:center">
        <button class="btn-big btn-secondary" style="flex:1" onclick="window.print()">🖨️ 打印报告</button>
        <button class="btn-big btn-primary" style="flex:1" onclick="restart()">🔄 重新分析</button>
      </div>
    </div>
  </section>

</div>

<!-- 浮动操作 -->
<div class="float-bar">
  <button class="btn-big btn-secondary" onclick="goHome()">🏠 回到首页</button>
  <button class="btn-big btn-danger" onclick="restart()">🔄 重新开始</button>
</div>

<!-- toast -->
<div id="toast" class="toast"></div>

<script>
/* ========== 大字号 + 友好交互：核心数据 ========== */
const WUXING_MAP = {
  '木': { organ: '肝胆', diseases: ['头晕目眩','目赤肿痛','胁肋胀痛','情绪抑郁','易怒暴躁','高血压'], herb: ['柴胡','白芍','枸杞','菊花','决明子'], color: '#2d8659', emoji: '🌳' },
  '火': { organ: '心脏·小肠', diseases: ['心悸失眠','口舌生疮','舌尖红痛','心烦气躁','盗汗','小便短赤'], herb: ['丹参','麦冬','黄连','栀子','淡竹叶'], color: '#a52a2a', emoji: '🔥' },
  '土': { organ: '脾胃', diseases: ['腹胀纳差','大便溏泄','糖尿病倾向','倦怠乏力','水肿','痰湿'], herb: ['山药','薏苡仁','白术','茯苓','陈皮'], color: '#cd6600', emoji: '⛰️' },
  '金': { organ: '肺·大肠', diseases: ['咳嗽哮喘','皮肤干燥','便秘','鼻炎','咽喉炎','易感冒'], herb: ['百合','麦冬','杏仁','川贝','沙参'], color: '#708090', emoji: '⚙️' },
  '水': { organ: '肾·膀胱', diseases: ['腰膝酸软','水肿尿频','耳鸣耳聋','白发早衰','阳痿遗精','畏寒肢冷'], herb: ['熟地黄','山药','枸杞','杜仲','五味子'], color: '#1e3a8a', emoji: '💧' }
};

/* 天干地支 → 五行 */
const STEM_WUXING = { '甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土','庚':'金','辛':'金','壬':'水','癸':'水' };
const BRANCH_WUXING = { '子':'水','丑':'土','寅':'木','卯':'木','辰':'土','巳':'火','午':'火','未':'土','申':'金','酉':'金','戌':'土','亥':'水' };

const STEM_LIST = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const BRANCH_LIST = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];

/* ========== 状态 ========== */
const state = {
  step: 1,
  data: {},
  gender: null,
  bazi: null,
  wuxingScore: null,
  diseases: null,
  tcm: null
};

/* ========== 工具 ========== */
function toast(msg, ms=2400){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove('show'), ms);
}

function selectGender(g, btn){
  state.gender = g;
  document.querySelectorAll('#panel-1 .opt').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

function goHome(){ location.href='index.html'; }

function restart(){
  if(!confirm('确定重新开始吗？当前输入会清空。'))return;
  state.step = 1;
  state.data = {};
  state.gender = null;
  state.bazi = null;
  state.wuxingScore = null;
  state.diseases = null;
  state.tcm = null;
  document.querySelectorAll('input[type="number"],input[type="text"]').forEach(i=>i.value='');
  document.querySelectorAll('select').forEach(s=>s.selectedIndex=0);
  document.querySelectorAll('.opt').forEach(o=>o.classList.remove('selected'));
  showPanel(1);
}

function showPanel(n){
  for(let i=1;i<=4;i++){
    document.getElementById('panel-'+i).classList.toggle('hidden', i!==n);
  }
  state.step = n;
  // 更新步骤指示器
  document.querySelectorAll('.step').forEach(s=>{
    const sn = +s.dataset.step;
    s.classList.toggle('active', sn===n);
    s.classList.toggle('done', sn<n);
  });
  // 滚到顶部
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ========== 八字排盘（精确到年月日时） ========== */
function computeBazi(year, month, day, hour){
  // 年柱：以立春为界
  // 简化：用公历年计算（精度足够对老年群体）
  const y = +year;
  const yIdx = (y - 4) % 60; // 1984 = 甲子 = 0
  const yearStem = STEM_LIST[((y - 4) % 10 + 10) % 10];
  const yearBranch = BRANCH_LIST[((y - 4) % 12 + 12) % 12];
  const yearAnimal = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'][(y - 4) % 12];

  // 月柱：按节气（简化用月份）
  const m = +month;
  const monthStem = STEM_LIST[((y - 4) % 5 * 2 + (m - 1) + 1 + 10) % 10]; // 五虎遁年起月
  const monthBranch = BRANCH_LIST[(m + 1) % 12];

  // 日柱：用基准日 1900-01-01 = 甲戌 (10)
  const baseDate = new Date(1900, 0, 1);
  const targetDate = new Date(y, m-1, +day);
  const diffDays = Math.floor((targetDate - baseDate) / 86400000);
  const dayIdx = (10 + diffDays + 60*100) % 60; // 防止负数
  const dayStem = STEM_LIST[dayIdx % 10];
  const dayBranch = BRANCH_LIST[dayIdx % 12];

  // 时柱：五子鼠日起时
  const h = +hour;
  const hBranch = BRANCH_LIST[Math.floor(((h+1)%24)/2)];
  const dayStemIdx = dayIdx % 10;
  const hStem = STEM_LIST[((dayStemIdx % 5) * 2 + Math.floor(h/2) + 1 + 10) % 10];

  return {
    year:{stem:yearStem,branch:yearBranch,animal:yearAnimal},
    month:{stem:monthStem,branch:monthBranch},
    day:{stem:dayStem,branch:dayBranch},
    hour:{stem:hStem,branch:hBranch}
  };
}

/* ========== 五行旺衰 ========== */
function computeWuxingScore(bazi){
  const score = { 木:0, 火:0, 土:0, 金:0, 水:0 };
  ['year','month','day','hour'].forEach(p=>{
    score[STEM_WUXING[bazi[p].stem]]++;
    score[BRANCH_WUXING[bazi[p].branch]]++;
  });
  return score;
}

/* ========== 疾病预测 ========== */
function predictDiseases(wuxingScore){
  const max = Math.max(...Object.values(wuxingScore));
  const min = Math.min(...Object.values(wuxingScore));
  const avg = (max+min)/2;

  // 缺什么 → 该脏腑弱
  // 过旺 → 该脏腑过亢
  const result = [];
  for(const wx in wuxingScore){
    const info = WUXING_MAP[wx];
    const s = wuxingScore[wx];
    if(s < avg - 0.5){
      // 偏弱
      result.push({
        type:'偏弱',
        wuxing:wx,
        emoji:info.emoji,
        organ:info.organ,
        diseases: info.diseases.slice(0,3),
        herb: info.herb,
        advice:'建议补'+wx+'。日常生活中多接触绿色、酸味食物。'
      });
    } else if(s > avg + 0.5){
      // 过旺
      result.push({
        type:'过旺',
        wuxing:wx,
        emoji:info.emoji,
        organ:info.organ,
        diseases: ['注意:'+wx+'气过亢可能引发', info.diseases[0], info.diseases[1]],
        herb:[],
        advice:'建议泄'+wx+'。日常饮食清淡，少辛辣刺激。'
      });
    }
  }
  // 始终显示日主
  const riZhu = null; // TODO
  return result;
}

/* ========== 中药推荐 ========== */
function recommendTcm(wuxingScore){
  const sorted = Object.entries(wuxingScore).sort((a,b)=>a[1]-b[1]);
  const rec = {
    primary: [],   // 最需补
    secondary: []  // 次要
  };
  rec.primary = sorted.slice(0,2).map(([wx])=>({
    wuxing:wx,
    ...WUXING_MAP[wx]
  }));
  rec.secondary = sorted.slice(2,3).map(([wx])=>({
    wuxing:wx,
    ...WUXING_MAP[wx]
  }));
  return rec;
}

/* ========== 步骤切换 ========== */
function validateStep1(){
  const y = +document.getElementById('birth-year').value;
  const m = +document.getElementById('birth-month').value;
  const d = +document.getElementById('birth-day').value;
  const h = +document.getElementById('birth-hour').value;
  if(!y || y<1900 || y>2025){ toast('请填写正确的年份 (1900-2025)'); return false; }
  if(!m){ toast('请选择月份'); return false; }
  if(!d || d<1 || d>31){ toast('请填写正确的日期'); return false; }
  if(h==='' || h===null){ toast('请选择时辰'); return false; }
  if(!state.gender){ toast('请选择性别'); return false; }
  state.data.year = y; state.data.month = m; state.data.day = d; state.data.hour = h;
  state.data.name = document.getElementById('patient-name').value || '患者';
  return true;
}

function goStep2(){
  if(!validateStep1())return;
  state.bazi = computeBazi(state.data.year, state.data.month, state.data.day, state.data.hour);
  state.wuxingScore = computeWuxingScore(state.bazi);
  renderBazi();
  showPanel(2);
}

function renderBazi(){
  const b = state.bazi;
  const ws = state.wuxingScore;
  const wuxingRow = Object.entries(ws).map(([k,v])=>`<td style="background:${WUXING_MAP[k].color}22"><b style="color:${WUXING_MAP[k].color}">${WUXING_MAP[k].emoji}${k}</b><br>分数 ${v}</td>`).join('');
  const wuxingRec = Object.entries(ws).sort((a,b)=>b[1]-a[1]).map(([k,v])=>{
    const info = WUXING_MAP[k];
    return `<div class="pill" style="background:${info.color}">${info.emoji}${k}（${v}）${info.organ}</div>`;
  }).join('');

  document.getElementById('bazi-display').innerHTML = `
    <h3>📅 ${state.data.name} 的生辰八字</h3>
    <p style="text-align:center;font-size:26px;color:var(--gold);font-weight:900;letter-spacing:4px">
      ${b.year.stem}${b.year.branch} · ${b.month.stem}${b.month.branch} · ${b.day.stem}${b.day.branch} · ${b.hour.stem}${b.hour.branch}
    </p>
    <p style="text-align:center;font-size:22px">属相：<b>${b.year.animal}</b>　性别：<b>${state.gender==='male'?'男':'女'}</b></p>

    <h3>🌳 五行分布</h3>
    <table>
      <tr>${wuxingRow}</tr>
    </table>
    <div class="row-flex">${wuxingRec}</div>

    <h3>📖 八字详解</h3>
    <p><b>年柱：</b>${b.year.stem}${b.year.branch} 代表祖上、父母宫，主出身背景。</p>
    <p><b>月柱：</b>${b.month.stem}${b.month.branch} 代表兄弟、父母宫，主青年运势。</p>
    <p><b>日柱：</b>${b.day.stem}${b.day.branch} 日干为<b>${b.day.stem}</b>（${WUXING_MAP[STEM_WUXING[b.day.stem]].organ}之命），日支为<b>${b.day.branch}</b>，代表自身与配偶宫。</p>
    <p><b>时柱：</b>${b.hour.stem}${b.hour.branch} 代表子女、晚运，主老年运势。</p>
  `;
}

function goStep3(){
  state.diseases = predictDiseases(state.wuxingScore);
  renderDiseases();
  showPanel(3);
}

function renderDiseases(){
  const ws = state.wuxingScore;
  const sorted = Object.entries(ws).sort((a,b)=>b[1]-a[1]);
  const max = sorted[0][0];
  const min = sorted[sorted.length-1][0];
  const maxInfo = WUXING_MAP[max];
  const minInfo = WUXING_MAP[min];

  // 取偏弱+过旺的所有
  const avg = (Math.max(...Object.values(ws)) + Math.min(...Object.values(ws)))/2;
  const flags = [];
  for(const wx in ws){
    const info = WUXING_MAP[wx];
    const s = ws[wx];
    if(s < avg - 0.5){
      flags.push({wx, type:'偏弱', info, s});
    } else if(s > avg + 0.5){
      flags.push({wx, type:'过旺', info, s});
    }
  }
  // 始终展示最弱 + 最旺
  if(!flags.find(f=>f.wx===min)) flags.unshift({wx:min, type:'最弱', info:minInfo, s:ws[min]});
  if(!flags.find(f=>f.wx===max)) flags.push({wx:max, type:'最旺', info:maxInfo, s:ws[max]});

  const html = `
    <h3>🔍 五行旺衰诊断</h3>
    <p>本造五行最旺为 <b style="color:${maxInfo.color}">${maxInfo.emoji}${max}</b>，最弱为 <b style="color:${minInfo.color}">${minInfo.emoji}${min}</b>。</p>

    ${flags.map(f=>`
      <h3>${f.type==='最弱'?'⬇️':f.type==='最旺'?'⬆️':''} ${f.info.emoji} ${f.wx}（${f.info.organ}）${f.type}（分数 ${f.s}）</h3>
      <p><b>易患倾向：</b></p>
      <div class="row-flex">
        ${f.info.diseases.map(d=>`<div class="pill" style="background:${f.info.color}">${d}</div>`).join('')}
      </div>
      <p style="margin-top:12px"><b>建议：</b>${f.type==='最弱'?'滋补'+f.wx+'气，宜食'+f.wx+'性食物，注意休息。':f.type==='最旺'?'泄'+f.wx+'以平衡，忌辛辣刺激，保持情绪稳定。':'调理'+f.wx+'气，使五行趋于平衡。'}</p>
    `).join('')}

    <h3>⚠️ 健康提醒</h3>
    <p style="background:#fff3cd;padding:16px;border-radius:8px;border:2px solid #cd6600">
      本预测基于八字五行理论，仅供参考。<b style="color:#a52a2a">如有不适请及时就医</b>，
      中医诊断需结合望闻问切四诊合参。
    </p>
  `;
  document.getElementById('disease-display').innerHTML = html;
}

function goStep4(){
  state.tcm = recommendTcm(state.wuxingScore);
  renderTcm();
  showPanel(4);
}

function renderTcm(){
  const tcm = state.tcm;
  const primaryHtml = tcm.primary.map(p=>`
    <h3>🌿 主补 · ${p.emoji}${p.wuxing}（${p.organ}）</h3>
    <p><b>推荐中药：</b></p>
    <div class="row-flex">
      ${p.herb.map(h=>`<div class="pill" style="background:${p.color}">${h}</div>`).join('')}
    </div>
    <p style="margin-top:12px"><b>食疗建议：</b>多食${p.wuxing}性食物（${p.wuxing==='木'?'绿色蔬菜、酸味水果':p.wuxing==='火'?'红色食物、苦味':p.wuxing==='土'?'黄色食物、甘味':p.wuxing==='金'?'白色食物、辛味':'黑色食物、咸味'}）。</p>
  `).join('');

  const secondaryHtml = tcm.secondary.length ? `
    <h3>🍵 次补 · ${tcm.secondary[0].emoji}${tcm.secondary[0].wuxing}（${tcm.secondary[0].organ}）</h3>
    <p><b>辅以中药：</b></p>
    <div class="row-flex">
      ${tcm.secondary[0].herb.slice(0,3).map(h=>`<div class="pill" style="background:${tcm.secondary[0].color}">${h}</div>`).join('')}
    </div>
  ` : '';

  document.getElementById('tcm-display').innerHTML = `
    <h3>📋 调理原则</h3>
    <p style="font-size:24px;font-weight:700;color:var(--cinn);text-align:center">
      缺 什 么 · 补 什 么
    </p>
    ${primaryHtml}
    ${secondaryHtml}

    <h3>📜 经方参考</h3>
    <table>
      <tr><th>症状</th><th>推荐方剂</th><th>主要成分</th></tr>
      <tr><td>${tcm.primary[0].wuxing}虚</td><td>${tcm.primary[0].wuxing==='木'?'逍遥散':tcm.primary[0].wuxing==='火'?'天王补心丹':tcm.primary[0].wuxing==='土'?'参苓白术散':tcm.primary[0].wuxing==='金'?'百合固金汤':'六味地黄丸'}</td><td>${tcm.primary[0].herb.slice(0,3).join('、')}</td></tr>
      <tr><td>${tcm.primary[1] ? tcm.primary[1].wuxing+'虚':'-'}</td><td>${tcm.primary[1] ? (tcm.primary[1].wuxing==='木'?'柴胡疏肝散':tcm.primary[1].wuxing==='火'?'导赤散':tcm.primary[1].wuxing==='土'?'补中益气汤':tcm.primary[1].wuxing==='金'?'清燥救肺汤':'金匮肾气丸'):'-'}</td><td>${tcm.primary[1] ? tcm.primary[1].herb.slice(0,3).join('、') : '-'}</td></tr>
    </table>

    <h3>⚠️ 用药安全</h3>
    <p style="background:#fff3cd;padding:16px;border-radius:8px;border:2px solid #cd6600">
      <b>重要提示：</b>本推荐仅供参考，<b style="color:#a52a2a">实际用药请遵医嘱</b>。
      中药需根据患者体质、病情、配伍禁忌综合考量，<b>切勿自行抓药服用</b>。
      建议到正规中医院就诊，由执业中医师开具处方。
    </p>

    <h3>📞 联系方式</h3>
    <p>如需专业咨询，可通过 AI 助手页面的「<b>中医体质</b>」模块继续深入分析。</p>
  `;
}
