<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>商家入驻 · 易道智鉴</title>
<style>
:root{--ink:#080808;--ink2:#111;--ink3:#1a1a1a;--ink4:#222;--paper:#f0e8d8;--paper1:#f0e8d8;--paper2:#d4c9b0;--paper3:#a09080;--gold:#c9a84c;--gold2:#e8cc7a;--gold3:#a08030;--cinn:#c0392b;--cinn2:#e74c3c;--jade:#27ae60;--jade2:#2ecc71;--cyan:#2980b9;--cyan2:#5dade2;--wood:#8d6e63;--earth:#a08060;--metal:#95a5a6;--metal2:#bdc3c7;--danger:#dc3545;--success:#2ecc71;--warn:#e67e22;--orange:#e67e22;--border:rgba(201,168,76,.15);--bg:#080808;--card:rgba(255,255,255,0.04);--card2:rgba(255,255,255,0.06);--shadow:0 4px 24px rgba(0,0,0,.5);--steel:#7f8c8d;--violet:#8e44ad;--violet2:#9b59b6;--violet-light:#bb8fce;--jade-light:#2ecc71;--emerald:#27ae60;--fire:#e74c3c;--water:#2980b9;--red:#e74c3c;--green:#27ae60;--blue:#2980b9;--purple:#8e44ad;--gray:#7f8c8d;--text:#f0e8d8;--text-light:#f0e8d8;--text-dim:#a09080;--text-muted:#a09080;--muted:#a09080;--accent:#c9a84c;--title:#c9a84c;--bg-dark:#060608;--bg-modal:rgba(0,0,0,.7);--gold-dim:rgba(201,168,76,.4);--card-bg:rgba(255,255,255,0.04);--card-bg2:rgba(255,255,255,0.06);--wood2:#a1887f;--ink2-rgb:17,17,17;--gold-rgb:201,168,76}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif SC',serif;background:var(--ink);color:var(--paper);line-height:1.8;max-width:600px;margin:0 auto;padding:20px}
h1{color:var(--gold);text-align:center;font-size:22px;letter-spacing:4px;margin-bottom:6px}
.sub{text-align:center;font-size:12px;color:var(--paper3);margin-bottom:24px}
.card{background:rgba(201,168,76,0.04);border:1px solid rgba(201,168,76,0.12);border-radius:12px;padding:16px;margin-bottom:14px}
.card h3{color:var(--gold);font-size:14px;margin-bottom:12px}
label{display:block;font-size:12px;color:var(--paper3);margin-bottom:4px}
input,select,textarea{width:100%;padding:10px;background:var(--cyan);border:1px solid rgba(201,168,76,0.15);border-radius:8px;color:var(--paper);font-size:13px;font-family:inherit;outline:none;margin-bottom:10px}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
textarea{min-height:70px;resize:vertical}
.row{display:flex;gap:10px}
.row>div{flex:1}
.btn{display:block;width:100%;padding:12px;background:linear-gradient(135deg,var(--gold),var(--gold3));color:var(--ink);border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center}
.btn:active{transform:scale(0.98)}
.tip{font-size:11px;color:var(--paper3);margin-top:6px}
.success{display:none;text-align:center;padding:30px;color:var(--jade)}
.success h2{font-size:20px;margin-bottom:10px}
</style>
</head>
<body>
<div style="position:fixed;top:12px;right:12px;z-index:99998">
  <a href="tcm-clinic.html" style="display:inline-block;padding:6px 16px;background:rgba(201,168,76,0.12);color:var(--gold,#c9a84c);border:1px solid rgba(201,168,76,0.25);border-radius:16px;font-size:12px;text-decoration:none;font-family:'Noto Serif SC',serif;letter-spacing:1px">🏥 中医诊疗</a>
</div>
<h1>🏪 商家入驻申请</h1>
<p class="sub">道观寺庙/大师工作室入驻 · 平台代售引流 · 付款即分成</p>

<div id="applyForm">
<div class="card">
<h3>📝 基本信息</h3>
<label>商家名称（如：五台山显通寺法物流通处）</label>
<input type="text" id="mName" placeholder="商家/寺庙名称">
<div class="row">
<div>
<label>派别</label>
<select id="mSchool">
<option value="佛教">佛教</option>
<option value="道教">道教</option>
<option value="儒家">儒家</option>
<option value="民间">民间法教</option>
</select>
</div>
<div>
<label>类型</label>
<select id="mType">
<option value="寺庙">寺庙</option>
<option value="道观">道观</option>
<option value="书院">书院</option>
<option value="工作室">大师工作室</option>
<option value="个人">个人大师</option>
</select>
</div>
</div>
<div class="row">
<div>
<label>负责人姓名</label>
<input type="text" id="mBoss" placeholder="负责人/住持">
</div>
<div>
<label>联系电话</label>
<input type="tel" id="mPhone" placeholder="手机号">
</div>
</div>
<label>法人/住持法名</label>
<input type="text" id="mMaster" placeholder="如：释XX法师 / 张XX道长">
</div>

<div class="card">
<h3>📜 资质认证</h3>
<label>制作许可证编号</label>
<input type="text" id="mLicense" placeholder="宗教用品制作许可证编号">
<label>协会认证</label>
<select id="mCert">
<option value="佛教协会监制">佛教协会监制</option>
<option value="道教协会监制">道教协会监制</option>
<option value="宗教局备案">宗教局备案</option>
<option value="非遗传承">非物质文化遗产传承</option>
<option value="其他">其他认证</option>
</select>
<label>供应商品类别（可多选，用、分隔）</label>
<input type="text" id="mCats" placeholder="法器、吉祥物、经典、茶饮、养生品">
<label>商品制作过程描述</label>
<textarea id="mProcess" placeholder="如：本寺法器由寺内僧人手工制作，经开光仪式加持..."></textarea>
</div>

<div class="card">
<h3>📊 合作模式</h3>
<label>分成比例（商家所得百分比）</label>
<select id="mSplit">
<option value="0.8">80%（平台20%）</option>
<option value="0.7">70%（平台30%）</option>
<option value="0.6">60%（平台40%）</option>
<option value="0.9">90%（平台10%）</option>
</select>
<div class="tip">平台只代售引流，不囤货。付款即按比例分成。</div>
</div>

<div class="card">
<h3>📋 入驻协议</h3>
<label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer">
<input type="checkbox" id="mAgree" style="width:auto;margin:0;flex-shrink:0;margin-top:4px">
<span style="font-size:12px;color:var(--paper3);line-height:1.8">本人承诺所提交信息真实有效，商品为正规制作，来源可查。同意平台代售引流模式，付款即按约定比例分成。如有虚假，愿承担一切责任。</span>
</label>
</div>

<button class="btn" onclick="submitApply()">提交入驻申请</button>
</div>

<div id="successMsg" class="success">
<h2>✅ 申请已提交</h2>
<p>平台将在3个工作日内审核，审核通过后即可上架商品。</p>
<p style="margin-top:16px"><a href="merchant-dashboard.html" style="color:var(--gold)">前往商家后台 →</a></p>
</div>

<script src="js/ui-toast.js" defer></script>
<script src="../js/toast-helper.js"></script>
<script>
function submitApply(){
  var name=document.getElementById('mName').value.trim();
  var phone=document.getElementById('mPhone').value.trim();
  var agree=document.getElementById('mAgree').checked;
  if(!name){showToast('请填写商家名称');return}
  if(!phone){showToast('请填写联系电话');return}
  if(!agree){showToast('请勾选入驻协议');return}
  
  var data={
    id:'m'+Date.now(),
    name:name,
    school:document.getElementById('mSchool').value,
    type:document.getElementById('mType').value,
    boss:document.getElementById('mBoss').value,
    phone:phone,
    master:document.getElementById('mMaster').value,
    license:document.getElementById('mLicense').value,
    cert:document.getElementById('mCert').value,
    cats:document.getElementById('mCats').value,
    process:document.getElementById('mProcess').value,
    split:parseFloat(document.getElementById('mSplit').value),
    status:'pending',
    applyDate:new Date().toISOString().slice(0,10)
  };
  
  var list=JSON.parse(localStorage.getItem('merchantList')||'[]');
  list.push(data);
  localStorage.setItem('merchantList',JSON.stringify(list));
  
  document.getElementById('applyForm').style.display='none';
  document.getElementById('successMsg').style.display='block';
}
</script>
</body>
</html>
