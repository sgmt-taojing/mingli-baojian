  <style>
    :root {
      --ink: var(--ink); --paper: var(--paper); --gold: var(--gold); --gold2: var(--gold2);;--gold3:#a08030;--ink2:#111;--ink3:#1a1a1a;--ink4:#222;--paper3:#a09080;--steel:#7f8c8d}
    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--ink); color: var(--paper);
      margin: 0; padding: 20px; min-height: 100vh;
    }
    .header {
      text-align: center; padding: 40px 0; border-bottom: 1px solid var(--ink3);
    }
    .header h1 { font-size: 28px; color: var(--gold); margin: 0 0 10px 0; }
    .header p { color: var(--steel); margin: 0; }
    .category-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 15px; padding: 40px 20px; max-width: 1200px; margin: 0 auto;
    }
    .category-card {
      background: var(--ink2); border: 1px solid var(--ink4); border-radius: 12px;
      padding: 25px; text-align: center; transition: all 0.3s; cursor: pointer;
    }
    .category-card:hover {
      border-color: var(--gold); transform: translateY(-3px);
    }
    .cat-icon { font-size: 36px; margin-bottom: 12px; }
    .cat-name { color: var(--gold2); font-size: 16px; margin-bottom: 8px; }
    .cat-count { color: var(--paper3); font-size: 13px; }
    .nav-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--ink); border-top: 1px solid var(--ink4);
      display: flex; justify-content: center; padding: 12px;
    }
    .nav-btn {
      background: transparent; border: none; color: var(--steel);
      padding: 10px 20px; cursor: pointer;
    }
    .nav-btn:hover { color: var(--gold); }
  </style>
</head>
