<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>易道智鉴 · 口诀库</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #080808; --paper: #f0e8d8; --gold: #c9a84c; --gold2: #e8cc7a;
    }
    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--ink); color: var(--paper);
      margin: 0; padding: 20px; min-height: 100vh;
    }
    .header {
      text-align: center; padding: 40px 0; border-bottom: 1px solid #333;
    }
    .header h1 { font-size: 28px; color: var(--gold); margin: 0 0 10px 0; }
    .header p { color: #888; margin: 0; }
    .category-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 15px; padding: 40px 20px; max-width: 1200px; margin: 0 auto;
    }
    .category-card {
      background: #111; border: 1px solid #222; border-radius: 12px;
      padding: 25px; text-align: center; transition: all 0.3s; cursor: pointer;
    }
    .category-card:hover {
      border-color: var(--gold); transform: translateY(-3px);
    }
    .cat-icon { font-size: 36px; margin-bottom: 12px; }
    .cat-name { color: var(--gold2); font-size: 16px; margin-bottom: 8px; }
    .cat-count { color: #666; font-size: 13px; }
    .nav-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0a0a0a; border-top: 1px solid #222;
      display: flex; justify-content: center; padding: 12px;
    }
    .nav-btn {
      background: transparent; border: none; color: #888;
      padding: 10px 20px; cursor: pointer;
    }
    .nav-btn:hover { color: var(--gold); }
  </style>
</head>
<body>
  <div class="header">
    <h1>📜 口诀库</h1>
    <p>儒释道三教修行口诀，共226条经典</p>
  </div>
  
  <div class="category-grid">
    <div class="category-card" onclick="window.location.href='divination-hub.html'">
      <div class="cat-icon">☯️</div>
      <div class="cat-name">道教八大神咒</div>
      <div class="cat-count">8条</div>
    </div>
    
    <div class="category-card" onclick="window.location.href='divination-hub.html'">
      <div class="cat-icon">🛡️</div>
      <div class="cat-name">道教护身咒</div>
      <div class="cat-count">15条</div>
    </div>
    
    <div class="category-card" onclick="window.location.href='divination-hub.html'">
      <div class="cat-icon">☸️</div>
      <div class="cat-name">佛教咒语</div>
      <div class="cat-count">20条</div>
    </div>
    
    <div class="category-card" onclick="window.location.href='divination-hub.html'">
      <div class="cat-icon">🧘</div>
      <div class="cat-name">内丹导引</div>
      <div class="cat-count">12条</div>
    </div>
    
    <div class="category-card" onclick="window.location.href='divination-hub.html'">
      <div class="cat-icon">🪷</div>
      <div class="cat-name">禅修口诀</div>
      <div class="cat-count">18条</div>
    </div>
    
    <div class="category-card" onclick="window.location.href='divination-hub.html'">
      <div class="cat-icon">📖</div>
      <div class="cat-name">儒家修身</div>
      <div class="cat-count">16条</div>
    </div>
    
    <div class="category-card" onclick="window.location.href='divination-hub.html'">
      <div class="cat-icon">💡</div>
      <div class="cat-name">生活智慧</div>
      <div class="cat-count">25条</div>
    </div>
    
    <div class="category-card" onclick="window.location.href='divination-hub.html'">
      <div class="cat-icon">⏰</div>
      <div class="cat-name">养生时辰</div>
      <div class="cat-count">12条</div>
    </div>
  </div>
  
  <div style="text-align: center; padding: 30px;">
    <button onclick="window.location.href='divination-hub.html'"
            style="background: linear-gradient(135deg, var(--gold), #a08030);
                   border: none; color: #000; padding: 15px 40px;
                   border-radius: 8px; cursor: pointer; font-weight: bold;">
      前往主平台查看全部226条口诀
    </button>
  </div>
  
  <div class="nav-bar">
    <button class="nav-btn" onclick="window.location.href='divination-hub.html'">🏠 主平台</button>
    <button class="nav-btn" onclick="window.location.href='divination-knowledge.html'">📚 知识库</button>
    <button class="nav-btn" onclick="window.location.href='divination-shop.html'">🛒 商城</button>
  </div>
</body>
</html>
