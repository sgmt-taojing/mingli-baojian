<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>易道智鉴 · 风水罗盘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #080808; --paper: #f0e8d8; --gold: #c9a84c; --gold2: #e8cc7a;
    }
    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--ink); color: var(--paper);
      margin: 0; padding: 20px; min-height: 100vh; text-align: center;
    }
    .compass-container {
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 20px;
    }
    .compass-ring {
      width: 300px; height: 300px; border-radius: 50%;
      border: 3px solid var(--gold); position: relative;
      background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%);
      margin: 40px 0;
    }
    .direction {
      position: absolute; font-size: 24px; font-weight: bold;
      color: var(--gold);
    }
    .dir-n { top: 10px; left: 50%; transform: translateX(-50%); }
    .dir-s { bottom: 10px; left: 50%; transform: translateX(-50%); }
    .dir-e { right: 10px; top: 50%; transform: translateY(-50%); }
    .dir-w { left: 10px; top: 50%; transform: translateY(-50%); }
    .compass-needle {
      position: absolute; width: 4px; height: 100px;
      background: linear-gradient(to top, var(--gold) 0%, #c0392b 100%);
      left: 50%; top: 50%; transform: translate(-50%, -100%);
      transform-origin: bottom center; animation: spin 3s ease-out forwards;
    }
    @keyframes spin {
      0% { transform: translate(-50%, -100%) rotate(0deg); }
      100% { transform: translate(-50%, -100%) rotate(360deg); }
    }
    .info-box {
      background: #111; border: 1px solid #222; border-radius: 12px;
      padding: 30px; max-width: 600px; margin: 20px auto;
    }
    .info-title { color: var(--gold2); font-size: 18px; margin-bottom: 15px; }
    .info-desc { color: #888; line-height: 1.8; }
    .nav-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0a0a0a; border-top: 1px solid #222;
      display: flex; justify-content: center; padding: 12px;
    }
    .nav-btn {
      background: transparent; border: none; color: #888;
      padding: 10px 20px; cursor: pointer;
    }
    .nav-btn:hover { color: var(--gold); }
  </style>
</head>
<body>
  <h1 style="color: var(--gold); margin-top: 40px;">🧭 风水罗盘</h1>
  <p style="color: #666;">专业风水勘测工具</p>
  
  <div class="compass-container">
    <div class="compass-ring">
      <span class="direction dir-n">北</span>
      <span class="direction dir-s">南</span>
      <span class="direction dir-e">东</span>
      <span class="direction dir-w">西</span>
      <div class="compass-needle"></div>
    </div>
  </div>
  
  <div class="info-box">
    <div class="info-title">方位吉凶</div>
    <div class="info-desc">
      罗盘定位后，系统将分析各方位的吉凶属性。<br>
      请前往主平台使用完整的风水分析功能。
    </div>
  </div>
  
  <button onclick="window.location.href='divination-hub.html'" 
          style="background: linear-gradient(135deg, var(--gold), #a08030);
                 border: none; color: #000; padding: 15px 40px;
                 border-radius: 8px; cursor: pointer; font-weight: bold;
                 margin: 20px 0;">
    前往主平台使用
  </button>
  
  <div class="nav-bar">
    <button class="nav-btn" onclick="window.location.href='divination-hub.html'">🏠 主平台</button>
    <button class="nav-btn" onclick="window.location.href='divination-tools.html'">🔧 工具集</button>
    <button class="nav-btn" onclick="window.location.href='divination-knowledge.html'">📚 知识库</button>
  </div>
</body>
</html>
